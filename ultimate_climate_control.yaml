              value: "off"
            continue_on_error: true

      # v6.5.2 CRITICAL FIX: Update snapshot BEFORE sending command
      - if:
          - condition: template
            value_template: "{{ helper_last_command not in [none, 'unavailable', 'unknown'] }}"
        then:
          - service: input_text.set_value
            target:
              entity_id: "{{ helper_last_command }}"
            data:
              value: "hvac=off,temp=0,fan=unknown,swing=unknown"
            continue_on_error: true
          - service: input_number.set_value
            target:
              entity_id: "{{ helper_state_checksum }}"
            data:
              value: "0"
            continue_on_error: true

      # v7.2.0 FIX: Move helper updates BEFORE climate.turn_off to survive mode:restart
      # When climate.turn_off fires, the AC state change triggers climate_state_change,
      # which with mode:restart kills this automation run before subsequent steps execute.
      # By updating helpers FIRST, off-time protection will work even if the run is killed.
      - service: input_text.set_value
        target:
          entity_id: !input helper_last_mode
        data:
          value: "off"
        continue_on_error: true

      - service: input_datetime.set_datetime
        target:
          entity_id: !input helper_mode_start_time
        data:
          datetime: "{{ now() }}"
        continue_on_error: true

      - service: climate.turn_off
        target:
          entity_id: !input climate_entities
        continue_on_error: true

      # v4.2.1: Verify AC was turned off correctly, retry if not
      - delay:
          milliseconds: 500
      - repeat:
          for_each: "{{ climate_list }}"
          sequence:
            - if:
                - condition: template
                  value_template: "{{ states(repeat.item) not in ['off', 'unavailable'] }}"
              then:
                - service: climate.turn_off
                  target:
                    entity_id: "{{ repeat.item }}"
                  continue_on_error: true


  # Turn off AC if it's running but temperature has reached/passed target
  # v3.9.27 FIX: Use OVERSHOOT target, not user target!
  # v4.6.0: Don't turn off if bed ECO mode should activate instead
  - if:
      - condition: template
        value_template: >
          {{
            actual_ac_state == 'on' and
            (last_mode == 'cooling' or last_mode == 'heating') and
            (
              (last_mode == 'cooling' and current_temp <= (target_temp - target_overshoot)) or
              (last_mode == 'heating' and current_temp >= (target_temp + target_overshoot))
            ) and
            not (bed_sensor_manual and is_state(bed_sensor_manual, 'on') and bed_comfort_mode != 'off')
          }}
    then:
      # Log the turn-off action
      - if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - service: system_log.write
            data:
              message: >
                🎯 {{ room_name | upper }} TARGET REACHED - TURNING OFF

                ✅ Conditions Met:
                    • Current: {{ current_temp }}°C
                    • Target: {{ cooling_target_temp if last_mode == 'cooling' else heating_target_temp }}°C
                    • Mode: {{ last_mode }}
                    • Runtime: {{ time_since_change | round(1) }}min (min: {{ runtime_min }}min)
                    • Action: Turning AC OFF (target achieved)
              level: warning

      # Turn off the AC
      # v3.11.13 FIX: Update helper_change BEFORE turn_off to prevent false Override detection
      - condition: template
        value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
      - service: input_datetime.set_datetime
        target:
          entity_id: !input helper_last_change
        data:
          datetime: "{{ now() }}"
        continue_on_error: true

      # Update expected_hvac BEFORE turn_off (this is correct - tells detection what we expect)
      - if:
          - condition: template
            value_template: "{{ helper_expected_hvac not in [none, '', 'unavailable', 'unknown'] }}"
        then:
          - service: input_text.set_value
            target:
              entity_id: "{{ helper_expected_hvac }}"
            data:
              value: "off"
            continue_on_error: true

      # v4.6.5: Small delay for helper propagation
      - delay:
          milliseconds: 200

      # v5.1.2 FIX: Check comfort_zone_action before turning off - respect fan_only preference
      - choose:
          # User wants Fan Only mode when target reached
          - conditions:
              - condition: template
                value_template: "{{ comfort_zone_action == 'fan_only' }}"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ debug_enabled }}"
                then:
                  - service: system_log.write
                    data:
                      message: >
                        🌀 {{ room_name | upper }} SWITCHING TO FAN ONLY MODE

                        📊 Status:
                            • Target reached: {{ current_temp }}°C
                            • comfort_zone_action: fan_only
                            • Switching from {{ last_mode }} to fan_only mode
                      level: warning

              # v5.1.2 FIX: Use MANDATORY rapid batched service call pattern for BRP069/BRP084
              # CRITICAL: Must follow exact pattern from CLAUDE.md to avoid firmware issues
              - repeat:
                  for_each: "{{ climate_list }}"
                  sequence:
                    # FIRST: Set HVAC mode to fan_only (using set_temperature service)
                    - service: climate.set_temperature
                      target:
                        entity_id: "{{ repeat.item }}"
                      data:
                        hvac_mode: "fan_only"
                        temperature: "{{ target_temp }}"
                      continue_on_error: false

                    # v5.4.0: Delay for BRP084 semaphore compatibility
                    - delay:
                        milliseconds: 500

                    # SECOND: Set fan mode sequentially
                    # v5.2.5 FIX: Use user-configured fan_only_fan_speed instead of hardcoded "Auto"
                    - service: climate.set_fan_mode
                      target:
                        entity_id: "{{ repeat.item }}"
                      data:
                        fan_mode: "{{ selected_fan_only_fan_mode }}"
                      continue_on_error: false

                    # v5.4.0: Delay for BRP084 semaphore compatibility
                    - delay:
                        milliseconds: 500

                    # THIRD: Set swing mode sequentially
                    - service: climate.set_swing_mode
                      target:
                        entity_id: "{{ repeat.item }}"
                      data:
                        swing_mode: "{{ validated_swing_mode }}"
                      continue_on_error: true

              # Update expected fan helper for fan_only mode
              - service: input_text.set_value
                target:
                  entity_id: !input helper_expected_fan
                data:
                  value: "{{ selected_fan_only_fan_mode }}"
                continue_on_error: true

              # Update mode helper to track fan_only state
              - service: input_text.set_value
                target:
                  entity_id: !input helper_last_mode
                data:
                  value: "comfort_fan_only"
                continue_on_error: true

              # v5.1.2 FIX: Update snapshot for fan_only mode
              - if:
                  - condition: template
                    value_template: "{{ helper_last_command not in [none, 'unavailable', 'unknown'] }}"
                then:
                  - variables:
                      fan_snapshot: "hvac=fan_only,temp=0,fan=unknown,swing=unknown"
                      fan_checksum: "5"
                  - service: input_text.set_value
                    target:
                      entity_id: "{{ helper_last_command }}"
                    data:
                      value: "{{ fan_snapshot }}"
                    continue_on_error: true
                  - service: input_number.set_value
                    target:
                      entity_id: "{{ helper_state_checksum }}"
                    data:
                      value: "{{ fan_checksum }}"
                    continue_on_error: true

        # Default: Turn OFF (original behavior)
        default:
          # v7.2.0 FIX: Move helper updates BEFORE climate.turn_off to survive mode:restart
          # When climate.turn_off fires, climate_state_change trigger restarts the automation,
          # killing any code after turn_off. By updating helpers first, off-time protection works.
          - service: input_text.set_value
            target:
              entity_id: !input helper_last_mode
            data:
              value: "off"
            continue_on_error: true

          - service: input_datetime.set_datetime
            target:
              entity_id: !input helper_mode_start_time
            data:
              datetime: "{{ now() }}"
            continue_on_error: true

          - service: climate.turn_off
            target:
              entity_id: !input climate_entities
            continue_on_error: true

          # v5.1.2 FIX: Update snapshot after turn_off to prevent false override detection
          - if:
              - condition: template
                value_template: "{{ helper_last_command not in [none, 'unavailable', 'unknown'] }}"
            then:
              - variables:
                  update_snapshot: "hvac=off,temp=0,fan=unknown,swing=unknown"
                  update_checksum: "0"
              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_last_command }}"
                data:
                  value: "{{ update_snapshot }}"
                continue_on_error: true
              - service: input_number.set_value
                target:
                  entity_id: "{{ helper_state_checksum }}"
                data:
                  value: "{{ update_checksum }}"
                continue_on_error: true
              # v5.3.14 FIX: Update command timestamp for grace period calculation
              - if:
                  - condition: template
                    value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
                then:
                  - service: input_datetime.set_datetime
                    target:
                      entity_id: "{{ helper_change }}"
                    data:
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                    continue_on_error: true
              - if:
                  - condition: template
                    value_template: "{{ debug_enabled }}"
                then:
                  - service: system_log.write
                    data:
                      message: >
                        📸 {{ room_name | upper }} SNAPSHOT UPDATED (Target Reached - Turn OFF)
                            • New Snapshot: {{ update_snapshot }}
                      level: warning

      # v5.2.4 FIX: Update mode_start_time for off-time protection - MUST be unconditional
      - service: input_datetime.set_datetime
        target:
          entity_id: !input helper_mode_start_time
        data:
          datetime: "{{ now() }}"
        continue_on_error: true

  # Debug: Show which conditions were evaluated but not met
  - if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - service: system_log.write
        data:
          message: >
            🔍 {{ room_name | upper }} DEBUG: Choose block completed - no conditions matched

            📊 Final Summary:
                • should_activate: {{ should_activate }}
                • smart_presence_active: {{ smart_presence_active }}
                • current_temp: {{ current_temp }}°C
                • Control mode: {{ control_mode }}
                • AC state: {{ actual_ac_state }}
                • Time since change: {{ time_since_change | round(1) }}min
                • Room presence: {{ room_presence_detected }}
                • smart_behavior: {{ smart_behavior }}
                • extreme_temp_detected: {{ extreme_temp_detected }}

            🌡️ Thresholds that were checked:
                • Cooling: {{ current_temp }} > {{ comfort_max_temp }} = {{ current_temp > comfort_max_temp }}
                • Heating: {{ current_temp }} < {{ comfort_min_temp }} = {{ current_temp < comfort_min_temp }}
                • In Comfort Zone: {{ comfort_min_temp }} ≤ {{ current_temp }} ≤ {{ comfort_max_temp }} = {{ current_temp >= comfort_min_temp and current_temp <= comfort_max_temp }}
                • Escalation: {{ should_escalate }}
          level: warning


  # STATE SYNCHRONIZATION: Handle helper/AC mismatch (e.g., after HA restart)
  # v3.11.8 FIX: Expanded to catch heating/cooling mode mismatches, not just off/on mismatches
  # If helper says "off" but AC is running, OR helper says heating but AC is cooling (or vice versa)
  # v3.18.17: SKIP state sync when AC is in fan_only or dry mode
  # These modes are manual/user-controlled and should not be interfered with
  - if:
      - condition: template
        value_template: >
          {% set actual_hvac = states(climate_list[0]) | default('off') %}
          {% set is_unsupported_mode = actual_hvac in ['fan_only', 'dry'] %}
          {% set helper_is_heating = last_mode == 'heating' %}
          {% set helper_is_cooling = last_mode == 'cooling' %}
          {% set ac_is_heating = actual_hvac in ['heat'] %}
          {% set ac_is_cooling = actual_hvac in ['cool'] %}
          {{
            not is_unsupported_mode and (
              (last_mode == 'off' and actual_ac_state == 'on') or
              (helper_is_heating and ac_is_cooling) or
              (helper_is_cooling and ac_is_heating)
            )
          }}
    then:
      # Determine what the AC is probably doing based on current temperature
      # v3.11.8 FIX: Respect enable_cooling/enable_heating flags - don't guess heating mode if heating disabled!
      - variables:
          # v3.11.14 FIX: Check if AC is in continue mode FIRST before calculating probable_mode
          # This prevents State Sync from setting helper to "off" when AC should keep running
          # in continue mode (pursuing overshoot target below normal thresholds)
          in_continue_mode_cooling_check: >
            {% set actual_hvac = states(climate_list[0]) | default('off') %}
            {% set overshoot_target = target_temp - target_overshoot %}
            {{ enable_cooling
               and actual_hvac in ['cool']
               and current_temp > overshoot_target
               and current_temp <= comfort_max_temp }}

          in_continue_mode_heating_check: >
            {% set actual_hvac = states(climate_list[0]) | default('off') %}
            {% set overshoot_target = target_temp + target_overshoot %}
            {{ enable_heating
               and actual_hvac in ['heat']
               and current_temp < overshoot_target
               and current_temp >= comfort_min_temp }}

          probable_mode: >
            {% if enable_cooling and current_temp > comfort_max_temp %}
              cooling
            {% elif enable_heating and current_temp < comfort_min_temp %}
              heating
            {% elif in_continue_mode_cooling_check %}
              {# v4.0.0: Simplified - just show 'cooling' (no tier modes) #}
              cooling
            {% elif in_continue_mode_heating_check %}
              {# v4.0.0: Simplified - just show 'heating' (no tier modes) #}
              heating
            {% else %}
              off
            {% endif %}

          # v3.9.31 CRITICAL FIX: Check if AC is in continue mode pursuing overshoot target
          # Don't turn off AC if it's still trying to reach the overshoot target
          # v3.11.8 FIX: Only apply continue mode when AC was ALREADY running in cooling/heating
          # Prevents false activation when entering room at comfortable temp above overshoot target
          # v3.11.13 FIX: Use actual_hvac (AC state) instead of last_mode (helper state)
          # Fixes state sync turning off AC prematurely when helper out of sync
          # v3.11.14 FIX: Use pre-calculated continue mode checks to avoid duplication
          in_continue_mode_cooling: "{{ in_continue_mode_cooling_check }}"

          in_continue_mode_heating: "{{ in_continue_mode_heating_check }}"

          should_be_running: >
            {% set actual_hvac_mode = states(climate_list[0]) | default('off') %}
            {% set is_unsupported_mode = actual_hvac_mode in ['fan_only', 'dry'] %}
            {{ (probable_mode != 'off' or in_continue_mode_cooling or in_continue_mode_heating) and not is_unsupported_mode }}

      - if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - service: system_log.write
            data:
              message: >
                🔄 {{ room_name | upper }} STATE SYNC: Helper/AC mismatch detected

                📊 Mismatch Details:
                    • Helper Mode: {{ last_mode }} (says AC should be OFF)
                    • Actual AC State: {{ actual_ac_state }} (AC is ON)
                    • Current Temp: {{ current_temp }}°C
                    • Target Temp: {{ target_temp }}°C
                    • Overshoot Target: {% if enable_cooling %}{{ (target_temp - target_overshoot) | round(1) }}°C (cooling){% elif enable_heating %}{{ (target_temp + target_overshoot) | round(1) }}°C (heating){% else %}N/A{% endif %}
                    • Comfort Zone: {{ comfort_min_temp }}-{{ comfort_max_temp }}°C

                🤔 Analysis:
                    • Probable Mode: {{ probable_mode }}
                    • In Continue Mode (Cooling): {{ in_continue_mode_cooling }}
                    • In Continue Mode (Heating): {{ in_continue_mode_heating }}
                    • Should AC Be Running: {{ should_be_running }}

                🛠️ Action: {{ 'Updating helper to match AC operation' if should_be_running else 'Turning OFF AC (overshoot target reached)' }}
                💡 Reason: {% if should_be_running %}Helper out of sync - AC running but helper says "off" (possible causes: HA restart, manual control, or helper update lag){% elif in_continue_mode_cooling or in_continue_mode_heating %}AC in continue mode - pursuing overshoot target{{ ' (cooling to ' + (target_temp - target_overshoot) | round(1) | string + '°C)' if in_continue_mode_cooling else ' (heating to ' + (target_temp + target_overshoot) | round(1) | string + '°C)' if in_continue_mode_heating }}{% else %}AC is ON but overshoot target reached - no further cooling/heating needed (possible causes: manual turn-on, another automation, or lingering AC state){% endif %}
              level: warning

      # If AC should be running, update helper to track it
      # v3.18.6 CRITICAL FIX: Do NOT update helper_change during state sync!
      # State sync is housekeeping to keep helpers in sync with reality.
      # Updating helper_change blocks manual override detection for 45 seconds.
      # When user turns AC on → state sync runs → helper_change updated → within_hardware_delay=true → override blocked!
      - if:
          - condition: template
            value_template: "{{ should_be_running }}"
        then:
          - service: input_text.set_value
            target:
              entity_id: !input helper_last_mode
            data:
              value: "{{ probable_mode }}"
            continue_on_error: true

          # v3.18.6: REMOVED helper_change update - only update last_mode for tracking
          # helper_change should only be updated when automation actively makes a control decision
          # NOT when passively syncing state

          # v3.18.6 CRITICAL FIX: Do NOT update helper_expected_hvac during state sync!
          # State sync is PASSIVE - it's detecting reality, not making decisions.
          # When user manually turns AC on → state sync updates last_mode='cooling' or 'heating' for tracking
          # BUT expected_hvac should stay at its old value (likely 'off')
          # This allows manual override detection to work:
          #   - last_mode='off' (old value before state sync)
          #   - expected_hvac='off' (what automation last commanded)
          #   - actual_state='on' (user turned it on)
          #   - Result: is_manual_on=TRUE → Override activates!
          #
          # If we set expected_hvac='cool' here, it blocks override:
          #   - automation_expects_on=TRUE (because expected_hvac='cool')
          #   - Result: is_manual_on=FALSE → Override blocked!
          #
          # State sync should ONLY update tracking helpers (last_mode, mode_start_time)
          # NOT command helpers (expected_hvac, expected_fan, expected_swing)

          # Update mode start time helper for off-time protection tracking
          - if:
              - condition: template
                value_template: "{{ helper_mode_time not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: !input helper_mode_start_time
                data:
                  datetime: "{{ now() }}"
                continue_on_error: true

          - if:
              - condition: template
                value_template: "{{ debug_enabled }}"
            then:
              - service: system_log.write
                data:
                  message: >
                    ✅ {{ room_name | upper }} STATE SYNC: Helper updated to {{ probable_mode }}
                    📋 AC running correctly for current temp ({{ current_temp }}°C) - helper synced, will continue operation
                    {% if in_continue_mode_cooling %}🎯 Continue mode: Cooling to overshoot target {{ (target_temp - target_overshoot) | round(1) }}°C{% elif in_continue_mode_heating %}🎯 Continue mode: Heating to overshoot target {{ (target_temp + target_overshoot) | round(1) }}°C{% else %}💡 Helper was "off" but AC should be running - restored tracking{% endif %}
                  level: warning

      # If AC should NOT be running (temp in comfort zone), turn it off
      - if:
          - condition: template
            value_template: "{{ not should_be_running }}"
        then:
          # v3.13.2 FIX: Update helper_change BEFORE turn_off to prevent false Override detection
          - condition: template
            value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
          - service: input_datetime.set_datetime
            target:
              entity_id: !input helper_last_change
            data:
              datetime: "{{ now() }}"
            continue_on_error: true

          # v3.13.17 FIX: Update helpers BEFORE turn_off to prevent false override
          - if:
              - condition: template
                value_template: "{{ helper_expected_hvac not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_expected_hvac }}"
                data:
                  value: "off"
                continue_on_error: true

          - service: input_text.set_value
            target:
              entity_id: !input helper_last_mode
            data:
              value: "off"
            continue_on_error: true

          # v5.2.4 FIX: Update mode_start_time for off-time protection
          - service: input_datetime.set_datetime
            target:
              entity_id: !input helper_mode_start_time
            data:
              datetime: "{{ now() }}"
            continue_on_error: true

          - repeat:
              for_each: "{{ climate_list }}"
              sequence:
                # v6.5.2 CRITICAL FIX: Update snapshot BEFORE sending command
                - if:
                    - condition: template
                      value_template: "{{ helper_last_command not in [none, 'unavailable', 'unknown'] }}"
                  then:
                    - service: input_text.set_value
                      target:
                        entity_id: "{{ helper_last_command }}"
                      data:
                        value: "hvac=off,temp=0,fan=unknown,swing=unknown"
                      continue_on_error: true
                    - service: input_number.set_value
                      target:
                        entity_id: "{{ helper_state_checksum }}"
                      data:
                        value: "0"
                      continue_on_error: true

                # v6.5.4: Use only set_hvac_mode - turn_off is redundant and causes race condition
                # The redundant turn_off was triggering false "physical remote turn-ON" override
                # because _last_known_pow was already set to '0' by set_hvac_mode, but device
                # hadn't processed it yet, so pydaikin saw pow=1 and fired override event
                - service: climate.set_hvac_mode
                  target:
                    entity_id: "{{ repeat.item }}"
                  data:
                    hvac_mode: "off"
                  continue_on_error: true

          - if:
              - condition: template
                value_template: "{{ debug_enabled }}"
            then:
              - service: system_log.write
                data:
                  message: >
                    ✅ {{ room_name | upper }} STATE SYNC: AC turned OFF
                    📋 Temperature {{ current_temp }}°C - overshoot target reached
                    🎯 Overshoot target: {% if enable_cooling %}{{ (target_temp - target_overshoot) | round(1) }}°C (cooling){% elif enable_heating %}{{ (target_temp + target_overshoot) | round(1) }}°C (heating){% else %}{{ target_temp }}°C{% endif %}
                    💡 Helper was "off" but AC was running - turned off after reaching overshoot target
                  level: warning

  # v3.9.44 STATE SYNC REVERSE: Helper says AC should be running, but AC is OFF
  # This happens when automation turns off AC but helper doesn't update (rare edge case)
  # Without this, manual override keeps triggering because of the mismatch
  # IMPORTANT: Must run even if override is active (to break the catch-22 loop)
  # Don't sync immediately after sending commands - give AC hardware time to respond
  - if:
      - condition: template
        value_template: "{{ last_mode in ['cooling', 'heating', 'eco', 'bed_comfort_eco', 'bed_comfort_quiet', 'bed_eco_fan_only', 'comfort_fan_only', 'stability_fan_only'] and actual_ac_state == 'off' and time_since_change > 30 }}"
    then:
      - if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - service: system_log.write
            data:
              message: >
                🔄 {{ room_name | upper }} STATE SYNC REVERSE: Helper/AC mismatch detected (v3.9.44 FIX)

                📊 Mismatch Details:
                    • Helper Mode: {{ last_mode }} (says AC should be running)
                    • Actual AC State: {{ actual_ac_state }} (AC is OFF)
                    • Current Temp: {{ current_temp }}°C
                    • Target Temp: {{ target_temp }}°C
                    • Time since last change: {{ time_since_change | round(1) }}min

                🔧 Analysis:
                    • AC was probably turned off by automation (temperature reached)
                    • Helper stuck at "{{ last_mode }}" instead of "off"
                    • Without fix: Manual override keeps triggering on every check

                ✅ Action: Syncing helper to "off" to match reality
              level: warning

      # Sync helper to match reality - AC is off
      - service: input_text.set_value
        target:
          entity_id: !input helper_last_mode
        data:
          value: "off"
        continue_on_error: true

      # v3.11.0: Override flag removed - Override is now a control mode

      - if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - service: system_log.write
            data:
              message: >
                ✅ {{ room_name | upper }} STATE SYNC REVERSE: Helper updated to "off"
                📋 Helper now matches AC state - manual override cleared automatically
              level: warning

  # v3.1.6/v3.1.7 helper_change update REMOVED - caused false override re-triggers
  # The update ran even when choose block had no actions, causing override re-activation
  # Proper fix is in the manual detection logic itself (see manual_override_detection variable)

  # v3.18.14: SMART MODE NO PRESENCE - Turn off AC when no confirmed presence
  # v6.6.2: Added bed_occupied safeguard - prevents turn-off if bed sensor shows occupancy
  #         even if smart_presence_active fails due to mmWave sensor disconnection
  - if:
      - condition: template
        value_template: "{{ control_mode == 'Smart' and not smart_presence_active and not bed_occupied and actual_ac_state == 'on' and last_mode not in ['auto_off_off', 'auto_off_eco', 'auto_off_fan_only'] }}"
    then:
      - if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - service: system_log.write
            data:
              message: >
                ⏹️ {{ room_name | upper }} SMART MODE - TURNING OFF (NO PRESENCE)

                📊 Status:
                    • Last Mode: {{ last_mode }}
                    • AC State: {{ actual_ac_state }}
                    • Presence: None ({{ minutes_since_presence | round(0) }}min ago)
                    • Bed Occupied: {{ bed_occupied }}
                    • Action: Turning off AC
              level: warning

      # v6.5.2 CRITICAL FIX: Update snapshot BEFORE sending command
      # This is the main "SMART MODE NO PRESENCE" turn-off path
      - if:
          - condition: template
            value_template: "{{ helper_last_command not in [none, 'unavailable', 'unknown'] }}"
        then:
          - service: input_text.set_value
            target:
              entity_id: "{{ helper_last_command }}"
            data:
              value: "hvac=off,temp=0,fan=unknown,swing=unknown"
            continue_on_error: true
          - service: input_number.set_value
            target:
              entity_id: "{{ helper_state_checksum }}"
            data:
              value: "0"
            continue_on_error: true

      # v7.2.0 FIX: Move helper updates BEFORE climate.turn_off to survive mode:restart
      - service: input_text.set_value
        target:
          entity_id: !input helper_last_mode
        data:
          value: "smart_off"
        continue_on_error: true

      - service: input_datetime.set_datetime
        target:
          entity_id: !input helper_mode_start_time
        data:
          datetime: "{{ now() }}"
        continue_on_error: true

      # v4.4.1 FIX: Use climate_list variable instead of !input (invalid in action section)
      - service: climate.turn_off
        target:
          entity_id: "{{ climate_list }}"

      # v4.2.1: Verify AC was turned off correctly, retry if not
      - delay:
          milliseconds: 500
      - repeat:
          for_each: "{{ climate_list }}"
          sequence:
            - if:
                - condition: template
                  value_template: "{{ states(repeat.item) not in ['off', 'unavailable'] }}"
              then:
                - service: climate.turn_off
                  target:
                    entity_id: "{{ repeat.item }}"
                  continue_on_error: true

      - service: input_datetime.set_datetime
        target:
          entity_id: !input helper_last_change
        data:
          datetime: "{{ now() }}"

  # v5.0.0: Update state machine helper on every run
  - if:
      - condition: template
        value_template: "{{ helper_state_machine not in [none, '', 'unavailable', 'unknown'] }}"
    then:
      - service: input_select.select_option
        target:
          entity_id: "{{ helper_state_machine }}"
        data:
          option: "{{ current_state_machine }}"
        continue_on_error: true

  # v5.1.1: Update temperature history ONLY on periodic_check trigger for sliding window temp_change_rate
  # This prevents rapid oscillations from helper updates on every automation run (presence, state changes)
  # Updated every check_interval (user-configurable) to maintain stable sliding window
  - if:
      - condition: template
        value_template: >
          {{
            trigger.id == 'periodic_check' and
            helper_temp_history not in [none, '', 'unavailable', 'unknown']
          }}
    then:
      - service: input_number.set_value
        target:
          entity_id: "{{ helper_temp_history }}"
        data:
          value: "{{ current_temp }}"
        continue_on_error: true

  # v5.0.6 CRITICAL: FINAL SNAPSHOT SYNC - Safety net for any missed service calls
  # This ensures snapshot is ALWAYS synced with actual AC state at end of automation run
  # Even if we missed a service call location, this will catch it
  - if:
      - condition: template
        value_template: "{{ helper_last_command not in [none, 'unavailable', 'unknown'] and climate_list | length > 0 }}"
    then:
      - variables:
          final_actual_hvac: "{{ states(climate_list[0]) }}"
          final_actual_temp: "{{ state_attr(climate_list[0], 'temperature') | float(22) | round(1) }}"
          final_actual_fan: "{{ state_attr(climate_list[0], 'fan_mode') | default('unknown') }}"
          final_actual_swing: "{{ state_attr(climate_list[0], 'swing_mode') | default('unknown') }}"
          final_snapshot: "hvac={{ final_actual_hvac }},temp={{ final_actual_temp }},fan={{ final_actual_fan }},swing={{ final_actual_swing }}"
          final_checksum: >
            {% set hvac_codes = {'off': 0, 'cool': 1, 'heat': 2, 'auto': 3, 'dry': 4, 'fan_only': 5, 'heat_cool': 6} %}
            {{ ((final_actual_temp * 1000) + (final_actual_fan | string | length) + (final_actual_swing | string | length) + hvac_codes.get(final_actual_hvac, 99)) | int(0) }}

      - service: input_text.set_value
        target:
          entity_id: "{{ helper_last_command }}"
        data:
          value: "{{ final_snapshot }}"
        continue_on_error: true

      - service: input_number.set_value
        target:
          entity_id: "{{ helper_state_checksum }}"
        data:
          value: "{{ final_checksum }}"
        continue_on_error: true

      - if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - service: system_log.write
            data:
              message: >
                🔒 {{ room_name | upper }} FINAL SNAPSHOT SYNC
                    • Snapshot: {{ final_snapshot }}
                    • Checksum: {{ final_checksum }}
                    • Source: Actual AC state (safety net)
              level: warning

  # Debug: No conditions matched
  - if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - service: system_log.write
        data:
          message: >
            [18/18] ✅ {{ room_name | upper }} CLIMATE CONTROL: All Good

            {% if (last_mode == 'cooling' or last_mode == 'heating') and actual_ac_state == 'on' %}🔄 AC Status:
                • Mode: {{ last_mode|title }} active
                • Current Temperature: {{ current_temp }}°C
            {% if last_mode == 'cooling' %}
            🎯 Cooling Targets:
                • Comfort Temperature: {{ target_temp }}°C{% if target_overshoot > 0 %}
                • Overshoot Target: {{ (target_temp - target_overshoot) | round(1) }}°C
                • Distance to Target: {{ (current_temp - (target_temp - target_overshoot)) | round(1) }}°C away{% endif %}
            {% elif last_mode == 'heating' %}
            🎯 Heating Targets:
                • Comfort Temperature: {{ target_temp }}°C{% if target_overshoot > 0 %}
                • Overshoot Target: {{ (target_temp + target_overshoot) | round(1) }}°C
                • Distance to Target: {{ ((target_temp + target_overshoot) - current_temp) | round(1) }}°C away{% endif %}
            {% endif %}{% elif current_temp >= comfort_min_temp and current_temp <= comfort_max_temp and actual_ac_state == 'off' %}🎯 Status:
                • Temperature: {{ current_temp }}°C is perfect
                • AC State: Off{% else %}⏸️ Status:
                • No action required right now{% endif %}

            📋 Technical Details:
                • Temperature: {{ current_temp }}°C
                • Occupancy: {% if room_presence_detected %}Room occupied{% elif anyone_home %}Home but elsewhere{% elif approaching_home %}Approaching{% else %}Away{% endif %}
                • Current Mode: {% if should_activate and (last_mode == 'cooling' or last_mode == 'heating') %}{{ last_mode|title }}{% if dynamic_enabled and (final_escalation_level | int(0)) > 0 %} - ESCALATING L{{ final_escalation_level }} 🔼{% elif dynamic_enabled and deescalation_level > 0 %} - DE-ESCALATING L{{ deescalation_level }} 🔽{% elif dynamic_enabled and current_effectiveness >= 80 %} - EFFECTIVE ({{ current_effectiveness }}%) ⚖️{% endif %}{% elif actual_ac_state == 'off' %}OFF ⚫{% elif current_temp >= comfort_min_temp and current_temp <= comfort_max_temp %}IDLE - COMFORT ZONE{% if dynamic_enabled and deescalation_level > 0 %} (DE-ESCALATED L{{ deescalation_level }}) 🔽{% endif %} ✅{% elif should_activate %}MONITORING ⏸️{% else %}STANDBY{% if last_mode != 'off' %} - LAST: {{ last_mode|title }}{% endif %}{% endif %}
          level: warning

mode: restart
