    # ===========================================
    # HELP & DOCUMENTATION
    # ===========================================
    help_section:
      name: "Help & Documentation"
      icon: mdi:help-circle
      collapsed: true
      description: "Detailed explanations for complex features. These are information-only and don't affect automation behavior."
      input:
        help_presence_modes:
          name: "Understanding Presence Validation Modes"
          description: |
            **How presence sensors work together** to detect room occupancy:

            **RECOMMENDED MODES:**
            - **BLE_MOTION** - BLE + Motion (BOTH required) - Best for bedrooms, prevents motion blips
            - **BLE_BED** - BLE + Bed sensor (BOTH required) - Best for sleep-only detection
            - **BLE_SMART** - BLE + (Motion OR Bed) - Intelligent: awake=motion, sleeping=bed sensor

            **SINGLE SENSOR MODES (Use with caution):**
            - **MOTION_ONLY** - Motion sensor only - WARNING: Random motion blips will turn on AC!
            - **BLE_ONLY** - BLE sensor only - WARNING: Phone in adjacent room will turn on AC!
            - **BED_ONLY** - Bed/occupancy sensor only - Reliable for beds with weight sensors

            **FLEXIBLE MODES:**
            - **ANY** - Any sensor triggers (most responsive, may have false positives)
            - **ALL** - All sensors must agree (most accurate, may miss presence)
            - **MAJORITY** - Most sensors must agree (3+ sensors recommended)
            - **BLE_PLUS** - BLE + at least one other sensor

            **Recommendations by Room:**
            - **Master Bedroom**: BLE_MOTION or BLE_SMART (prevents motion blips)
            - **Guest Bedroom**: BED_ONLY (only cool while sleeping)
            - **Living Room**: BLE_MOTION or BLE_PLUS (prevent false triggers)
            - **Office**: BLE_MOTION (ensures you're actually there)
            - **Single Sensor Setup**: Use MOTION_ONLY/BLE_ONLY with 5+ min confirmation delay
          default: "info_only"
          selector:
            constant:
              value: "info_only"

        help_temperature_aggressiveness:
          name: "Understanding Response Aggressiveness"
          description: |
            **Controls how quickly AC escalates to maximum power** when temperature is outside comfort zone.

            **What each level does:**
            - **1 (Gentle):** Slow escalation, most efficient, quieter operation
            - **2 (Balanced):** Recommended for most rooms
            - **3 (Moderate):** Faster response for larger temperature gaps
            - **4-5 (Aggressive):** Maximum response speed, higher power consumption

            **When to increase:**
            - Room takes too long to reach target temperature
            - Large temperature gaps (5°C+) from target
            - High-traffic areas needing quick comfort

            **When to decrease:**
            - Noise-sensitive environments (bedrooms at night)
            - Energy efficiency is priority
            - Small rooms that heat/cool quickly
          default: "info_only"
          selector:
            constant:
              value: "info_only"

        help_escalation_system:
          name: "Understanding Dynamic Escalation"
          description: |
            **How the AC escalation system works:**

            The blueprint uses a 5-level escalation system (L0-L4) that automatically adjusts fan speed and AC power based on temperature progress.

            **Level Progression:**
            - **L0:** Eco mode - minimal power for small temperature gaps
            - **L1:** Low power - gentle approach
            - **L2:** Medium power - balanced
            - **L3:** High power - faster cooling/heating
            - **L4:** Maximum power - full speed for stubborn situations

            **Stall Detection:**
            When temperature isn't changing despite AC running, the system escalates to higher levels. This is controlled by:
            - **Stall Escalation Time:** How long to wait before escalating
            - **Minimum Progress Rate:** Expected temperature change per minute
            - **Extended Stall Multiplier:** How long before taking extreme action

            **Wrong Direction Detection:**
            If temperature moves AWAY from target (getting warmer while cooling), escalation increases faster.
          default: "info_only"
          selector:
            constant:
              value: "info_only"


