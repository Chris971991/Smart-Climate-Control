                • Current Boost Applied: +{{ heat_source_escalation_boost }} levels
          level: warning

  # DEBUG: Dynamic target adjustment
  - if:
      - condition: template
        value_template: "{{ debug_enabled and enable_dynamic_target and (final_escalation_level | int(0)) > 0 }}"
    then:
      - service: system_log.write
        data:
          message: >
            [12/18] 🎯 {{ room_name | upper }} DYNAMIC TARGET ADJUSTMENT

            🔧 Smart Escalation Boost Active:
                • Feature Enabled: {{ enable_dynamic_target }}
                • User Desired Temperature: {{ target_temp }}°C
                • Final Escalation Level: {{ final_escalation_level }}
                • Offset Per Level: {{ escalation_offset }}°C
                • Total Adjustment: {{ (final_escalation_level * escalation_offset) | round(1) }}°C

            🌡️ Target Calculation:
                • Current Mode: {{ last_mode }}
                {% if last_mode == 'cooling' %}
                • Cooling Mode: LOWERING target to make AC work harder
                • Formula: {{ target_temp }}°C - ({{ final_escalation_level }} × {{ escalation_offset }}°C) = {{ adjusted_target }}°C
                • AC will cool to {{ adjusted_target }}°C instead of {{ target_temp }}°C
                • Creates {{ (target_temp - adjusted_target) | round(1) }}°C buffer zone below user target
                {% elif last_mode == 'heating' %}
                • Heating Mode: RAISING target to make AC work harder
                • Formula: {{ target_temp }}°C + ({{ final_escalation_level }} × {{ escalation_offset }}°C) = {{ adjusted_target }}°C
                • AC will heat to {{ adjusted_target }}°C instead of {{ target_temp }}°C
                • Creates {{ (adjusted_target - target_temp) | round(1) }}°C buffer zone above user target
                {% endif %}

            💡 Why This Helps:
                • AC compressor works harder with more aggressive target
                • Combined with Fan Level {{ final_escalation_level }} = maximum effectiveness
                • Buffer zone prevents immediate drift back when escalation reduces
                • Auto-reverts to {{ target_temp }}°C once temperature stable

            ⚙️ Behavior:
                • Target sent to AC: {{ adjusted_target }}°C ({{ "%.1f" | format(adjusted_target - target_temp) }}°C {% if adjusted_target > target_temp %}above{% else %}below{% endif %} user target)
                • Once stable and escalation drops to 0: Returns to {{ target_temp }}°C
          level: warning

  - if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - service: system_log.write
        data:
          message: >
            [13/18] 🔍 {{ room_name | upper }} TEMPERATURE & TIMING LOGIC

            🌡️ Temperature Logic:
                • last_transition: "{{ last_transition }}"
                • hysteresis: {{ hysteresis_tolerance }}°C
                • current_temp: {{ current_temp }}°C
                • comfort_max_temp: {{ comfort_max_temp }}°C
                • comfort_min_temp: {{ comfort_min_temp }}°C
                • time_since_change: {{ time_since_change | round(1) }}min
                • runtime_min: {{ runtime_min }}min
                • time_check: {{ time_since_change > (runtime_min | float(0)) }}
                • mode_check: {{ last_mode != 'cooling' and last_mode != 'heating' }}
                • actual_ac_off: {{ actual_ac_state == 'off' }}
          level: warning

  # Manual Override Debug Logging - v3.3.0 Enhanced Detection

  # Presence Confirmation Delay Debug Logging (Smart Mode)
  - if:
      - condition: template
        value_template: "{{ debug_enabled and control_mode == 'Smart' }}"
    then:
      - service: system_log.write
        data:
          message: >
            [15/18] 👤 {{ room_name | upper }} PRESENCE CONFIRMATION DEBUG

            ⏱️ Delay Configuration:
                • presence_confirmation_delay: {{ presence_confirmation_delay }} minutes
                • presence_timeout (grace period): {{ presence_timeout }} minutes

            🔍 Current Status:
                • room_presence_detected: {{ room_presence_detected }}
                • minutes_with_presence: {{ minutes_with_presence | round(1) }} min
                • minutes_since_presence: {{ minutes_since_presence | round(0) }} min
                • smart_presence_active: {{ smart_presence_active }}

            {% if presence_confirmation_delay > 0 %}
            📋 Confirmation Delay Logic:
                {% if room_presence_detected %}
                ✅ Presence detected NOW:
                    • Time with presence: {{ minutes_with_presence | round(1) }} minutes
                    • Required delay: {{ presence_confirmation_delay }} minutes
                    • Status: {% if minutes_with_presence >= presence_confirmation_delay %}✅ CONFIRMED - Can activate AC{% else %}⏳ WAITING - {{ (presence_confirmation_delay - minutes_with_presence) | round(1) }} min until activation{% endif %}
                {% else %}
                ❌ No presence detected:
                    • Last seen: {{ minutes_since_presence | round(0) }} minutes ago
                    • Grace period: {{ presence_timeout }} minutes
                    • Status: {% if minutes_since_presence < presence_timeout %}⏳ GRACE PERIOD ACTIVE - AC will stay on{% else %}❌ GRACE PERIOD EXPIRED - AC will turn off{% endif %}
                {% endif %}
            {% else %}
            ℹ️ Instant activation enabled (no confirmation delay)
            {% endif %}

            🎯 Final Decision:
                • smart_presence_active: {{ smart_presence_active }}
                • actual_ac_state: {{ actual_ac_state }}
                • time_in_current_mode: {{ time_in_current_mode | round(1) }}min
                • runtime_min: {{ runtime_min }}min
                • Runtime check: {{ (time_in_current_mode | float(0)) < (runtime_min | float(0)) }}
                {% set presence_active = smart_presence_active | string | lower == 'true' %}
                {% if not presence_active and actual_ac_state != 'off' and (time_in_current_mode | float(0)) < (runtime_min | float(0)) %}
                • ⏱️ RUNTIME PROTECTION: AC will continue for {{ (runtime_min - time_in_current_mode) | round(1) }} more minutes
                • AC will: ⏳ STAY ON (compressor protection) then ❌ TURN OFF when runtime met
                {% elif presence_active %}
                • AC will: ✅ STAY ON / ACTIVATE (presence confirmed)
                {% else %}
                • AC will: ❌ TURN OFF / STAY OFF (no presence)
                {% endif %}
          level: warning

  # GLOBAL MANUAL OVERRIDE CHECK - Exit before choose blocks if override is active
  # This prevents automation from turning AC back on when user manually turned it off

  # DEBUG: Log all values IMMEDIATELY before condition evaluation
  - if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - service: system_log.write
        data:
          message: >
            [16/18] 🔍 {{ room_name | upper }} PRE-CONDITION EVALUATION DEBUG

            📊 Variable States (at condition check time):
                • control_mode: {{ control_mode }}
                • is_override_mode: {{ control_mode == 'Override' }}
                • RESULT: {{ 'TRUE - WILL BLOCK' if control_mode == 'Override' else 'FALSE - WILL NOT BLOCK' }}

            🔐 Override Helper States:
                • helper_override_timestamp: {{ helper_override_timestamp if helper_override_timestamp else 'NOT CONFIGURED' }}
                • Timestamp state: {{ states(helper_override_timestamp) if helper_override_timestamp else 'N/A' }}

            ⏱️ Time Calculations:
                {% if control_mode == 'Override' and helper_override_timestamp and states(helper_override_timestamp) not in ['unknown', 'unavailable', ''] %}
                {% set override_time = as_timestamp(states(helper_override_timestamp)) %}
                {% if override_time %}
                {% set time_since_override = (as_timestamp(now()) - override_time) / 3600 %}
                • Time since override: {{ time_since_override | round(2) }} hours
                • Timeout threshold: {{ override_timeout }} hours
                • Will auto-clear in: {{ (override_timeout - time_since_override) | round(2) }} hours
                {% else %}
                • override_time calculation: FAILED (timestamp conversion)
                {% endif %}
                {% else %}
                • override_time calculation: Not in Override mode or helper not available
                {% endif %}
          level: warning

  # v3.11.0: Check if Override mode is active (automation paused)
  - if:
      - condition: template
        value_template: "{{ control_mode == 'Override' }}"
    then:
      - if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - service: system_log.write
            data:
              message: >
                🚫 {{ room_name | upper }} OVERRIDE MODE - AUTOMATION PAUSED

                ⏸️ Automation Paused:
                    • User manually changed AC settings
                    • Override Since: {{ states(helper_override_timestamp) if helper_override_timestamp else 'unknown' }}
                    • Timeout: {{ override_timeout }} hour(s)
                    • Previous mode: {{ states(helper_mode_before_override) if helper_mode_before_override else 'unknown' }}

                🔒 Respecting User Control:
                    • Last mode (helper): {{ states(helper_mode) | default('off') }}
                    • Actual AC state: {{ actual_ac_state }}
                    • All automation actions blocked until override clears

                ℹ️ Override will clear automatically after {{ override_timeout }} hour(s)
                   or immediately if you change control mode
              level: warning
      # Exit immediately - don't process any choose blocks
      - stop: "Override mode active - respecting user's manual changes"

  # v3.17.1 FIX: Proactive helper_change update to prevent race condition false overrides
  # CRITICAL: Update helper_change timestamp BEFORE any climate commands are sent
  # This prevents subsequent automation runs (triggered by climate state changes) from
  # falsely detecting the automation's own actions as manual intervention.
  #
  # Race condition scenario (FIXED):
  # 1. Run #1: Person trigger → Decide to turn on AC → Send climate command
  # 2. AC state changes (off → heat_cool) within 0.2 seconds
  # 3. Run #2: climate_state_change trigger → Calculate manual override detection
  #    - Uses OLD helper_change timestamp (from before Run #1)
  #    - time_since_change > 45 seconds → within_hardware_delay = FALSE
  #    - Detects: last_mode="off", actual="on", not within delay
  #    - RESULT: False positive Override mode activation!
  #
  # Solution: Update helper_change NOW if we're going to take action AND starting a new mode
  # This ensures Run #2 will see fresh timestamp and recognize it's within hardware delay
  # v3.18.6 FIX: REMOVED race condition protection block
  # This block was updating helper_change BEFORE the main choose block ran,
  # which was blocking manual override detection when user manually turned AC on.
  #
  # Problem Scenario:
  # 1. User manually turns AC ON via physical remote
  # 2. Automation triggers
  # 3. State sync sees helper_last_mode='off' but actual AC='on'
  # 4. State sync updates helper_last_mode to 'cooling' or 'heating'
  # 5. should_activate becomes TRUE after state sync
  # 6. Race condition protection sees should_activate=TRUE
  # 7. Updates helper_change to NOW()
  # 8. Manual override check runs immediately after
  # 9. within_hardware_delay=TRUE (only 10 seconds since helper_change updated)
  # 10. is_manual_on=FALSE (blocked by within_hardware_delay)
  # 11. Override doesn't activate → AC turns back off → User frustrated!
  #
  # Solution: Remove this proactive update entirely.
  # The 45-second within_hardware_delay protection is sufficient when helper_change
  # is ONLY updated when automation actually makes a control decision (in choose blocks).
  # State sync is passive housekeeping and should NOT reset the hardware delay window.

  - choose:
      # v3.11.9 FIX: Defensive check - verify Override mode using actual helper state
      # This catches cases where Override was just activated in this same automation run.
      # The control_mode variable may still hold the old value, but the helper entity is already updated.
      - conditions:
          - condition: template
            value_template: >
              {{ control_mode_helper not in [none, '', 'unavailable', 'unknown']
                 and is_state(control_mode_helper, 'Override') }}
        sequence:
          - if:
              - condition: template
                value_template: "{{ debug_enabled }}"
            then:
              - service: system_log.write
                data:
                  message: >
                    🛡️ {{ room_name | upper }} DEFENSIVE CHECK: Override mode detected via helper state
                    • control_mode variable: {{ control_mode }}
                    • control_mode_helper state: {{ states(control_mode_helper) }}
                    • This prevents AC control when Override was just activated
                    • Stopping automation to respect user's manual changes
                  level: warning
          - stop: "Override mode active (helper state check) - respecting user's manual changes"

      # Handle Manual mode - True manual control with optional timeout
      - conditions:
          - condition: template
            value_template: "{{ control_mode == 'Manual' }}"
        sequence:
          # Check if Manual mode timeout has been reached
          - if:
              - condition: template
                value_template: "{{ manual_timeout_hours > 0 }}"
              - condition: template
                value_template: >
                  {% if helper_change and states(helper_change) not in ['unknown', 'unavailable', ''] %}
                    {% set change_timestamp = as_timestamp(states(helper_change)) %}
                    {% if change_timestamp %}
                      {% set time_in_manual = (as_timestamp(now()) - change_timestamp) / 3600 %}
                      {{ time_in_manual >= manual_timeout_hours }}
                    {% else %}
                      false
                    {% endif %}
                  {% else %}
                    false
                  {% endif %}
            then:
              - service: system_log.write
                data:
                  message: >
                    {% set change_timestamp = as_timestamp(states(helper_change)) %}
                    ⏰ {{ room_name | upper }} MANUAL MODE TIMEOUT: Returning to automation
                    • Manual timeout reached: {{ manual_timeout_hours }} hours
                    • Time in manual: {{ ((as_timestamp(now()) - change_timestamp) / 3600) | round(1) if change_timestamp else 'N/A' }}h
                    • Switching back to Smart mode - automation will resume
                    • AC will continue running under normal automation control
                  level: warning

              # Switch back to Smart mode (don't turn off AC)
              # v5.3.19 FIX: Wrapped in if/then to prevent blocking subsequent service calls
              - if:
                  - condition: template
                    value_template: "{{ control_mode_helper not in [none, '', 'unavailable', 'unknown'] }}"
                then:
                  - service: input_select.select_option
                    target:
                      entity_id: "{{ control_mode_helper }}"
                    data:
                      option: "Smart"
                    continue_on_error: true

              - service: input_text.set_value
                target:
                  entity_id: !input helper_last_mode
                data:
                  value: "manual_timeout_return_to_smart"
                continue_on_error: true

              - if:
                  - condition: template
                    value_template: "{{ enable_notifications }}"
                then:
                  - service: !input notification_service
                    data:
                      title: "{{ room_name }} Climate Control"
                      message: "Manual timeout ({{ manual_timeout_hours }}h) - switched back to Smart mode"
                    continue_on_error: true
              - stop: "Manual mode timeout - returned to Smart mode"
            else:
              # Manual mode continues - complete user control
              # v5.3.7 FIX: Wrapped debug in if/then to prevent blocking the stop command
              # CRITICAL BUG: Bare condition was blocking the stop, causing automation to continue
              - if:
                  - condition: template
                    value_template: "{{ debug_enabled }}"
                then:
                  - service: system_log.write
                    data:
                      message: >
                        {% set change_timestamp = as_timestamp(states(helper_change)) %}
                        🎮 {{ room_name | upper }} MANUAL MODE: Full user control active
                        • Temperature: {{ current_temp }}°C
                        • Timeout setting: {{ manual_mode_timeout }} ({{ manual_timeout_hours }}h)
                        {% if manual_timeout_hours > 0 %}
                        • Time remaining: {{ (manual_timeout_hours - ((as_timestamp(now()) - change_timestamp) / 3600)) | round(1) if change_timestamp else 'N/A' }}h
                        {% else %}
                        • No timeout - manual until you change it
                        {% endif %}
                        • FULL CONTROL: Set any temp/fan remotely - NO automation interference
                        • Perfect for pre-conditioning rooms before arrival!
                      level: debug
              - stop: "Manual mode active - user has complete control"

      # v4.0.2: Log when AC unavailable (prevents false manual override)
      - conditions:
          - condition: template
            value_template: "{{ any_ac_unavailable and debug_enabled }}"
        sequence:
          - service: system_log.write
            data:
              message: >
                🔌 {{ room_name | upper }} AC UNAVAILABLE: Skipping manual override detection
                • AC disconnected - this is a known issue
                • Manual override detection disabled while unavailable
                • Automation will resume when AC reconnects
                • AC entity states: {% for entity in climate_list %}{{ entity }}={{ states(entity) }}{% if not loop.last %}, {% endif %}{% endfor %}
              level: warning

      # Skip if manual override is active (user changed AC while in Auto/Smart) - NEVER for mode changes
      - conditions:
          - condition: template
            value_template: "{{ control_mode == 'Override' and manual_override_detection }}"
        sequence:
          - if:
              - condition: template
                value_template: "{{ debug_enabled }}"
            then:
              - service: system_log.write
                data:
                  message: >
                    {% set change_timestamp = as_timestamp(states(helper_change)) %}
                    🔒 {{ room_name | upper }} MANUAL OVERRIDE: Respecting user changes
                    • Manual override detected: {{ manual_override_detection }}
                    • Last mode state: "{{ states(helper_mode) | default('off') }}"
                    • Actual AC state: "{{ actual_ac_state }}"
                    • Override timeout: {{ override_timeout }} hours
                    • Time remaining: {{ (override_timeout - ((as_timestamp(now()) - change_timestamp) / 3600)) | round(1) if change_timestamp else 'N/A' }} hours
                    • AC will maintain user settings until timeout expires
                  level: warning

          # STOP HERE - Respect user's manual changes
          - stop: "Manual override active - respecting user changes"

      # =====================================
      # v7.1.3: PRE-CONDITIONING FAN + TEMPERATURE CORRECTION
      # Simple dedicated section to fix fan speed and apply boost temp when AC is on
      # =====================================
      - conditions:
          - condition: template
            value_template: "{{ is_precond_mode }}"
          - condition: template
            value_template: "{{ states(climate_list[0]) in ['cool', 'heat'] }}"
          - condition: template
            value_template: >
              {% set current_fan = state_attr(climate_list[0], 'fan_mode') %}
              {% set fan_wrong = current_fan != precond_validated_fan_mode %}
              {% set current_temp = state_attr(climate_list[0], 'temperature') | float %}
              {% set ac_state = states(climate_list[0]) %}
              {% set boost_temp = ac_minimum_temp | float(18) if ac_state == 'cool' else ac_maximum_temp | float(30) %}
              {% set temp_wrong = precond_boost_enabled and (current_temp | round(1) != boost_temp | round(1)) %}
              {{ fan_wrong or temp_wrong }}
        sequence:
          - variables:
              precond_ac_state: "{{ states(climate_list[0]) }}"
              precond_boost_temp: "{{ ac_minimum_temp | float(18) if precond_ac_state == 'cool' else ac_maximum_temp | float(30) }}"
              precond_current_temp: "{{ state_attr(climate_list[0], 'temperature') | float }}"
              precond_current_fan: "{{ state_attr(climate_list[0], 'fan_mode') }}"
              precond_fan_needs_fix: "{{ precond_current_fan != precond_validated_fan_mode }}"
              precond_temp_needs_fix: "{{ precond_boost_enabled and (precond_current_temp | round(1) != precond_boost_temp | round(1)) }}"
          - service: system_log.write
            data:
              message: >
                🎯 {{ room_name | upper }} PRE-CONDITIONING CORRECTION:
                • Current fan: {{ precond_current_fan }} → Target: {{ precond_validated_fan_mode }} (fix: {{ precond_fan_needs_fix }})
                • Current temp: {{ precond_current_temp }}°C → Boost: {{ precond_boost_temp }}°C (fix: {{ precond_temp_needs_fix }}, enabled: {{ precond_boost_enabled }})
                • AC mode: {{ precond_ac_state }}
              level: warning
          # Fix fan if needed
          - if:
              - condition: template
                value_template: "{{ precond_fan_needs_fix }}"
            then:
              - service: climate.set_fan_mode
                target:
                  entity_id: "{{ climate_list[0] }}"
                data:
                  fan_mode: "{{ precond_validated_fan_mode }}"
          # Fix temperature if boost enabled and temp is wrong
          - if:
              - condition: template
                value_template: "{{ precond_temp_needs_fix }}"
            then:
              - service: climate.set_temperature
                target:
                  entity_id: "{{ climate_list[0] }}"
                data:
                  temperature: "{{ precond_boost_temp }}"

      # =====================================
      # CONTINUE MODE - INTELLIGENT FAN ADJUSTMENT
      # Dynamically adjust fan speed when already cooling/heating within comfort zone
      # Pursuing overshoot target with smart power management
      # =====================================
      - conditions:
          # Global activation check
          # v7.1.1 FIX: Pre-conditioning bypasses should_activate - it becomes false once temp
          # reaches target threshold, but we still need to run CONTINUE MODE to apply High fan
          - condition: template
            value_template: "{{ should_activate or is_precond_mode }}"

          # Already in cooling mode
          # v7.1.2 FIX: Pre-conditioning bypasses this if AC is actually cooling (helper may still show 'off')
          # Note: actual_ac_state is 'on'/'off', so check entity state directly for 'cool'
          - condition: template
            value_template: "{{ last_mode in ['cooling', 'bed_comfort_eco', 'bed_comfort_quiet'] or (is_precond_mode and states(climate_list[0]) == 'cool') }}"

          # Within comfort zone (not overheated)
          # v7.1.0 FIX: Pre-conditioning mode bypasses this check - needs to run CONTINUE MODE
          # to apply precond_fan_mode: High even when room is hot
          - condition: template
            value_template: "{{ current_temp <= comfort_max_temp or is_precond_mode }}"

          # Near overshoot target (within 0.5°C above or below)
          # v4.6.0: Extended to handle maintaining near target, not just approaching it
          # v4.7.1 FIX: Only run Continue Mode if ABOVE overshoot target (haven't reached it yet)
          # Once overshoot_target is reached, fall through to Comfort Zone Action for user's selected behavior
          # v7.1.0 FIX: Pre-conditioning mode bypasses this check - always run to apply High fan
          - condition: template
            value_template: >
              {% set overshoot_target = target_temp - target_overshoot %}
              {{ (current_temp > overshoot_target and current_temp < (comfort_max_temp - 0.1)) or is_precond_mode }}

          # Cooling enabled
          - condition: template
            value_template: "{{ enable_cooling }}"

        sequence:
          # v4.7.1 FIX: Update helper_change timestamp to prevent false manual override detection
          # v5.3.7 FIX: Wrapped in if/then to prevent blocking functional code when helper unavailable
          - if:
              - condition: template
                value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: !input helper_last_change
                data:
                  datetime: "{{ now() }}"
                continue_on_error: true

          - variables:
              # v7.0.0: Use new unified fan control system
              # Replaces old effectiveness/escalation hybrid with clean 3-mode system
              # v7.0.1 FIX: Respect pre-conditioning fan mode when in pre-conditioning
              continue_fan_mode: >
                {% if is_precond_mode and precond_validated_fan_mode != 'Dynamic' %}
                  {{ precond_validated_fan_mode }}
                {% else %}
                  {{ new_fan_mode }}
                {% endif %}

              # HVAC mode stays cool
              continue_hvac_mode: >
                {% set modes = state_attr(climate_list[0], 'hvac_modes') | list %}
                {% if 'cool' in modes %}
                  cool
                {% elif 'Cool' in modes %}
                  Cool
                {% else %}
                  {{ modes[0] if modes else 'cool' }}
                {% endif %}

          # Debug logging for continue mode
          - if:
              - condition: template
                value_template: "{{ debug_enabled }}"
            then:
              - service: system_log.write
                data:
                  message: >
                    🎯 {{ room_name | upper }} CONTINUE MODE - FAN CONTROL v7.0.0

                    📊 Status:
                        • Current Temp: {{ current_temp }}°C
                        • Target: {{ target_temp }}°C (overshoot: {{ target_overshoot }}°C)
                        • Distance: {{ distance_from_target | round(2) }}°C
                        • Temp Change Rate: {{ temp_change_rate | round(3) }}°C/min

                    🌀 Fan Control ({{ fan_control_mode | upper }}):
                        {% if fan_control_mode == 'static' %}
                        • Mode: STATIC - Fixed at {{ static_fan_speed }}
                        {% elif fan_control_mode == 'temperature_band' %}
                        • Mode: TEMPERATURE BAND
                        • Band: {% if distance_from_target <= 1 %}0-1°C{% elif distance_from_target <= 2 %}1-2°C{% elif distance_from_target <= 3 %}2-3°C{% elif distance_from_target <= 4 %}3-4°C{% else %}4+°C{% endif %}
                        • Time Since Change: {{ time_since_fan_change | round(1) }}/{{ fan_band_hold_time }} min
                        {% else %}
                        • Mode: DYNAMIC
                        • Stalling: {{ is_stalling }}
                        • Good Progress: {{ good_progress }}
                        • Time Since Change: {{ time_since_fan_change | round(1) }}/{{ dynamic_hold_time }} min
                        {% endif %}
                        • Base Level: {{ calculated_fan_level_int }}
                        • Environmental Boost: {{ (final_fan_level_int | int) - (calculated_fan_level_int | int) }}
                        • Final Fan: {{ new_fan_mode }}
                        • Fan Changed: {{ fan_mode_changed }}

                    🎯 Pre-conditioning Override Check:
                        • is_precond_mode: {{ is_precond_mode }}
                        • control_mode: {{ control_mode }}
                        • precond_validated_fan_mode: {{ precond_validated_fan_mode }}
                        • continue_fan_mode: {{ continue_fan_mode }}

                    💡 Continue Mode: Using new unified fan control (v7.0.0)
                  level: warning

          # Debug service call parameters BEFORE sending
          - if:
              - condition: template
                value_template: "{{ debug_enabled }}"
            then:
              - service: system_log.write
                data:
                  message: >
                    🔍 {{ room_name | upper }} DEBUG: CONTINUE MODE SERVICE CALL PARAMETERS

                    📊 Service Call Details:
                        • Fan Mode: {{ continue_fan_mode }}
                        • HVAC Mode: {{ continue_hvac_mode }}
                        • Temperature: {{ adjusted_target }}°C
                        • Target Entity: {{ climate_list }}
                  level: warning

          # v4.7.1 FIX: Update expected state helpers BEFORE service calls
          # This prevents false positive manual override detection
          - if:
              - condition: template
                value_template: "{{ helper_expected_fan not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_expected_fan }}"
                data:
                  value: "{{ continue_fan_mode }}"
                continue_on_error: true

          - if:
              - condition: template
                value_template: "{{ helper_expected_hvac not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_expected_hvac }}"
                data:
                  value: "{{ continue_hvac_mode }}"
                continue_on_error: true

          - if:
              - condition: template
                value_template: "{{ helper_expected_temp not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_number.set_value
                target:
                  entity_id: "{{ helper_expected_temp }}"
                data:
                  value: "{{ adjusted_target }}"
                continue_on_error: true

          # v5.0.4: MANDATORY BRP084 SERVICE CALL PATTERN
          # Helper updates above are instant - no delay needed
          # BRP084 Firmware 2.8.0: Fan settings only work when mode is set (not 'off')
          # BRP069 Firmware: Does GET before every set(), preserves settings
          #
          # MANDATORY Pattern: temp+hvac FIRST (turns on AC), then fan immediately after
          # This works for BOTH firmware types.
          - repeat:
              for_each: "{{ climate_list }}"
              sequence:
                # Step 1: Set temperature + HVAC mode in ONE call
                - service: climate.set_temperature
                  target:
                    entity_id: "{{ repeat.item }}"
                  data:
                    temperature: "{{ adjusted_target }}"
                    hvac_mode: "{{ continue_hvac_mode }}"
                  continue_on_error: false  # FAIL LOUDLY

                # Step 2: Delay for BRP084 semaphore compatibility (v5.4.0)
                - delay:
                    milliseconds: 500

                # Step 3: Set fan mode sequentially
                - service: climate.set_fan_mode
                  target:
                    entity_id: "{{ repeat.item }}"
                  data:
                    fan_mode: "{{ continue_fan_mode }}"
                  continue_on_error: false  # FAIL LOUDLY

          # v7.0.0: Update last fan change time helper (for hold time enforcement)
          - if:
              - condition: template
                value_template: "{{ fan_mode_changed and helper_last_fan_change not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: "{{ helper_last_fan_change }}"
                data:
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                continue_on_error: true

          # v5.0.6 FIX: Update snapshot after service calls to prevent false override detection
          # Build snapshot from EXPECTED values (what we commanded), not AC state (might not have updated yet)
          # v5.3.12 FIX: Use calculated values directly instead of potentially stale helpers
          - if:
              - condition: template
                value_template: "{{ helper_last_command not in [none, 'unavailable', 'unknown'] }}"
            then:
              - variables:
                  snapshot_hvac: "{{ continue_hvac_mode }}"
                  snapshot_temp: "{{ adjusted_target }}"
                  snapshot_fan: "{{ continue_fan_mode }}"
                  snapshot_swing: "{{ validated_swing_mode }}"
                  update_snapshot: "hvac={{ snapshot_hvac }},temp={{ snapshot_temp }},fan={{ snapshot_fan }},swing={{ snapshot_swing }}"
                  update_checksum: >
                    {% set hvac_codes = {'off': 0, 'cool': 1, 'heat': 2, 'auto': 3, 'dry': 4, 'fan_only': 5, 'heat_cool': 6} %}
                    {{ ((snapshot_temp * 1000) + (snapshot_fan | string | length) + (snapshot_swing | string | length) + hvac_codes.get(snapshot_hvac, 99)) | int(0) }}

              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_last_command }}"
                data:
                  value: "{{ update_snapshot }}"
                continue_on_error: true

              - service: input_number.set_value
                target:
                  entity_id: "{{ helper_state_checksum }}"
                data:
                  value: "{{ update_checksum }}"
                continue_on_error: true

              # v5.3.14 FIX: Update command timestamp for grace period calculation
              # Even though continue mode doesn't reset mode timer, we MUST update this
              # so that grace period detection works (prevents false override detection)
              - if:
                  - condition: template
                    value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
                then:
                  - service: input_datetime.set_datetime
                    target:
                      entity_id: "{{ helper_change }}"
                    data:
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                    continue_on_error: true

              # Debug log snapshot update
              - if:
                  - condition: template
                    value_template: "{{ debug_enabled }}"
                then:
                  - service: system_log.write
                    data:
                      message: >
                        📸 {{ room_name | upper }} SNAPSHOT UPDATED (Continue Mode)
                            • New Snapshot: {{ update_snapshot }}
                            • New Checksum: {{ update_checksum }}
                            • HVAC: {{ snapshot_hvac }}
                            • Temp: {{ snapshot_temp }}°C
                            • Fan: {{ snapshot_fan }}
                      level: warning

          # v5.3.14 NOTE: helper_change IS updated now (for grace period)
          # The old v4.6.1 comment about not updating helper_change was causing
          # false override detection when continue mode changed fan speeds

      # =====================================
      # v5.2.5: AC RUNNING BUT SHOULDN'T BE - Universal Turn Off Logic
      # Catches cases where AC is running but none of the activation conditions are met
      # Examples: Override cleared, presence lost, temperature drifted outside range
      # =====================================
      - conditions:
          # Automation has control (not in Manual/Override mode)
          - condition: template
            value_template: "{{ should_activate }}"

          # AC is currently running
          - condition: template
            value_template: "{{ actual_ac_state == 'on' }}"

          # NOT in any fan-only maintenance modes (they handle their own lifecycle)
          - condition: template
            value_template: "{{ last_mode not in ['comfort_fan_only', 'bed_eco_fan_only', 'stability_fan_only'] }}"

          # NONE of the activation conditions are true (AC shouldn't be running)
          - condition: template
            value_template: >
              {% set overshoot_target = target_temp - target_overshoot %}
              {% set should_cool = cooling_with_hysteresis and enable_cooling %}
              {% set should_heat = heating_with_hysteresis and enable_heating %}
              {% set in_continue_mode = (
                last_mode in ['cooling', 'heating', 'bed_comfort_eco', 'bed_comfort_quiet'] and
                current_temp > overshoot_target and
                current_temp <= comfort_max_temp
              ) %}
              {% set in_bed_mode = (
                bed_comfort_mode != 'off' and
                bed_occupied
              ) %}
              {{ not (should_cool or should_heat or in_continue_mode or in_bed_mode) }}

        sequence:
          - if:
              - condition: template
                value_template: "{{ debug_enabled }}"
            then:
              - service: system_log.write
                data:
                  message: >
                    🛑 {{ room_name | upper }} AC RUNNING BUT SHOULDN'T BE - STOPPING

                    📊 Current State:
                        • AC State: {{ actual_ac_state }}
                        • Last Mode: {{ last_mode }}
                        • Current Temp: {{ current_temp }}°C
                        • Target: {{ target_temp }}°C
                        • Comfort Zone: {{ comfort_min_temp }}-{{ comfort_max_temp }}°C

                    🔍 Why Stopping:
                        • Should Cool: {{ cooling_with_hysteresis and enable_cooling }}
                        • Should Heat: {{ heating_with_hysteresis and enable_heating }}
                        • Continue Mode: {{ last_mode in ['cooling', 'heating'] and current_temp > (target_temp - target_overshoot) and current_temp <= comfort_max_temp }}
                        • Bed Mode Active: {{ bed_comfort_mode != 'off' and bed_occupied }}
                        • None of above = true → Stopping AC

                    💡 Action: {{ 'Switching to fan-only mode' if comfort_zone_action == 'fan_only' else 'Turning OFF' }}
                  level: warning
                  logger: "blueprints.climate_control.{{ room_name | lower | replace(' ', '_') }}"

          # Jump to the existing turn-off/fan-only logic
          # This reuses the choose block at line ~11737 that respects comfort_zone_action
          - choose:
              # User wants Fan Only mode when target reached
              - conditions:
                  - condition: template
                    value_template: "{{ comfort_zone_action == 'fan_only' }}"
                sequence:
                  - if:
                      - condition: template
                        value_template: "{{ debug_enabled }}"
                    then:
                      - service: system_log.write
                        data:
                          message: >
                            🌀 {{ room_name | upper }} SWITCHING TO FAN ONLY MODE (Sanity Check)

                            📊 Status:
                                • Current: {{ last_mode }}
                                • comfort_zone_action: fan_only
                                • Reason: AC running but no activation conditions met
                          level: warning

                  # v5.1.2 FIX: Use MANDATORY rapid batched service call pattern for BRP069/BRP084
                  - repeat:
                      for_each: "{{ climate_list }}"
                      sequence:
                        # FIRST: Set HVAC mode to fan_only
                        - service: climate.set_temperature
                          target:
                            entity_id: "{{ repeat.item }}"
                          data:
                            hvac_mode: "fan_only"
                            temperature: "{{ target_temp }}"
                          continue_on_error: false

                        # v5.4.0: Delay for BRP084 semaphore compatibility
                        - delay:
                            milliseconds: 500

                        # SECOND: Set fan mode sequentially
                        # v5.2.5 FIX: Use user-configured fan_only_fan_speed instead of hardcoded "Auto"
                        - service: climate.set_fan_mode
                          target:
                            entity_id: "{{ repeat.item }}"
                          data:
                            fan_mode: "{{ selected_fan_only_fan_mode }}"
                          continue_on_error: false

                        # v5.4.0: Delay for BRP084 semaphore compatibility
                        - delay:
                            milliseconds: 500

                        # THIRD: Set swing mode sequentially (v5.3.5 FIX: Use user-configured swing mode)
                        - service: climate.set_swing_mode
                          target:
                            entity_id: "{{ repeat.item }}"
                          data:
                            swing_mode: "{{ validated_swing_mode }}"
                          continue_on_error: true

                  # Update expected fan helper for fan_only mode
                  - service: input_text.set_value
                    target:
                      entity_id: !input helper_expected_fan
                    data:
                      value: "{{ selected_fan_only_fan_mode }}"
                    continue_on_error: true

                  # Update mode helper
                  - service: input_text.set_value
                    target:
                      entity_id: !input helper_last_mode
                    data:
                      value: "comfort_fan_only"
                    continue_on_error: true

                  # Update snapshot
                  - if:
                      - condition: template
                        value_template: "{{ helper_last_command not in [none, 'unavailable', 'unknown'] }}"
                    then:
                      - variables:
                          fan_snapshot: "hvac=fan_only,temp=0,fan=unknown,swing=unknown"
                          fan_checksum: "5"
                      - service: input_text.set_value
                        target:
                          entity_id: "{{ helper_last_command }}"
                        data:
                          value: "{{ fan_snapshot }}"
                        continue_on_error: true
                      - service: input_number.set_value
                        target:
                          entity_id: "{{ helper_state_checksum }}"
                        data:
                          value: "{{ fan_checksum }}"
                        continue_on_error: true

            # Default: Turn OFF
            default:
              # v6.5.2 CRITICAL FIX: Update snapshot BEFORE sending command
              # The climate_state_change trigger fires immediately when state changes.
              # If we update the snapshot AFTER the command, there's a race condition:
              # 1. climate.turn_off → AC turns off → climate_state_change fires
              # 2. Override detection runs with OLD snapshot (checksum mismatch!)
              # 3. False override triggered
              # Fix: Update snapshot first so climate_state_change sees correct expected state
              - if:
                  - condition: template
                    value_template: "{{ helper_last_command not in [none, 'unavailable', 'unknown'] }}"
                then:
                  - variables:
                      update_snapshot: "hvac=off,temp=0,fan=unknown,swing=unknown"
                      update_checksum: "0"
                  - service: input_text.set_value
                    target:
                      entity_id: "{{ helper_last_command }}"
                    data:
                      value: "{{ update_snapshot }}"
                    continue_on_error: true
                  - service: input_number.set_value
                    target:
                      entity_id: "{{ helper_state_checksum }}"
                    data:
                      value: "{{ update_checksum }}"
                    continue_on_error: true
                  # v5.3.14 FIX: Update command timestamp for grace period calculation
                  - if:
                      - condition: template
                        value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
                    then:
                      - service: input_datetime.set_datetime
                        target:
                          entity_id: "{{ helper_change }}"
                        data:
                          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                        continue_on_error: true
                  - if:
                      - condition: template
                        value_template: "{{ debug_enabled }}"
                    then:
                      - service: system_log.write
                        data:
                          message: >
                            📸 {{ room_name | upper }} SNAPSHOT UPDATED (Pre-command - Turn OFF)
                                • New Snapshot: {{ update_snapshot }}
                          level: warning

              # v7.2.0 FIX: Move helper updates BEFORE climate.turn_off to survive mode:restart
              - service: input_text.set_value
                target:
                  entity_id: !input helper_last_mode
                data:
                  value: "off"
                continue_on_error: true

              - service: input_datetime.set_datetime
                target:
                  entity_id: !input helper_mode_start_time
                data:
                  datetime: "{{ now() }}"
                continue_on_error: true

              # NOW send the turn_off command (after snapshot and helpers are updated)
              - service: climate.turn_off
                target:
                  entity_id: !input climate_entities
                continue_on_error: true

          # Update mode start time
          - if:
              - condition: template
                value_template: "{{ helper_mode_time not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: !input helper_mode_start_time
                data:
                  datetime: "{{ now() }}"
                continue_on_error: true

      # =====================================
      # AUTO-OFF CONDITIONS (v7.3.0)
      # Turn off/reduce AC based on remote bed sensors, time schedule, or room absence
      # Any single condition triggers the action (OR logic)
      # =====================================
      - conditions:
          - condition: template
            value_template: "{{ enable_auto_off_conditions }}"
          - condition: template
            value_template: "{{ control_mode in ['Smart', 'Auto'] }}"
          - condition: template
            value_template: "{{ auto_off_conditions_active | bool }}"
        sequence:
          # If already in auto-off state, just maintain it (prevent downstream logic from overriding)
          - if:
              - condition: template
                value_template: "{{ last_mode in ['auto_off_off', 'auto_off_eco', 'auto_off_fan_only'] }}"
            then:
              - stop: "Auto-off conditions still active, maintaining current state"

          # Check runtime protection before transitioning
          - if:
              - condition: template
                value_template: "{{ last_mode in active_modes and (time_in_current_mode | float(0)) < (runtime_min | float(0)) }}"
            then:
              - stop: "Auto-off waiting for minimum runtime protection"

          # Debug logging
          - if:
              - condition: template
                value_template: "{{ debug_enabled }}"
            then:
              - service: system_log.write
                data:
                  message: >
                    🌙 {{ room_name | upper }}: Auto-Off Conditions Met
                    💡 Triggered by: {{ auto_off_trigger_reason }}
                    🎯 Action: {{ auto_off_action | upper }}
                    📋 Technical: {{ time_in_current_mode | round(1) }}min in current mode, control_mode={{ control_mode }}, last_mode={{ last_mode }}
                  level: warning

          - choose:
              # === OFF BRANCH ===
              - conditions:
                  - condition: template
                    value_template: "{{ auto_off_action == 'off' }}"
                sequence:
                  # Update helper_change BEFORE turn_off
                  - if:
                      - condition: template
                        value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
                    then:
                      - service: input_datetime.set_datetime
                        target:
                          entity_id: !input helper_last_change
                        data:
                          datetime: "{{ now() }}"
                        continue_on_error: true

                  # Update expected HVAC BEFORE turn_off (prevent false override)
                  - if:
                      - condition: template
                        value_template: "{{ helper_expected_hvac not in [none, '', 'unavailable', 'unknown'] }}"
                    then:
                      - service: input_text.set_value
                        target:
                          entity_id: "{{ helper_expected_hvac }}"
                        data:
                          value: "off"
                        continue_on_error: true

                  # Set last_mode BEFORE turn_off
                  - service: input_text.set_value
                    target:
                      entity_id: "{{ helper_mode }}"
                    data:
                      value: "auto_off_off"
                    continue_on_error: true

                  # Update mode_start_time for off-time protection
                  - service: input_datetime.set_datetime
                    target:
                      entity_id: !input helper_mode_start_time
                    data:
                      datetime: "{{ now() }}"
                    continue_on_error: true

                  # Update snapshot BEFORE sending command
                  - if:
                      - condition: template
                        value_template: "{{ helper_last_command not in [none, 'unavailable', 'unknown'] }}"
                    then:
                      - service: input_text.set_value
                        target:
                          entity_id: "{{ helper_last_command }}"
                        data:
                          value: "hvac=off,temp=0,fan=unknown,swing=unknown"
                        continue_on_error: true
                      - service: input_number.set_value
                        target:
                          entity_id: "{{ helper_state_checksum }}"
                        data:
                          value: "0"
                        continue_on_error: true

                  # NOW send the turn_off command
                  - service: climate.turn_off
                    target:
                      entity_id: !input climate_entities
                    continue_on_error: true

                  - service: system_log.write
                    data:
                      message: >
                        🌙 {{ room_name | upper }} AUTO-OFF: Turned AC OFF
                        Reason: {{ auto_off_trigger_reason }}
                      level: warning

              # === ECO BRANCH ===
              - conditions:
                  - condition: template
                    value_template: "{{ auto_off_action == 'eco' }}"
                sequence:
                  - variables:
                      eco_target: >
                        {% if current_temp > comfort_max_temp %}
                          {{ cooling_target_temp + eco_mode_setpoint_offset }}
                        {% else %}
                          {{ heating_target_temp - eco_mode_setpoint_offset }}
                        {% endif %}

                  # Capture expected temperature
                  - service: input_number.set_value
                    target:
                      entity_id: "{{ helper_expected_temp }}"
                    data:
                      value: "{{ eco_target }}"
                    continue_on_error: true

                  # Set last_mode BEFORE climate commands
                  - service: input_text.set_value
                    target:
                      entity_id: "{{ helper_mode }}"
                    data:
                      value: "auto_off_eco"
                    continue_on_error: true

                  # Set HVAC mode + temperature per entity
                  - repeat:
                      for_each: "{{ climate_list }}"
                      sequence:
                        - variables:
                            current_entity: "{{ repeat.item }}"
                            available_modes: "{{ state_attr(repeat.item, 'hvac_modes') | list }}"

                            selected_hvac_mode: >
                              {% if 'auto' in available_modes %}
                                auto
                              {% elif 'Auto' in available_modes %}
                                Auto
                              {% elif 'heat_cool' in available_modes %}
                                heat_cool
                              {% elif current_temp > comfort_max_temp and 'cool' in available_modes %}
                                cool
                              {% elif current_temp < comfort_min_temp and 'heat' in available_modes %}
                                heat
                              {% else %}
                                {{ available_modes[0] if available_modes else 'off' }}
                              {% endif %}

                        # FIRST: Set temperature + HVAC mode together
                        - service: climate.set_temperature
                          target:
                            entity_id: "{{ current_entity }}"
                          data:
                            temperature: "{{ eco_target }}"
                            hvac_mode: "{{ selected_hvac_mode }}"
                          continue_on_error: false

                        # Capture expected HVAC
                        - service: input_text.set_value
                          target:
                            entity_id: "{{ helper_expected_hvac }}"
                          data:
                            value: "{{ selected_hvac_mode }}"
                          continue_on_error: true

                        # Capture expected fan
                        - service: input_text.set_value
                          target:
                            entity_id: "{{ helper_expected_fan }}"
                          data:
                            value: "{{ new_fan_mode }}"
                          continue_on_error: true

                        - delay:
                            milliseconds: 500

                        # SECOND: Set fan mode
                        - service: climate.set_fan_mode
                          target:
                            entity_id: "{{ current_entity }}"
                          data:
                            fan_mode: "{{ new_fan_mode }}"
                          continue_on_error: false

                        - delay:
                            milliseconds: 500

                        # THIRD: Set swing mode
                        - service: climate.set_swing_mode
                          target:
                            entity_id: "{{ current_entity }}"
                          data:
                            swing_mode: "{{ validated_swing_mode }}"
                          continue_on_error: true

                  - service: system_log.write
                    data:
                      message: >
                        🌙 {{ room_name | upper }} AUTO-OFF: Set AC to ECO ({{ eco_target | round(1) }}°C)
                        Reason: {{ auto_off_trigger_reason }}
                      level: warning

              # === FAN_ONLY BRANCH ===
              - conditions:
                  - condition: template
                    value_template: "{{ auto_off_action == 'fan_only' }}"
                sequence:
                  # Update expected HVAC BEFORE changing mode
                  - if:
                      - condition: template
                        value_template: "{{ helper_expected_hvac not in [none, '', 'unavailable', 'unknown'] }}"
                    then:
                      - service: input_text.set_value
                        target:
                          entity_id: "{{ helper_expected_hvac }}"
                        data:
                          value: "fan_only"
                        continue_on_error: true

                  # Set last_mode BEFORE climate commands
                  - service: input_text.set_value
                    target:
                      entity_id: "{{ helper_mode }}"
                    data:
                      value: "auto_off_fan_only"
                    continue_on_error: true

                  # Check if AC supports fan_only mode and switch
                  - variables:
                      selected_fan_only_hvac: >
                        {% set modes = state_attr(climate_list[0], 'hvac_modes') | list if climate_list | length > 0 else [] %}
                        {% if 'fan_only' in modes %}
                          fan_only
                        {% elif 'dry' in modes %}
                          dry
                        {% else %}
                          off
                        {% endif %}

                  - if:
                      - condition: template
                        value_template: "{{ selected_fan_only_hvac != 'off' }}"
                    then:
                      - repeat:
                          for_each: "{{ climate_list }}"
                          sequence:
                            - service: climate.set_temperature
                              target:
                                entity_id: "{{ repeat.item }}"
                              data:
                                temperature: "{{ target_temp }}"
                                hvac_mode: "{{ selected_fan_only_hvac }}"
                              continue_on_error: false

                            - delay:
                                milliseconds: 500

                            - service: climate.set_fan_mode
                              target:
                                entity_id: "{{ repeat.item }}"
                              data:
                                fan_mode: "{{ selected_fan_only_fan_mode }}"
                              continue_on_error: false

                      - if:
                          - condition: template
                            value_template: "{{ helper_expected_fan not in [none, '', 'unavailable', 'unknown'] }}"
                        then:
                          - service: input_text.set_value
                            target:
                              entity_id: "{{ helper_expected_fan }}"
                            data:
                              value: "{{ selected_fan_only_fan_mode }}"
                            continue_on_error: true
                    else:
                      # Fallback: turn off if fan_only not supported
                      - service: climate.turn_off
                        target:
                          entity_id: !input climate_entities
                        continue_on_error: true

                      - service: input_text.set_value
                        target:
                          entity_id: "{{ helper_mode }}"
                        data:
                          value: "auto_off_off"
                        continue_on_error: true

                  - service: system_log.write
                    data:
                      message: >
                        🌙 {{ room_name | upper }} AUTO-OFF: Set AC to FAN ONLY ({{ selected_fan_only_hvac }})
                        Reason: {{ auto_off_trigger_reason }}
                      level: warning

          # Update mode_start_time (shared across all branches)
          - if:
              - condition: template
                value_template: "{{ helper_mode_time not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: !input helper_mode_start_time
                data:
                  datetime: "{{ now() }}"
                continue_on_error: true

          # Notification (shared across all branches)
          - if:
              - condition: template
                value_template: "{{ enable_notifications }}"
            then:
              - service: !input notification_service
                data:
                  title: "{{ room_name }} Climate Control"
                  message: "Auto-Off: {{ auto_off_action }} ({{ auto_off_trigger_reason }}, {{ current_temp }}°C)"
                continue_on_error: true

      # =====================================
      # UNIFIED COOLING MODE (v4.0.0)
      # Replaces cooling_high/medium/low tiers with dynamic escalation
      # =====================================
      - conditions:
          # Global activation check
          - condition: template
            value_template: "{{ should_activate }}"

          # Temperature above comfort zone
          # v5.3.1 FIX: When in bed with bed_eco_fan_only_mode enabled, use wider threshold
          # This prevents flip-flopping between cooling and fan_only at comfort zone boundary
          - condition: template
            value_template: >
              {% set bed_eco_active = bed_comfort_mode != 'off' and bed_eco_fan_only_mode == 'enabled' and bed_sensor_manual and is_state(bed_sensor_manual, 'on') %}
              {% set bed_eco_max = target_temp + bed_eco_return_threshold if bed_eco_active else comfort_max_temp %}
              {{ current_temp > bed_eco_max }}

          # Cooling enabled
          - condition: template
            value_template: "{{ enable_cooling }}"

          # Runtime protection (respect minimum runtime)
          - condition: template
            value_template: >
              {% set time_protection_met = (
                last_mode in ['cooling', 'cooling_low', 'cooling_medium', 'cooling_high', 'bed_comfort_eco', 'bed_comfort_quiet', 'bed_eco_fan_only', 'comfort_fan_only', 'stability_fan_only']
                and (time_in_current_mode | float(0)) >= (runtime_min | float(0))
              ) or last_mode not in ['cooling', 'cooling_low', 'cooling_medium', 'cooling_high', 'bed_comfort_eco', 'bed_comfort_quiet', 'bed_eco_fan_only', 'comfort_fan_only', 'stability_fan_only'] %}
              {{ time_protection_met }}

        sequence:
          # Define variables for fan speed, HVAC mode, and swing mode
          - variables:
              # v7.0.0: Use new unified fan control system
              # v7.0.1 FIX: Respect pre-conditioning fan mode
              selected_fan_mode: >
                {% if is_precond_mode and precond_validated_fan_mode != 'Dynamic' %}
                  {{ precond_validated_fan_mode }}
                {% else %}
                  {{ new_fan_mode }}
                {% endif %}

              # Select cooling HVAC mode with fallbacks
              selected_hvac_mode: >
                {% set modes = state_attr(climate_list[0], 'hvac_modes') | list %}
                {% if 'cool' in modes %}
                  cool
                {% elif 'Cool' in modes %}
                  Cool
                {% elif enable_heating and 'auto' in modes %}
                  auto
                {% elif enable_heating and 'Auto' in modes %}
                  Auto
                {% elif enable_heating and 'heat_cool' in modes %}
                  heat_cool
                {% elif enable_heating and 'Heat/Cool' in modes %}
                  Heat/Cool
                {% else %}
                  {{ modes[0] if modes else 'cool' }}
                {% endif %}

              # Swing mode selection - use global validated_swing_mode
              selected_swing_mode: "{{ validated_swing_mode }}"

          # v5.3.7 FIX: Wrapped debug in if/then to prevent blocking functional code
          # CRITICAL BUG: Bare condition was blocking ALL subsequent code when debug_enabled=false
          - if:
              - condition: template
                value_template: "{{ debug_enabled }}"
            then:
              - service: system_log.write
                data:
                  message: >
                    ❄️ {{ room_name | upper }} COOLING - FAN CONTROL v7.0.0

                    📊 Temperature:
                        • Current: {{ current_temp }}°C → Target: {{ target_temp }}°C
                        • Distance: {{ distance_from_target | round(1) }}°C to go
                        • Comfort zone: {{ comfort_min_temp }}°C - {{ comfort_max_temp }}°C

                    🌀 Fan Control ({{ fan_control_mode | upper }}):
                        {% if fan_control_mode == 'static' %}
                        • Mode: STATIC - Fixed at {{ static_fan_speed }}
                        {% elif fan_control_mode == 'temperature_band' %}
                        • Mode: TEMPERATURE BAND
                        • Band: {% if distance_from_target <= 1 %}0-1°C{% elif distance_from_target <= 2 %}1-2°C{% elif distance_from_target <= 3 %}2-3°C{% elif distance_from_target <= 4 %}3-4°C{% else %}4+°C{% endif %}
                        • Hold Time: {{ time_since_fan_change | round(1) }}/{{ fan_band_hold_time }} min
                        {% else %}
                        • Mode: DYNAMIC
                        • Stalling: {{ is_stalling }} | Good Progress: {{ good_progress }}
                        • Hold Time: {{ time_since_fan_change | round(1) }}/{{ dynamic_hold_time }} min
                        {% endif %}
                        • Base Level: {{ calculated_fan_level_int }} → Final: {{ final_fan_level_int }}
                        • Fan Mode: {{ selected_fan_mode }}

                    ⚡ Performance:
                        • Effectiveness: {{ current_effectiveness | round(0) }}%
                        • Rate: {{ temp_change_rate | round(2) }}°C/min
                        • Time in mode: {{ time_in_current_mode | round(1) }} min
                  level: warning
                  logger: "blueprints.climate_control.{{ room_name | lower | replace(' ', '_') }}"

          # v5.0.3: ALWAYS SEND - Let integration handle deduplication
          # The integration has optimistic state + 30s timeout specifically to handle this
          # Our job: Calculate correct settings and send them
          # Integration's job: Deduplicate via optimistic state, batch rapid calls
          # Result: Commands ALWAYS sent when automation runs, integration prevents spam

          # Update helper BEFORE activation to prevent false manual override detection
          # v6.3.1: Added enable_cooling safeguard - NEVER set cooling mode if cooling is disabled
          - if:
              - condition: template
                value_template: "{{ helper_mode not in [none, '', 'unavailable', 'unknown'] and enable_cooling }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_mode }}"
                data:
                  value: "cooling"

          # v4.1.2 CRITICAL FIX: Update expected state helpers BEFORE climate service calls
          # Problem: Climate state change triggers new automation run BEFORE expected helpers are updated
          # → New run sees stale helper_expected_hvac='off' → automation_expects_on=false → FALSE OVERRIDE!
          # Solution: Update expected helpers first so any triggered automation run sees correct values
          - if:
              - condition: template
                value_template: "{{ helper_expected_hvac not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_expected_hvac }}"
                data:
                  value: "{{ selected_hvac_mode }}"
                continue_on_error: true

          - if:
              - condition: template
                value_template: "{{ helper_expected_fan not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_expected_fan }}"
                data:
                  value: "{{ selected_fan_mode }}"
                continue_on_error: true

          - if:
              - condition: template
                value_template: "{{ helper_expected_temp not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              # v4.2.0 FIX: Use input_number.set_value (helper_expected_temp is input_number, not input_text)
              - service: input_number.set_value
                target:
                  entity_id: "{{ helper_expected_temp }}"
                data:
                  value: "{{ adjusted_target }}"
                continue_on_error: true

          # Update helper_change timestamp BEFORE climate service calls
          # This ensures snapshot comparison sees the most recent command timestamp
          - if:
              - condition: template
                value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: "{{ helper_change }}"
                data:
                  datetime: "{{ now() }}"
                continue_on_error: true

          - if:
              - condition: template
                value_template: "{{ helper_mode_time not in [none, '', 'unavailable', 'unknown'] and helper_last_mode_at_start != 'cooling' }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: "{{ helper_mode_time }}"
                data:
                  datetime: "{{ now() }}"
                continue_on_error: true

          - if:
              - condition: template
                value_template: "{{ helper_temp_history not in [none, '', 'unavailable', 'unknown'] and helper_last_mode_at_start != 'cooling' }}"
            then:
              - service: input_number.set_value
                target:
                  entity_id: "{{ helper_temp_history }}"
                data:
                  value: "{{ current_temp }}"
                continue_on_error: true

          # v4.7.1 CRITICAL: 200ms delay for helper writes to commit
          # Prevents async race condition where climate state change triggers new automation
          # before helper values commit to state machine
          # v5.0.8 FIX: Increased to 300ms for extra safety margin under system load
          - delay:
              milliseconds: 300

          # v5.0.7 CRITICAL FIX: Update snapshot BEFORE service calls to prevent false override detection
          # Problem: Climate state change triggers new automation run BEFORE snapshot updated
          # → New run sees OLD snapshot (hvac=off) vs NEW state (hvac=cool) → FALSE OVERRIDE!
          # Solution: Update snapshot first so any triggered automation run sees correct values
          # v5.3.12 FIX: Use calculated values directly instead of potentially stale helpers
          # The helpers may contain old values from previous runs, causing snapshot mismatch
          - if:
              - condition: template
                value_template: "{{ helper_last_command not in [none, 'unavailable', 'unknown'] }}"
            then:
              - variables:
                  snapshot_hvac: "{{ selected_hvac_mode }}"
                  snapshot_temp: "{{ adjusted_target }}"
                  snapshot_fan: "{{ selected_fan_mode }}"
                  snapshot_swing: "{{ validated_swing_mode }}"
                  update_snapshot: "hvac={{ snapshot_hvac }},temp={{ snapshot_temp }},fan={{ snapshot_fan }},swing={{ snapshot_swing }}"
                  update_checksum: >
                    {% set hvac_codes = {'off': 0, 'cool': 1, 'heat': 2, 'auto': 3, 'dry': 4, 'fan_only': 5, 'heat_cool': 6} %}
                    {{ ((snapshot_temp * 1000) + (snapshot_fan | string | length) + (snapshot_swing | string | length) + hvac_codes.get(snapshot_hvac, 99)) | int(0) }}

              # v5.0.8 FIX: Atomic parallel writes to prevent race condition (both helpers commit together)
              # v5.3.14 FIX: Also update helper_change (last command time) so grace period works
              - parallel:
                  - service: input_text.set_value
                    target:
                      entity_id: "{{ helper_last_command }}"
                    data:
                      value: "{{ update_snapshot }}"
                    continue_on_error: true

                  - service: input_number.set_value
                    target:
                      entity_id: "{{ helper_state_checksum }}"
                    data:
                      value: "{{ update_checksum }}"
                    continue_on_error: true

                  # v5.3.14 FIX: Update command timestamp for grace period calculation
                  - if:
                      - condition: template
                        value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
                    then:
                      - service: input_datetime.set_datetime
                        target:
                          entity_id: "{{ helper_change }}"
                        data:
                          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                        continue_on_error: true

              - if:
                  - condition: template
                    value_template: "{{ debug_enabled }}"
                then:
                  - service: system_log.write
                    data:
                      message: >
                        📸 {{ room_name | upper }} SNAPSHOT UPDATED (Unified Cooling - BEFORE service calls)
                            • New Snapshot: {{ update_snapshot }}
                            • New Checksum: {{ update_checksum }}
                            • HVAC: {{ snapshot_hvac }}
                            • Temp: {{ snapshot_temp }}°C
                            • Fan: {{ snapshot_fan }}
                            • Swing: {{ snapshot_swing }}
                      level: warning

          # v5.0.3: ALWAYS send climate service calls (integration handles deduplication)
          - repeat:
              for_each: "{{ climate_list }}"
              sequence:
                - variables:
                    current_entity: "{{ repeat.item }}"

                # v5.4.0 FIX: Sequential calls instead of parallel for BRP084 compatibility
                # BRP084 devices (firmware 2.8.0) have a request semaphore that serializes HTTP calls
                # Parallel calls cause CancelledError when second request waits on semaphore
                # climate.set_temperature with hvac_mode implicitly turns on AC (pow=1)
                - service: climate.set_temperature
                  target:
                    entity_id: "{{ current_entity }}"
                  data:
                    temperature: "{{ adjusted_target }}"
                    hvac_mode: "{{ selected_hvac_mode }}"
                  continue_on_error: false

                # Small delay to allow device to process temperature command
                - delay:
                    milliseconds: 500

                # Then set fan mode sequentially
                - service: climate.set_fan_mode
                  target:
                    entity_id: "{{ current_entity }}"
                  data:
                    fan_mode: "{{ selected_fan_mode }}"
                  continue_on_error: false

                # v5.4.0: Delay for BRP084 semaphore compatibility
                - delay:
                    milliseconds: 500

                # Call swing mode separately (optional, can fail)
                - if:
                    - condition: template
                      value_template: "{{ selected_swing_mode not in ['none', '', 'unavailable', 'unknown'] }}"
                  then:
                    - service: climate.set_swing_mode
                      target:
                        entity_id: "{{ current_entity }}"
                      data:
                        swing_mode: "{{ selected_swing_mode }}"
                      continue_on_error: true

          # v7.0.0: Update last fan change time helper (for hold time enforcement)
          - if:
              - condition: template
                value_template: "{{ fan_mode_changed and helper_last_fan_change not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: "{{ helper_last_fan_change }}"
                data:
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                continue_on_error: true

          # v4.2.2: Helper updates moved to BEFORE climate service calls
          # v5.0.7: Snapshot updates also moved to BEFORE service calls
          # This prevents race condition where climate_state_change trigger fires before helpers/snapshots updated

      # =====================================
      # v4.6.0: CONTINUE MODE - INTELLIGENT FAN ADJUSTMENT (HEATING)
      # Dynamically adjust fan speed when already heating within comfort zone
      # Pursuing overshoot target with smart power management
      # =====================================
      - conditions:
          # Global activation check
          # v7.1.1 FIX: Pre-conditioning bypasses should_activate - it becomes false once temp
          # reaches target threshold, but we still need to run CONTINUE MODE to apply High fan
          - condition: template
            value_template: "{{ should_activate or is_precond_mode }}"

          # Already in heating mode
          # v7.1.2 FIX: Pre-conditioning bypasses this if AC is actually heating (helper may still show 'off')
          # Note: actual_ac_state is 'on'/'off', so check entity state directly for 'heat'
          - condition: template
            value_template: "{{ last_mode in ['heating'] or (is_precond_mode and states(climate_list[0]) == 'heat') }}"

          # Within comfort zone (not too cold)
          # v7.1.0 FIX: Pre-conditioning mode bypasses this check - needs to run CONTINUE MODE
          # to apply precond_fan_mode: High even when room is cold
          - condition: template
            value_template: "{{ current_temp >= comfort_min_temp or is_precond_mode }}"

          # Near overshoot target (within 0.5°C above or below)
          # v4.6.0: Extended to handle maintaining near target, not just approaching it
          # v4.7.1 FIX: Only run Continue Mode if BELOW overshoot target (haven't reached it yet)
          # Once overshoot_target is reached, fall through to Comfort Zone Action for user's selected behavior
          # v7.1.0 FIX: Pre-conditioning mode bypasses this check - always run to apply High fan
          - condition: template
            value_template: >
              {% set overshoot_target = target_temp + target_overshoot %}
              {{ (current_temp < overshoot_target and current_temp > (comfort_min_temp + 0.1)) or is_precond_mode }}

          # Heating enabled
          - condition: template
            value_template: "{{ enable_heating }}"

        sequence:
          # v4.7.1 FIX: Update helper_change timestamp to prevent false manual override detection
          # v5.3.7 FIX: Wrapped in if/then to prevent blocking functional code when helper unavailable
          - if:
              - condition: template
                value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: !input helper_last_change
                data:
                  datetime: "{{ now() }}"
                continue_on_error: true

          - variables:
              # v7.0.0: Use new unified fan control system
              # v7.0.1 FIX: Respect pre-conditioning fan mode when in pre-conditioning
              continue_fan_mode_heating: >
                {% if is_precond_mode and precond_validated_fan_mode != 'Dynamic' %}
                  {{ precond_validated_fan_mode }}
                {% else %}
                  {{ new_fan_mode }}
                {% endif %}

              # HVAC mode stays heat
              continue_hvac_mode_heating: >
                {% set modes = state_attr(climate_list[0], 'hvac_modes') | list %}
                {% if 'heat' in modes %}
                  heat
                {% elif 'Heat' in modes %}
                  Heat
                {% else %}
                  {{ modes[0] if modes else 'heat' }}
                {% endif %}

          # Debug logging for continue mode
          - if:
              - condition: template
                value_template: "{{ debug_enabled }}"
            then:
              - service: system_log.write
                data:
                  message: >
                    🔥 {{ room_name | upper }} HEATING CONTINUE MODE - FAN CONTROL v7.0.0

                    📊 Status:
                        • Current Temp: {{ current_temp }}°C
                        • Target: {{ target_temp }}°C (overshoot: {{ target_overshoot }}°C)
                        • Distance: {{ distance_from_target | round(2) }}°C
                        • Temp Change Rate: {{ temp_change_rate | round(3) }}°C/min

                    🌀 Fan Control ({{ fan_control_mode | upper }}):
                        {% if fan_control_mode == 'static' %}
                        • Mode: STATIC - Fixed at {{ static_fan_speed }}
                        {% elif fan_control_mode == 'temperature_band' %}
                        • Mode: TEMPERATURE BAND
                        • Band: {% if distance_from_target <= 1 %}0-1°C{% elif distance_from_target <= 2 %}1-2°C{% elif distance_from_target <= 3 %}2-3°C{% elif distance_from_target <= 4 %}3-4°C{% else %}4+°C{% endif %}
                        • Hold Time: {{ time_since_fan_change | round(1) }}/{{ fan_band_hold_time }} min
                        {% else %}
                        • Mode: DYNAMIC
                        • Stalling: {{ is_stalling }} | Good Progress: {{ good_progress }}
                        • Hold Time: {{ time_since_fan_change | round(1) }}/{{ dynamic_hold_time }} min
                        {% endif %}
                        • Base Level: {{ calculated_fan_level_int }} → Final: {{ final_fan_level_int }}
                        • Fan Mode: {{ continue_fan_mode_heating }}

                    💡 Continue Mode: Using new unified fan control (v7.0.0)
                  level: warning

          # v4.7.1 FIX: Update expected state helpers BEFORE service calls
          # This prevents false positive manual override detection
          - if:
              - condition: template
                value_template: "{{ helper_expected_fan not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_expected_fan }}"
                data:
                  value: "{{ continue_fan_mode_heating }}"
                continue_on_error: true

          - if:
              - condition: template
                value_template: "{{ helper_expected_hvac not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_expected_hvac }}"
                data:
                  value: "{{ continue_hvac_mode_heating }}"
                continue_on_error: true

          - if:
              - condition: template
                value_template: "{{ helper_expected_temp not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_number.set_value
                target:
                  entity_id: "{{ helper_expected_temp }}"
                data:
                  value: "{{ adjusted_target }}"
                continue_on_error: true

          # v5.0.4: MANDATORY BRP084 SERVICE CALL PATTERN
          # Helper updates above are instant - no delay needed
          # BRP084 Firmware 2.8.0: Fan settings only work when mode is set (not 'off')
          # BRP069 Firmware: Does GET before every set(), preserves settings
          #
          # MANDATORY Pattern: temp+hvac FIRST (turns on AC), then fan immediately after
          # This works for BOTH firmware types.
          - repeat:
              for_each: "{{ climate_list }}"
              sequence:
                # Step 1: Set temperature + HVAC mode in ONE call
                - service: climate.set_temperature
                  target:
                    entity_id: "{{ repeat.item }}"
                  data:
                    temperature: "{{ adjusted_target }}"
                    hvac_mode: "{{ continue_hvac_mode_heating }}"
                  continue_on_error: false  # FAIL LOUDLY

                # Step 2: Delay for BRP084 semaphore compatibility (v5.4.0)
                - delay:
                    milliseconds: 500

                # Step 3: Set fan mode sequentially
                - service: climate.set_fan_mode
                  target:
                    entity_id: "{{ repeat.item }}"
                  data:
                    fan_mode: "{{ continue_fan_mode_heating }}"
                  continue_on_error: false  # FAIL LOUDLY

          # v7.0.0: Update last fan change time helper (for hold time enforcement)
          - if:
              - condition: template
                value_template: "{{ fan_mode_changed and helper_last_fan_change not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: "{{ helper_last_fan_change }}"
                data:
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                continue_on_error: true

          # v5.0.6 FIX: Update snapshot after service calls
          # v5.3.12 FIX: Use calculated values directly instead of potentially stale helpers
          - if:
              - condition: template
                value_template: "{{ helper_last_command not in [none, 'unavailable', 'unknown'] }}"
            then:
              - variables:
                  snapshot_hvac: "{{ continue_hvac_mode_heating }}"
                  snapshot_temp: "{{ adjusted_target }}"
                  snapshot_fan: "{{ continue_fan_mode_heating }}"
                  snapshot_swing: "{{ validated_swing_mode }}"
                  update_snapshot: "hvac={{ snapshot_hvac }},temp={{ snapshot_temp }},fan={{ snapshot_fan }},swing={{ snapshot_swing }}"
                  update_checksum: >
                    {% set hvac_codes = {'off': 0, 'cool': 1, 'heat': 2, 'auto': 3, 'dry': 4, 'fan_only': 5, 'heat_cool': 6} %}
                    {{ ((snapshot_temp * 1000) + (snapshot_fan | string | length) + (snapshot_swing | string | length) + hvac_codes.get(snapshot_hvac, 99)) | int(0) }}
              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_last_command }}"
                data:
                  value: "{{ update_snapshot }}"
                continue_on_error: true
              - service: input_number.set_value
                target:
                  entity_id: "{{ helper_state_checksum }}"
                data:
                  value: "{{ update_checksum }}"
                continue_on_error: true
              # v5.3.14 FIX: Update command timestamp for grace period calculation
              - if:
                  - condition: template
                    value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
                then:
                  - service: input_datetime.set_datetime
                    target:
                      entity_id: "{{ helper_change }}"
                    data:
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                    continue_on_error: true
              - if:
                  - condition: template
                    value_template: "{{ debug_enabled }}"
                then:
                  - service: system_log.write
                    data:
                      message: >
                        📸 {{ room_name | upper }} SNAPSHOT UPDATED (Continue Heating)
                            • New Snapshot: {{ update_snapshot }}
                            • New Checksum: {{ update_checksum }}
                      level: warning

          # v4.6.1: Continue Mode does NOT update helper_change
          # This allows bed comfort mode to activate after runtime_min is met
          # (Continue mode is just adjusting fan speed, not changing modes)

      # =====================================
      # UNIFIED HEATING MODE (v4.0.0)
      # Replaces heating_high/medium/low tiers with dynamic escalation
      # =====================================
      - conditions:
          # Global activation check
          - condition: template
            value_template: "{{ should_activate }}"

          # Temperature below comfort zone
          - condition: template
            value_template: "{{ current_temp < comfort_min_temp }}"

          # Heating enabled
          - condition: template
            value_template: "{{ enable_heating }}"

          # Runtime protection (respect minimum runtime)
          - condition: template
            value_template: >
              {% set time_protection_met = (
                last_mode in ['heating', 'heating_low', 'heating_medium', 'heating_high', 'bed_comfort_eco', 'bed_comfort_quiet', 'bed_eco_fan_only', 'comfort_fan_only', 'stability_fan_only']
                and (time_in_current_mode | float(0)) >= (runtime_min | float(0))
              ) or last_mode not in ['heating', 'heating_low', 'heating_medium', 'heating_high', 'bed_comfort_eco', 'bed_comfort_quiet', 'bed_eco_fan_only', 'comfort_fan_only', 'stability_fan_only'] %}
              {{ time_protection_met }}

        sequence:
          # Define variables for fan speed, HVAC mode, and swing mode
          - variables:
              # v7.0.0: Use new unified fan control system
              # v7.0.1 FIX: Respect pre-conditioning fan mode
              selected_fan_mode: >
                {% if is_precond_mode and precond_validated_fan_mode != 'Dynamic' %}
                  {{ precond_validated_fan_mode }}
                {% else %}
                  {{ new_fan_mode }}
                {% endif %}

              # Select heating HVAC mode with fallbacks
              selected_hvac_mode: >
                {% set modes = state_attr(climate_list[0], 'hvac_modes') | list %}
                {% if 'heat' in modes %}
                  heat
                {% elif 'Heat' in modes %}
                  Heat
                {% elif enable_cooling and 'auto' in modes %}
                  auto
                {% elif enable_cooling and 'Auto' in modes %}
                  Auto
                {% elif enable_cooling and 'heat_cool' in modes %}
                  heat_cool
                {% elif enable_cooling and 'Heat/Cool' in modes %}
                  Heat/Cool
                {% else %}
                  {{ modes[0] if modes else 'heat' }}
                {% endif %}

              # Swing mode selection - use global validated_swing_mode
              selected_swing_mode: "{{ validated_swing_mode }}"

          # v5.3.7 FIX: Wrapped debug in if/then to prevent blocking functional code
          # CRITICAL BUG: Bare condition was blocking ALL subsequent code when debug_enabled=false
          - if:
              - condition: template
                value_template: "{{ debug_enabled }}"
            then:
              - service: system_log.write
                data:
                  message: >
                    🔥 {{ room_name | upper }} HEATING - FAN CONTROL v7.0.0

                    📊 Temperature:
                        • Current: {{ current_temp }}°C → Target: {{ target_temp }}°C
                        • Distance: {{ distance_from_target | round(1) }}°C to go
                        • Comfort zone: {{ comfort_min_temp }}°C - {{ comfort_max_temp }}°C

                    🌀 Fan Control ({{ fan_control_mode | upper }}):
                        {% if fan_control_mode == 'static' %}
                        • Mode: STATIC - Fixed at {{ static_fan_speed }}
                        {% elif fan_control_mode == 'temperature_band' %}
                        • Mode: TEMPERATURE BAND
                        • Band: {% if distance_from_target <= 1 %}0-1°C{% elif distance_from_target <= 2 %}1-2°C{% elif distance_from_target <= 3 %}2-3°C{% elif distance_from_target <= 4 %}3-4°C{% else %}4+°C{% endif %}
                        • Hold Time: {{ time_since_fan_change | round(1) }}/{{ fan_band_hold_time }} min
                        {% else %}
                        • Mode: DYNAMIC
                        • Stalling: {{ is_stalling }} | Good Progress: {{ good_progress }}
                        • Hold Time: {{ time_since_fan_change | round(1) }}/{{ dynamic_hold_time }} min
                        {% endif %}
                        • Base Level: {{ calculated_fan_level_int }} → Final: {{ final_fan_level_int }}
                        • Fan Mode: {{ selected_fan_mode }}

                    ⚡ Performance:
                        • Effectiveness: {{ current_effectiveness | round(0) }}%
                        • Rate: {{ temp_change_rate | round(2) }}°C/min
                        • Time in mode: {{ time_in_current_mode | round(1) }} min
                  level: warning
                  logger: "blueprints.climate_control.{{ room_name | lower | replace(' ', '_') }}"

          # v5.0.3: ALWAYS SEND - Let integration handle deduplication
          # The integration has optimistic state + 30s timeout specifically to handle this
          # Our job: Calculate correct settings and send them
          # Integration's job: Deduplicate via optimistic state, batch rapid calls
          # Result: Commands ALWAYS sent when automation runs, integration prevents spam

          # Update helper BEFORE activation to prevent false manual override detection
          # v6.3.1: Added enable_heating safeguard - NEVER set heating mode if heating is disabled
          - if:
              - condition: template
                value_template: "{{ helper_mode not in [none, '', 'unavailable', 'unknown'] and enable_heating }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_mode }}"
                data:
                  value: "heating"

          # v4.1.2 CRITICAL FIX: Update expected state helpers BEFORE climate service calls
          # Problem: Climate state change triggers new automation run BEFORE expected helpers are updated
          # → New run sees stale helper_expected_hvac='off' → automation_expects_on=false → FALSE OVERRIDE!
          # Solution: Update expected helpers first so any triggered automation run sees correct values
          - if:
              - condition: template
                value_template: "{{ helper_expected_hvac not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_expected_hvac }}"
                data:
                  value: "{{ selected_hvac_mode }}"
                continue_on_error: true

          - if:
              - condition: template
                value_template: "{{ helper_expected_fan not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_expected_fan }}"
                data:
                  value: "{{ selected_fan_mode }}"
                continue_on_error: true

          - if:
              - condition: template
                value_template: "{{ helper_expected_temp not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              # v4.2.0 FIX: Use input_number.set_value (helper_expected_temp is input_number, not input_text)
              - service: input_number.set_value
                target:
                  entity_id: "{{ helper_expected_temp }}"
                data:
                  value: "{{ adjusted_target }}"
                continue_on_error: true

          # Update helper_change timestamp BEFORE climate service calls
          # This ensures snapshot comparison sees the most recent command timestamp
          - if:
              - condition: template
                value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: "{{ helper_change }}"
                data:
                  datetime: "{{ now() }}"
                continue_on_error: true

          - if:
              - condition: template
                value_template: "{{ helper_mode_time not in [none, '', 'unavailable', 'unknown'] and helper_last_mode_at_start != 'heating' }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: "{{ helper_mode_time }}"
                data:
                  datetime: "{{ now() }}"
                continue_on_error: true

          - if:
              - condition: template
                value_template: "{{ helper_temp_history not in [none, '', 'unavailable', 'unknown'] and helper_last_mode_at_start != 'heating' }}"
            then:
              - service: input_number.set_value
                target:
                  entity_id: "{{ helper_temp_history }}"
                data:
                  value: "{{ current_temp }}"
                continue_on_error: true

          # v4.7.1 CRITICAL: 200ms delay for helper writes to commit
          # Prevents async race condition where climate state change triggers new automation
          # before helper values commit to state machine
          # v5.0.8 FIX: Increased to 300ms for extra safety margin under system load
          - delay:
              milliseconds: 300

          # v5.0.7 CRITICAL FIX: Update snapshot BEFORE service calls to prevent false override detection
          # Problem: Climate state change triggers new automation run BEFORE snapshot updated
          # → New run sees OLD snapshot (hvac=off) vs NEW state (hvac=heat) → FALSE OVERRIDE!
          # Solution: Update snapshot first so any triggered automation run sees correct values
          # v5.3.12 FIX: Use calculated values directly instead of potentially stale helpers
          - if:
              - condition: template
                value_template: "{{ helper_last_command not in [none, 'unavailable', 'unknown'] }}"
            then:
              - variables:
                  snapshot_hvac: "{{ selected_hvac_mode }}"
                  snapshot_temp: "{{ adjusted_target }}"
                  snapshot_fan: "{{ selected_fan_mode }}"
                  snapshot_swing: "{{ validated_swing_mode }}"
                  update_snapshot: "hvac={{ snapshot_hvac }},temp={{ snapshot_temp }},fan={{ snapshot_fan }},swing={{ snapshot_swing }}"
                  update_checksum: >
                    {% set hvac_codes = {'off': 0, 'cool': 1, 'heat': 2, 'auto': 3, 'dry': 4, 'fan_only': 5, 'heat_cool': 6} %}
                    {{ ((snapshot_temp * 1000) + (snapshot_fan | string | length) + (snapshot_swing | string | length) + hvac_codes.get(snapshot_hvac, 99)) | int(0) }}

              # v5.0.8 FIX: Atomic parallel writes to prevent race condition (both helpers commit together)
              # v5.3.14 FIX: Also update helper_change (last command time) so grace period works
              - parallel:
                  - service: input_text.set_value
                    target:
                      entity_id: "{{ helper_last_command }}"
                    data:
                      value: "{{ update_snapshot }}"
                    continue_on_error: true

                  - service: input_number.set_value
                    target:
                      entity_id: "{{ helper_state_checksum }}"
                    data:
                      value: "{{ update_checksum }}"
                    continue_on_error: true

                  # v5.3.14 FIX: Update command timestamp for grace period calculation
                  - if:
                      - condition: template
                        value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
                    then:
                      - service: input_datetime.set_datetime
                        target:
                          entity_id: "{{ helper_change }}"
                        data:
                          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                        continue_on_error: true

              - if:
                  - condition: template
                    value_template: "{{ debug_enabled }}"
                then:
                  - service: system_log.write
                    data:
                      message: >
                        📸 {{ room_name | upper }} SNAPSHOT UPDATED (Unified Heating - BEFORE service calls)
                            • New Snapshot: {{ update_snapshot }}
                            • New Checksum: {{ update_checksum }}
                            • HVAC: {{ snapshot_hvac }}
                            • Temp: {{ snapshot_temp }}°C
                            • Fan: {{ snapshot_fan }}
                            • Swing: {{ snapshot_swing }}
                      level: warning

          # v5.0.3: ALWAYS send climate service calls (integration handles deduplication)
          - repeat:
              for_each: "{{ climate_list }}"
              sequence:
                - variables:
                    current_entity: "{{ repeat.item }}"

                # v5.4.0 FIX: Sequential calls instead of parallel for BRP084 compatibility
                # BRP084 devices (firmware 2.8.0) have a request semaphore that serializes HTTP calls
                # Parallel calls cause CancelledError when second request waits on semaphore
                # climate.set_temperature with hvac_mode implicitly turns on AC (pow=1)
                - service: climate.set_temperature
                  target:
                    entity_id: "{{ current_entity }}"
                  data:
                    temperature: "{{ adjusted_target }}"
                    hvac_mode: "{{ selected_hvac_mode }}"
                  continue_on_error: false

                # Small delay to allow device to process temperature command
                - delay:
                    milliseconds: 500

                # Then set fan mode sequentially
                - service: climate.set_fan_mode
                  target:
                    entity_id: "{{ current_entity }}"
                  data:
                    fan_mode: "{{ selected_fan_mode }}"
                  continue_on_error: false

                # v5.4.0: Delay for BRP084 semaphore compatibility
                - delay:
                    milliseconds: 500

                # Call swing mode separately (optional, can fail)
                - if:
                    - condition: template
                      value_template: "{{ selected_swing_mode not in ['none', '', 'unavailable', 'unknown'] }}"
                  then:
                    - service: climate.set_swing_mode
                      target:
                        entity_id: "{{ current_entity }}"
                      data:
                        swing_mode: "{{ selected_swing_mode }}"
                      continue_on_error: true

          # v7.0.0: Update last fan change time helper (for hold time enforcement)
          - if:
              - condition: template
                value_template: "{{ fan_mode_changed and helper_last_fan_change not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: "{{ helper_last_fan_change }}"
                data:
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                continue_on_error: true

          # v4.2.2: Helper updates moved to BEFORE climate service calls
          # v5.0.7: Snapshot updates also moved to BEFORE service calls
          # This prevents race condition where climate_state_change trigger fires before helpers/snapshots updated
          # This prevents race condition where climate_state_change trigger fires before helpers updated

      # CRITICAL: Clear stability mode when temperature exits comfort zone
      # This MUST be the FIRST condition to prevent getting stuck
      # v5.3.2 FIX: Added comfort_fan_only to stability mode reset list
      - conditions:
          - condition: template
            value_template: "{{ last_mode in ['stability_off', 'stability_eco', 'stability_fan_only', 'comfort_fan_only'] }}"
          - condition: template
            value_template: "{{ current_temp < comfort_min_temp or current_temp > comfort_max_temp }}"
        sequence:
          # Always log this critical reset
          - service: system_log.write
            data:
              message: >
                🔄 Stability Mode Reset: Temperature outside comfort zone!
                • Current: {{ current_temp }}°C
                • Comfort Zone: {{ comfort_min_temp }}-{{ comfort_max_temp }}°C
                • Was in mode: {{ last_mode }}
                • Clearing stability mode to allow normal operation
              level: warning
          
          # Don't set to "off" - set directly to cooling/heating (but respect Smart mode presence)
          - service: input_text.set_value
            target:
              entity_id: !input helper_last_mode
            data:
              value: >
                {% if control_mode == 'Smart' and not smart_presence_active %}
                  off
                {% elif current_temp > comfort_max_temp %}
                  cooling
                {% elif current_temp < comfort_min_temp %}
                  heating
                {% else %}
                  {{ last_mode if last_mode in ['cooling', 'heating'] else 'off' }}
                {% endif %}

          # v4.6.14 DEBUG: Log last_mode preservation in comfort zone
          - if:
              - condition: template
                value_template: "{{ debug_enabled and current_temp >= comfort_min_temp and current_temp <= comfort_max_temp }}"
            then:
              - service: system_log.write
                data:
                  message: >
                    🔍 {{ room_name | upper }} STABILITY RESET - COMFORT ZONE

                    📊 last_mode Preservation:
                        • Previous last_mode: {{ last_mode }}
                        • Current temp: {{ current_temp }}°C (in comfort zone: {{ comfort_min_temp }}-{{ comfort_max_temp }}°C)
                        • New last_mode: {{ last_mode if last_mode in ['cooling', 'heating'] else 'off' }}
                        • Preserved mode: {{ 'YES' if last_mode in ['cooling', 'heating'] else 'NO' }}

                    💡 Why preserved?
                        • If cooling/heating was active, preserve it for fan-only activation
                        • Otherwise set to "off" (no active cooling/heating to preserve)
                  level: warning

          # Update mode start time for effectiveness tracking (only if mode changed OR AC was off)
          - condition: template
            value_template: "{{ dynamic_enabled and helper_mode_time not in [none, '', 'unavailable', 'unknown', []] and helper_mode_time is string and helper_mode_time != '' and last_mode not in ['cooling', 'heating', 'off'] }}"
          - service: input_datetime.set_datetime
            target:
              entity_id: "{{ helper_mode_time }}"
            data:
              datetime: "{{ now() }}"
            continue_on_error: true
          
          # Clear the stability timestamp to reset the feature
          # Don't use 1970 as it causes calculation issues - use current time instead
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ helper_temp_stable_since not in [none, '', 'unavailable', 'unknown'] }}"
                sequence:
                  - service: input_datetime.set_datetime
                    target:
                      entity_id: "{{ helper_temp_stable_since }}"
                    data:
                      datetime: "{{ now() }}"
          
          # Now activate cooling/heating as needed since we're outside comfort zone or at trigger point
          - choose:
              # Need cooling (v5.3.5 FIX: Added should_activate AND enable_cooling checks)
              - conditions:
                  - condition: template
                    value_template: "{{ should_activate and enable_cooling and current_temp > comfort_max_temp and (control_mode != 'Smart' or smart_presence_active) }}"
                sequence:
                  - repeat:
                      for_each: "{{ climate_list }}"
                      sequence:
                        - variables:
                            current_entity: "{{ repeat.item }}"
                            available_modes: "{{ state_attr(repeat.item, 'hvac_modes') | list }}"
                            
                            # Smart cooling mode selection
                            # v3.10.0: Only use auto/heat_cool if heating is also enabled
                            selected_hvac_mode: >
                              {% set modes = state_attr(repeat.item, 'hvac_modes') | list %}
                              {# For cooling, try cooling-capable modes #}
                              {% if 'cool' in modes %}
                                cool
                                {% elif 'Cool' in modes %}
                                Cool
                                {% elif enable_heating and 'auto' in modes %}
                                auto
                                {% elif enable_heating and 'Auto' in modes %}
                                Auto
                                {% elif enable_heating and 'heat_cool' in modes %}
                                heat_cool
                                {% elif enable_heating and 'Heat/Cool' in modes %}
                                Heat/Cool
                                {% else %}
                                off
                              {% endif %}

                        # v4.2.1 FIX: Update ALL helpers BEFORE service calls to prevent manual override false positives
                        # The 500ms verification delay can trigger new automation runs that read stale helpers

                        # 1. Update helper_change FIRST (timestamps the automation action)
                        - if:
                            - condition: template
                              value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
                          then:
                            - service: input_datetime.set_datetime
                              target:
                                entity_id: "{{ helper_change }}"
                              data:
                                datetime: "{{ now() }}"
                              continue_on_error: true

                        # 2. Update helper_last_mode BEFORE service calls
                        # v6.3.1: Added enable_cooling safeguard
                        - if:
                            - condition: template
                              value_template: "{{ enable_cooling }}"
                          then:
                            - service: input_text.set_value
                              target:
                                entity_id: "{{ helper_mode }}"
                              data:
                                value: "cooling"
                              continue_on_error: true

                        # 3. Capture expected values for enhanced manual override detection (v3.3.0)
                        - service: input_text.set_value
                          target:
                            entity_id: "{{ helper_expected_hvac }}"
                          data:
                            value: "{{ selected_hvac_mode }}"
                          continue_on_error: true

                        # v5.1.2 FIX: Use MANDATORY rapid batched service call pattern for BRP069/BRP084
                        # CRITICAL: Must follow exact pattern from CLAUDE.md to avoid firmware issues

                        # FIRST: Set temperature + HVAC mode together (turns AC ON atomically)
                        - service: climate.set_temperature
                          target:
                            entity_id: "{{ current_entity }}"
                          data:
                            temperature: "{{ cooling_target_temp }}"
                            hvac_mode: "{{ selected_hvac_mode }}"
                          continue_on_error: false  # FAIL LOUDLY

                        # v5.4.0: Delay for BRP084 semaphore compatibility
                        - delay:
                            milliseconds: 500

                        # SECOND: Set fan mode sequentially
                        # v7.0.0: Use new unified fan control system
                        # Capture expected fan value for manual override detection
                        - service: input_text.set_value
                          target:
                            entity_id: "{{ helper_expected_fan }}"
                          data:
                            value: "{{ new_fan_mode }}"
                          continue_on_error: true

                        - service: climate.set_fan_mode
                          target:
                            entity_id: "{{ current_entity }}"
                          data:
                            fan_mode: "{{ new_fan_mode }}"
                          continue_on_error: false  # FAIL LOUDLY

                        # v5.4.0: Delay for BRP084 semaphore compatibility
                        - delay:
                            milliseconds: 500

                        # THIRD: Set swing mode sequentially (v5.3.5 FIX: Use user-configured swing mode)
                        - service: climate.set_swing_mode
                          target:
                            entity_id: "{{ current_entity }}"
                          data:
                            swing_mode: "{{ validated_swing_mode }}"
                          continue_on_error: true  # OK to fail (not all devices support)

                        # Debug logging (after service calls)
                        - if:
                            - condition: template
                              value_template: "{{ debug_enabled }}"
                          then:
                            - service: system_log.write
                              data:
                                message: >
                                  🔍 STABILITY RESET - COOLING: {{ repeat.item }}
                                  • HVAC Mode: {{ selected_hvac_mode }}
                                  • Fan Mode: {{ selected_fan_mode }}
                                  • Temperature: {{ cooling_target_temp }}°C
                                  • Reason: Exited comfort zone stability, activating cooling
                                level: debug

                  # Capture expected temperature for manual override detection
                  - service: input_number.set_value
                    target:
                      entity_id: "{{ helper_expected_temp }}"
                    data:
                      value: "{{ cooling_target_temp }}"
                    continue_on_error: true

                  # v4.2.1: helper_last_mode already updated BEFORE service calls (line ~6722)
                  # This ensures new automation runs from climate_state_change see correct mode

                  # v5.3.19 FIX: Wrapped in if/then to prevent blocking subsequent debug log
                  - if:
                      - condition: template
                        value_template: "{{ dynamic_enabled and helper_mode_time not in [none, '', 'unavailable', 'unknown', []] and helper_mode_time is string and helper_mode_time != '' and (last_mode != 'cooling' or actual_ac_state == 'off') }}"
                    then:
                      - service: input_datetime.set_datetime
                        target:
                          entity_id: "{{ helper_mode_time }}"
                        data:
                          datetime: "{{ now() }}"
                        continue_on_error: true

                  - service: system_log.write
                    data:
                      message: >
                        ❄️ Cooling activated after stability reset
                        • Temperature: {{ current_temp }}°C
                        • Target: {{ cooling_target_temp }}°C
                      level: warning
              
              # Need heating (v5.2.5 FIX: Added enable_heating check - was missing!)
              - conditions:
                  - condition: template
                    value_template: >
                      {% set time_protection_met = (last_mode == 'heating' and ((final_escalation_level | int(0)) > 0 or (time_in_current_mode | float(0)) > (runtime_min | float(0)))) or ((last_mode == 'off' or actual_ac_state == 'off') and (not enforce_offtime or (time_in_current_mode | float(0)) > (offtime_min | float(0)))) or (last_mode != 'heating' and last_mode != 'off') %}
                      {{ enable_heating and should_activate and current_temp < comfort_min_temp and time_protection_met and (control_mode != 'Smart' or smart_presence_active) }}
                sequence:
                  - repeat:
                      for_each: "{{ climate_list }}"
                      sequence:
                        - variables:
                            current_entity: "{{ repeat.item }}"
                            available_modes: "{{ state_attr(repeat.item, 'hvac_modes') | list }}"
                            
                            # Smart heating mode selection
                            # v3.10.0: Only use auto/heat_cool if cooling is also enabled
                            selected_hvac_mode: >
                              {% set modes = state_attr(repeat.item, 'hvac_modes') | list %}
                              {# For heating, try heating-capable modes #}
                              {% if 'heat' in modes %}
                                heat
                                {% elif 'Heat' in modes %}
                                Heat
                                {% elif enable_cooling and 'auto' in modes %}
                                auto
                                {% elif enable_cooling and 'Auto' in modes %}
                                Auto
                                {% elif enable_cooling and 'heat_cool' in modes %}
                                heat_cool
                                {% elif enable_cooling and 'Heat/Cool' in modes %}
                                Heat/Cool
                                {% else %}
                                off
                              {% endif %}

                        # v4.2.1 FIX: Update ALL helpers BEFORE service calls to prevent manual override false positives

                        # 1. Update helper_change FIRST (timestamps the automation action)
                        - if:
                            - condition: template
                              value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
                          then:
                            - service: input_datetime.set_datetime
                              target:
                                entity_id: "{{ helper_change }}"
                              data:
                                datetime: "{{ now() }}"
                              continue_on_error: true

                        # 2. Update helper_last_mode BEFORE service calls
                        # v6.3.1: Added enable_heating safeguard
                        - if:
                            - condition: template
                              value_template: "{{ enable_heating }}"
                          then:
                            - service: input_text.set_value
                              target:
                                entity_id: "{{ helper_mode }}"
                              data:
                                value: "heating"
                              continue_on_error: true

                        # 3. Capture expected values for enhanced manual override detection (v3.3.0)
                        - service: input_text.set_value
                          target:
                            entity_id: "{{ helper_expected_hvac }}"
                          data:
                            value: "{{ selected_hvac_mode }}"
                          continue_on_error: true

                        # v5.1.2 FIX: Use MANDATORY rapid batched service call pattern for BRP069/BRP084
                        # CRITICAL: Must follow exact pattern from CLAUDE.md to avoid firmware issues

                        # FIRST: Set temperature + HVAC mode together (turns AC ON atomically)
                        - service: climate.set_temperature
                          target:
                            entity_id: "{{ current_entity }}"
                          data:
                            temperature: "{{ heating_target_temp }}"
                            hvac_mode: "{{ selected_hvac_mode }}"
                          continue_on_error: false  # FAIL LOUDLY

                        # v5.4.0: Delay for BRP084 semaphore compatibility
                        - delay:
                            milliseconds: 500

                        # SECOND: Set fan mode sequentially
                        # v7.0.0: Use new unified fan control system
                        # Capture expected fan value for manual override detection
                        - service: input_text.set_value
                          target:
                            entity_id: "{{ helper_expected_fan }}"
                          data:
                            value: "{{ new_fan_mode }}"
                          continue_on_error: true

                        - service: climate.set_fan_mode
                          target:
                            entity_id: "{{ current_entity }}"
                          data:
                            fan_mode: "{{ new_fan_mode }}"
                          continue_on_error: false  # FAIL LOUDLY

                        # v5.4.0: Delay for BRP084 semaphore compatibility
