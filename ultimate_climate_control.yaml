          name: "Band: 1-2°C from target"
          description: |
            **Fan speed when temperature is 1-2°C from target.**

            Slightly off target - moderate fan speed for steady progress.
            Only applies when Fan Control Mode is set to "Temperature Band".
          default: "Level 2"
          selector:
            select:
              options:
                - "Auto"
                - "auto"
                - "Quiet"
                - "Silence"
                - "Level 1"
                - "Level 2"
                - "Level 3"
