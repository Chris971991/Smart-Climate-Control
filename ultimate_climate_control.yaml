blueprint:
  name: Ultimate Smart Climate Control - v7.3.2

  description: |
    **Ultimate Smart Climate Control v7.3.2**

    🌡️ The most advanced Home Assistant climate automation with intelligent presence detection, dynamic fan control, outside temperature compensation, and 40-60% energy savings.

    ## 🚀 EASY SETUP - Use the Setup Wizard!

    **⚠️ Don't create helpers manually!** Install the companion **Setup Wizard** for automated setup:

    ✅ **2-Minute Setup** - Complete automation in ~2 minutes
    ✅ **Zero Manual Work** - All 23 helpers created automatically (3 new in v6.6.0)
    ✅ **Dashboard Card Generator** - Animated control card included
    ✅ **Safe & Isolated** - Package-based helpers won't affect existing setup

    **Install via HACS:**
    Settings → HACS → Integrations → ⋮ Menu → Custom Repositories
    Add: `https://github.com/Chris971991/Smart-Climate-Control` (Category: Integration)

    *Advanced users can still create helpers manually - see [Documentation](https://github.com/Chris971991/Smart-Climate-Control)*

    ---

    ## ✨ Key Features

    **🎮 5 Control Modes:**
    - **Auto:** House-wide automation with home/away detection
    - **Smart:** Room-specific presence with BLE/PIR/mmWave sensors (immediate shutoff when leaving)
    - **Manual:** Full user control with emergency temperature overrides only
    - **Override:** (Auto-set) User manually changed AC - automation paused temporarily
    - **Pre-conditioning:** (Auto-set) Active when approaching home - persists through arrival until target temp reached

    **🧠 Intelligent Automation:**
    - Room-specific presence detection (BLE, motion, door sensors, adjacent room support)
    - Dynamic 5-level fan escalation based on actual effectiveness (Level 1→5)
    - Temperature stability auto-off (prevents wasted runtime)
    - Proximity pre-conditioning (cools/heats before you arrive home)
    - Near-target stall detection (pushes through final degrees)
    - Accurate presence confirmation delays (no more false timer accumulation!)
    - Enhanced manual override detection (temp, fan, swing, HVAC mode changes)

    **⚡ Energy Efficiency:**
    - 40-60% energy savings vs always-on operation
    - Smart hysteresis prevents short-cycling and equipment wear
    - Unified cooling/heating modes with dynamic escalation (L0-L4)
    - Eco mode for unoccupied rooms (off/eco/maintain options)
    - Comfort zone idle (no unnecessary cooling/heating)

    **🔧 Advanced Capabilities:**
    - Universal A/C compatibility (auto-detects HVAC modes, fan speeds, swing modes)
    - Multi-zone support (control 1 or multiple units simultaneously)
    - **NEW v3.2.0:** Outside Temperature Compensation (makes AC work HARDER on extreme days to ACHIEVE your target)
    - Time-based scheduling (morning/day/evening/night + weekends)
    - Window detection with auto-shutoff
    - **ENHANCED v3.3.0:** Comprehensive manual override (detects all parameter changes via HA UI or remote)

    ---

    **📋 VERSION UPDATES:**

    **v7.3.2 - Family-Friendly Auto-Off (Optional Person Override + Threshold Fix):**
    • **NEW**: Optional "Auto-Off People" override — leave empty to use People to Track, or set explicitly for families (e.g., track only adults)
    • **FIX**: Threshold logic now uses "not everyone home" vs "everyone home" instead of "1" vs "2+" — correct for families of any size
    • **Condition 1**: Not everyone home → ANY sensor ON triggers auto-off; Everyone home → ALL sensors must be ON
    • **Condition 2**: Scheduled time window — configurable start/end time with overnight support (e.g., 22:00-06:00)
    • **Configurable action**: Off, Eco, or Fan Only — user chooses per room
    • Works in Auto and Smart control modes, respects Override/Manual, compressor protection, and all existing safeguards

    **v7.1.6 - Fix Bed Comfort Cycling (5-10 min ON/OFF loop):**
    • **🐛 BUG**: AC cycles ON/OFF every 5-10 minutes when bed comfort mode is active
    • **📝 ROOT CAUSE 1**: Target-reached turn-off block had broken bed guard (`bed_eco_fan_only_mode == true` compared string to boolean - always false)
    • **📝 SCENARIO**: Cooling reaches target → choose block activates bed ECO → post-choose still sees stale `last_mode='cooling'` → turns AC OFF → temp rises → cooling restarts → repeat
    • **✅ FIX 1**: Changed guard to `bed_comfort_mode != 'off'` - now correctly prevents turn-off when user is in bed with bed comfort enabled
    • **📝 ROOT CAUSE 2**: Temperature Stability Auto-Off didn't exclude bed comfort modes
    • **✅ FIX 2**: Added `bed_comfort_eco`, `bed_comfort_quiet`, `bed_eco_fan_only` to stability exclusion lists
    • **🔄 RESULT**: Bed comfort mode now maintains continuous operation without interruption from target-reached or stability auto-off

    **v7.1.3 - Fix Pre-conditioning Fan Speed + Add Boost Mode:**
    • **🐛 BUG**: Pre-conditioning uses fan speed 1 instead of configured High/5
    • **✅ FIX**: Added dedicated "PRE-CONDITIONING FAN CORRECTION" section
    • **✨ NEW**: Added `precond_boost_enabled` setting (default: ON)
    • **🔄 RESULT**: Pre-conditioning now uses max fan AND aggressive temperature for fastest results

    **v6.5.5 - Fix False Override on BRP072C Devices During Pre-Conditioning:**
    • **🐛 BUG**: Automation turning AC OFF falsely triggered "physical remote turn-ON" override
    • **📝 CAUSE**: STATE SYNC section called BOTH `set_hvac_mode: off` AND `turn_off` in sequence
    • **📝 ROOT CAUSE**: First command set `_last_known_pow='0'`, second command saw device still at `pow='1'`
      (device hadn't processed first command yet), triggering false "user turned ON" detection
    • **✅ FIX**: Remove redundant `climate.turn_off` - `set_hvac_mode: off` alone is sufficient
    • **🔄 RESULT**: Automation OFF commands no longer trigger false override

    **v6.5.3 - Fix False Override + AC Activating in Empty Room:**
    • **🐛 BUG 1**: When automation turned AC OFF, it falsely triggered Manual Override
    • **📝 CAUSE**: `on_to_off` detection ran before checking `expected_hvac` - context.parent_id not propagated
    • **✅ FIX**: Check `expected_hvac == 'off'` BEFORE `on_to_off` fallback in override detection
    • **🐛 BUG 2**: After clearing override, AC turned back ON in empty room
    • **📝 CAUSE**: Clearing override (Override→Smart) reset `presence_detected_helper` to NOW, restarting grace period
    • **✅ FIX**: Don't reset presence timers when clearing override (only when switching from Auto/Manual to Smart)
    • **🔄 RESULT**: Clearing override no longer allows AC to activate in empty rooms

    **v6.4.0 - UI Click Race Condition Fix:**
    • **🐛 BUG**: Clicking climate card in HA UI sometimes didn't trigger Override mode
    • **📝 CAUSE**: `mode:restart` allows periodic triggers to kill UI-initiated automation runs before Override activates
    • **✅ FIX**: New `helper_last_ui_click` helper records UI clicks IMMEDIATELY (before any conditions)
    • **✅ FIX**: Even if another trigger kills the run, next run detects the recent UI click (within 10s)
    • **🔄 RESULT**: Clicking OFF on climate card now ALWAYS activates Override mode immediately

    **v6.1.0 - Comprehensive Override Detection & BRP084 Sequential Calls:**
    • **✨ NEW**: Detects ALL manual changes: HVAC mode, temperature, fan speed, AND swing mode
    • **✨ NEW**: Uses integration's `expected_fan_mode` and `expected_swing_mode` attributes
    • **✨ NEW**: Case-insensitive fan/swing comparison (handles "Quiet" vs "quiet")
    • **✨ NEW**: Temperature tolerance (0.5°C) to prevent false positives from rounding
    • **✨ FIX**: Extended command timeout (BRP084=15s, others=10s) for sequential 500ms delays
    • **✨ FIX**: All climate service calls now use 500ms delays for BRP084 semaphore compatibility
    • **🔄 RESULT**: Remote control fan/temp/swing changes now properly detected as manual overrides

    **v6.0.4 - Device-Aware Override Detection:**
    • **✨ NEW**: Adaptive command timeout based on device type (BRP084=8s, BRP072C/BRP069=5s)
    • **✨ NEW**: Uses integration's `device_type` attribute for firmware-aware detection
    • **🔄 RESULT**: BRP084 (firmware 2.8.0) devices with power verification no longer cause false overrides

    **v6.0.2 - Fix False Positives from Delayed State Updates:**
    • **🐛 BUG**: When optimistic state timed out, integration cleared expected values causing false override detection
    • **✅ FIX**: Integration now preserves expected state; blueprint compares expected vs actual even after timeout
    • **🔄 RESULT**: Delayed coordinator updates no longer trigger false positives

    **v6.0.1 - Fix Automation Feedback Loop:**
    • **🐛 BUG**: climate_state_change trigger caused infinite loop
    • **✅ FIX**: Early exit for automation-triggered state changes

    ---

    📖 **[Full Changelog & Version History](https://github.com/Chris971991/Smart-Climate-Control/releases)**

    ---

    **Blueprint Direct Import:** `https://github.com/Chris971991/Smart-Climate-Control/blob/main/ultimate_climate_control.yaml`
  domain: automation
  source_url: https://github.com/Chris971991/Smart-Climate-Control/blob/main/ultimate_climate_control.yaml
  input:
    # Basic required settings (always visible)
    room_name:
      name: Room Name *
      description: |
        **Enter the name of this room** for logging and BLE detection.
        
        **Used for:**
        • **Debug logging:** Prefixes all log entries with room name
        • **BLE triangulation:** Must match sensor output exactly for presence detection
        • **Multi-room setup:** Helps distinguish between different AC automations
        
        **Examples:** "Office", "Living Room", "Master Bedroom"
        
        **Important:** If using BLE sensors, check sensor state in Developer Tools for exact string
      selector:
        text:
    
    climate_entities:
      name: Climate Entities *
      description: |
        Select one or more **climate entities** to control with this automation.

        **Supported devices:** All types of A/C units, heat pumps, and climate control devices.
      selector:
        entity:
          multiple: true
          domain: climate
    
    # Manual Override Detection Settings
    manual_override_settings:
      name: "Manual Override Detection Settings"
      icon: mdi:hand-back-right
      collapsed: true
      input:
        enable_manual_override_detection:
          name: Enable Manual Override Detection
          description: |
            **Detect when you manually change AC settings** and temporarily pause automation.

            **How it works:**
            When you change temperature, fan speed, or turn AC on/off via HA app, dashboard,
            or physical remote, automation detects this and enters **Override mode**.

            **Override mode:**
            • Pauses temperature/fan adjustments for the configured timeout
            • Respects your manual settings
            • Automatically returns to previous mode after timeout

            **When to disable:**
            • If you have other automations controlling the same AC
            • If you're getting false override detections
            • For testing purposes

            **Recommended:** Keep enabled for normal use.
          default: true
          selector:
            boolean:

        override_timeout:
          name: Override Timeout (hours)
          description: |
            How long to respect manual adjustments while automation is running.

            When you tweak temperature/fan settings while in Auto/Smart mode,
            automation pauses adjustments for this duration but stays in the same mode.

            Presence detection and mode switching continue normally.
            Only temperature and fan speed adjustments pause.

            Recommended: 2 hours for most situations.
          default: 2
          selector:
            number:
              min: 0
              max: 24
              step: 0.5
              unit_of_measurement: hours
              mode: slider

        manual_mode_timeout:
          name: Manual Mode Timeout
          description: |
            How long to stay in Manual mode before returning to Smart mode.

            Manual mode = complete automation bypass for pre-conditioning.
            Use for: Pre-cooling before arriving home, specific settings, etc.

            Different from Override (which pauses adjustments but keeps automation).
          default: "4_hours"
          selector:
            select:
              options:
                - label: "Never (Pure Manual - runs until manually changed)"
                  value: "never"
                - label: "1 Hour"
                  value: "1_hour"
                - label: "2 Hours"
                  value: "2_hours"
                - label: "4 Hours (Recommended)"
                  value: "4_hours"
                - label: "8 Hours"
                  value: "8_hours"
                - label: "12 Hours"
                  value: "12_hours"
                - label: "24 Hours"
                  value: "24_hours"


    # Debugging & Logging Settings
    debugging_settings:
      name: "Debugging & Logging Settings"
      icon: mdi:message-text
      collapsed: true
      input:
        enable_event_logging:
          name: "Event Logging"
          description: |
            Log climate events to Home Assistant's log.

            Logs AC activation, deactivation, and manual override detection.
            Useful for understanding automation behavior.

            View logs: Settings > System > Logs (search room name)

            Recommended: Keep ON for troubleshooting.
          default: true
          selector:
            boolean:

        enable_full_debug_logging:
          name: "Full Debug Logging"
          description: |
            Enable verbose debug logging for troubleshooting.

            WARNING: Creates many log entries - use only when debugging.

            Logs condition evaluations, variable states, temperature calculations,
            and escalation decisions.

            Recommended: Keep OFF during normal operation.
          default: false
          selector:
            boolean:

    # Temperature Settings - Simple Mode
    temperature_settings:
      name: "Temperature Settings"
      icon: mdi:thermometer
      collapsed: true
      input:
        temperature_sensor:
          name: Temperature Sensor(s)
          description: |
            External temperature sensor(s) for more accurate readings.

            Optional - if not set, uses AC's built-in sensor.

            Supports multiple sensors for multi-room cooling:
            - Cooling: Uses warmest room
            - Heating: Uses coldest room
            - Both/Neither: Uses average
          default:
          selector:
            entity:
              domain: sensor
              device_class: temperature
              multiple: true

        use_average_temperature:
          name: Use Average Temperature
          description: |
            How to calculate temperature with multiple AC units.

            - **ON:** Average temperatures from all ACs
            - **OFF:** Use first AC only

            Disable if using one external sensor for multiple units.
          default: true
          selector:
            boolean:

        target_temperature:
          name: Target Temperature
          description: |
            Your ideal room temperature in Celsius.

            This is the main control - all thresholds adjust relative to this value.
          default: 23
          selector:
            number:
              min: 18
              max: 28
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

        comfort_zone_width:
          name: Comfort Zone Range
          description: |
            Temperature tolerance around target (plus/minus).

            - **Wider (2-3°C):** Fewer AC cycles, more efficient
            - **Narrower (0.5-1°C):** Tighter control, more cycling

            Example: 23°C target with ±2°C = comfort zone 21-25°C
          default: 2
          selector:
            number:
              min: 0.5
              max: 3
              step: 0.1
              unit_of_measurement: "°C"
              mode: slider

        target_overshoot_strategy:
          name: Target Overshoot Strategy
          description: |
            How far past target should AC run before turning off.

            - **None:** Off at exact target (may cause rapid cycling)
            - **Minimal:** 0.5°C past target
            - **Moderate:** Halfway to comfort edge (recommended)
            - **Maximum:** Full comfort zone edge

            **Example with target 22.5°C, comfort zone 21.1-23.9°C:**
            • Cooling stops at: **22.5°C** (none) / **22.0°C** (minimal) / **21.8°C** (moderate) / **21.1°C** (maximum)
            • Heating stops at: **22.5°C** (none) / **23.0°C** (minimal) / **23.2°C** (moderate) / **23.9°C** (maximum)

            **When to use:**
            • **None:** Only if you understand cycling risks and want pure target-based operation
            • **Minimal:** Bedrooms, offices where precise temp control is critical
            • **Moderate:** Most rooms - best balance (default)
            • **Maximum:** High thermal load rooms, extreme outdoor temps, or frequent cycling issues
          default: moderate
          selector:
            select:
              options:
                - label: "None (No overshoot - may cause rapid cycling)"
                  value: "none"
                - label: "Minimal (0.5°C overshoot)"
                  value: "minimal"
                - label: "Moderate (Halfway to comfort edge) - RECOMMENDED"
                  value: "moderate"
                - label: "Maximum (Full comfort zone)"
                  value: "maximum"

        enable_heating_mode:
          name: Enable Heating Mode
          description: |
            Allow heating when temperature drops below comfort zone.

            - **ON:** Full climate control
            - **OFF:** Cooling only (for people who run hot)
          default: true
          selector:
            boolean:

        enable_cooling_mode:
          name: Enable Cooling Mode
          description: |
            Allow cooling when temperature rises above comfort zone.

            - **ON:** Full climate control
            - **OFF:** Heating only (for cold climates)
          default: true
          selector:
            boolean:
        
        temperature_aggressiveness:
          name: Response Aggressiveness
          description: |
            How quickly AC escalates power when temperature is outside comfort zone.

            - **1 (Gentle):** Slow escalation, most efficient, quieter
            - **2 (Balanced):** Recommended for most rooms
            - **3 (Moderate):** Faster response
            - **4-5 (Aggressive):** Maximum speed, higher power use

            Increase if AC struggles to reach target. Decrease for efficiency.

            See Help section for detailed examples.
          default: 2
          selector:
            number:
              min: 1
              max: 5
              step: 1
              mode: slider
        
        # ADVANCED OVERRIDES (Hidden by default)
        enable_advanced_temp:
          name: Enable Advanced Temperature Controls
          description: |
            Override individual temperature thresholds.

            For users who want precise control over all thresholds.
            Overrides automatic calculations based on target temperature.

            Most users should leave this disabled.
          default: false
          selector:
            boolean:
        
        # These are only shown when advanced mode is enabled
        comfort_min_temp:
          name: Comfort Zone Minimum (Advanced)
          description: |
            Override auto-calculated **minimum comfort temperature**.

            • **Bottom of comfort zone** where heating may start
            • Should be lower than comfort maximum
            • Typically 1-2°C below target temperature

            **Behavior:** When room is above this, system stays in eco/off mode.
          default: 21
          selector:
            number:
              min: 18
              max: 25
              step: 0.5
              unit_of_measurement: "°C"
        
        comfort_max_temp:
          name: Comfort Zone Maximum (Advanced)
          description: |
            Override auto-calculated **maximum comfort temperature**.

            • **Top of comfort zone** where cooling may start
            • Should be higher than comfort minimum
            • Typically 1-2°C above target temperature

            **Behavior:** When room is below this, system stays in eco/off mode.
          default: 23
          selector:
            number:
              min: 20
              max: 28
              step: 0.5
              unit_of_measurement: "°C"
        
        cooling_target_temp:
          name: Cooling Target (Advanced)
          description: |
            Override **cooling target temperature**.

            • **What temperature to cool the room to**
            • Used when room exceeds comfort maximum
            • Usually same as or slightly below base target

            **Behavior:** System will cool to this temperature then switch to eco/off.
          default: 22
          selector:
            number:
              min: 18
              max: 28
              step: 0.5
              unit_of_measurement: "°C"
        
        heating_target_temp:
          name: Heating Target (Advanced)
          description: |
            Override **heating target temperature**.

            • **What temperature to heat the room to**
            • Used when room falls below comfort minimum
            • Usually same as or slightly above base target

            **Behavior:** System will heat to this temperature then switch to eco/off.
          default: 23
          selector:
            number:
              min: 18
              max: 28
              step: 0.5
              unit_of_measurement: "°C"
        
        precool_target_temp:
          name: Pre-cooling Target (Advanced)
          description: |
            Override **pre-conditioning target temperature**.

            • **Temperature to achieve before you arrive home**
            • Used with proximity sensors and approaching detection
            • Should be comfortable for immediate occupancy

            **Recommendation:** Usually matches your preferred target temperature.
          default: 22
          selector:
            number:
              min: 18
              max: 28
              step: 0.5
              unit_of_measurement: "°C"

        ac_minimum_temp:
          name: AC Minimum Temperature Override
          description: |
            Your AC's actual minimum temperature.

            Leave at 0 to use AC's reported minimum.
            Set this if your AC integration reports incorrect limits.

            Example: AC reports 7°C but can't go below 18°C.
          default: 0
          selector:
            number:
              min: 0
              max: 25
              step: 1
              unit_of_measurement: "°C"
              mode: box

        ac_maximum_temp:
          name: AC Maximum Temperature Override
          description: |
            Your AC's actual maximum temperature.

            Leave at 0 to use AC's reported maximum.
            Set this if your AC integration reports incorrect limits.

            Example: AC reports 35°C but can't go above 30°C.
          default: 0
          selector:
            number:
              min: 0
              max: 40
              step: 1
              unit_of_measurement: "°C"
              mode: box

        hysteresis_tolerance:
          name: Hysteresis Tolerance
          description: |
            Temperature buffer to prevent rapid mode switching (±°C).

            Prevents oscillation at temperature boundaries.
            System won't change modes unless temp exceeds threshold by this amount.

            0.3-0.5°C recommended for most rooms.
          default: 0.3
          selector:
            number:
              min: 0.05
              max: 1.0
              step: 0.01
              unit_of_measurement: "°C"

    # Presence & Proximity Settings
    presence_settings:
      name: "Presence & Proximity"
      icon: mdi:account-multiple
      collapsed: true
      input:
        presence_persons:
          name: People to Track
          description: |
            Select people for **presence detection**.

            • **Used for away mode detection**
            • Triggers pre-conditioning when approaching home
            • Works with proximity/direction sensors for advanced features
          default: []
          selector:
            entity:
              multiple: true
              domain: person
        
        presence_devices:
          name: Presence Detection Devices
          description: |
            Additional devices indicating presence when **person entities aren't sufficient**.

            **Examples:**

            • PC power state sensors
            • Smart TV power sensors
            • Gaming console entities
            • Workstation activity sensors

            **Purpose:** These supplement person presence detection for more accurate home/away detection.
          default: []
          selector:
            entity:
              multiple: true
        
        proximity_sensor:
          name: Proximity Distance Sensor
          description: |
            Sensor tracking **nearest person's distance from home**.

            • **Used for proximity-based pre-conditioning**
            • Works with direction sensor for smart approach detection
            • **Example:** `sensor.home_nearest_distance`

            **Requirement:** Home Assistant proximity integration setup.
          default: sensor.home_nearest_distance
          selector:
            entity:
              domain: sensor
        
        direction_sensor:
          name: Direction of Travel Sensor
          description: |
            Sensor tracking **direction of travel** relative to home.

            **States:**

            • **towards:** Approaching home
            • **away:** Moving away from home
            • **arrived:** At home location

            **Example:** `sensor.home_nearest_direction_of_travel`
          default: sensor.home_nearest_direction_of_travel
          selector:
            entity:
              domain: sensor
        
        home_zone_distance:
          name: Home Zone Distance
          description: |
            Distance defining your **"home zone" boundary**. Controls all proximity behaviors:

            • **Within this distance:** Maintain comfort temperature, pre-condition when approaching
            • **Beyond this distance:** Switch to away mode (off or eco mode)
          default: 5000
          selector:
            number:
              min: 1000
              max: 10000
              step: 500
              unit_of_measurement: m

    # Away Mode Settings
    away_settings:
      name: "Away Mode Settings"
      icon: mdi:home-export-outline
      collapsed: true
      input:
        enable_away_mode:
          name: Enable Away Mode
          description: |
            **Turn off or set to eco** when everyone leaves.

            Automatically manages climate control based on home occupancy for **energy savings**.
          default: true
          selector:
            boolean:
        
        away_mode_action:
          name: Away Mode Action
          description: |
            What to do when **everyone leaves home**:

            • **OFF:** Turn AC completely off (saves most energy, slow to cool when returning)
            • **ECO:** Reduce to eco mode with wider temperature range (balanced energy savings)
            • **MAINTAIN:** Keep current temperature (wastes energy but fastest comfort when returning)
          default: "eco"
          selector:
            select:
              options:
                - "off"
                - "eco"
                - "maintain"
        
        enable_pre_conditioning:
          name: Enable Pre-conditioning
          description: |
            **Pre-cool/heat when approaching home**.

            Uses proximity sensors to start conditioning before arrival for **immediate comfort**.
          default: true
          selector:
            boolean:

        precond_expiry_mode:
          name: Pre-conditioning Expiry Mode
          description: |
            How should pre-conditioning end after you arrive home?

            • **Timer Only:** Expires after the grace period timer (ignores temperature)
            • **Temperature Only:** Expires when target temp reached (no time limit)
            • **Both:** Expires when EITHER timer expires OR temp reached (whichever first)
          default: "Both"
          selector:
            select:
              options:
                - "Timer Only"
                - "Temperature Only"
                - "Both"

        precond_grace_period:
          name: Pre-conditioning Grace Period (minutes)
          description: |
            How long to keep AC running after arrival during pre-conditioning.
            Only used when Expiry Mode is "Timer Only" or "Both".
            Set to 0 to turn off immediately on arrival (not recommended).
          default: 15
          selector:
            number:
              min: 0
              max: 60
              step: 5
              unit_of_measurement: minutes

        precond_temp_threshold:
          name: Pre-conditioning Temperature Threshold (°C)
          description: |
            How close to target temperature before pre-conditioning ends.
            Only used when Expiry Mode is "Temperature Only" or "Both".
            Example: 1.0 means AC turns off when within 1°C of target.
          default: 1.0
          selector:
            number:
              min: 0.5
              max: 3.0
              step: 0.5
              unit_of_measurement: °C

        precond_fan_mode:
          name: Pre-conditioning Fan Mode
          description: |
            Fan speed to use during pre-conditioning.

            • **Dynamic:** Uses escalating fan logic based on temperature difference (recommended)
            • **Low:** Always use low fan (quieter but slower)
            • **Medium:** Always use medium fan (balanced)
            • **High:** Always use high fan (fastest cooling/heating)
          default: "Dynamic"
          selector:
            select:
              options:
                - "Dynamic"
                - "Low"
                - "Medium"
                - "High"

        precond_boost_enabled:
          name: Pre-conditioning Boost Mode
          description: |
            Use aggressive temperature setpoint for fastest cooling/heating.

            When enabled, pre-conditioning will set:
            • **Cooling:** AC minimum temp (typically 18°C) for maximum cooling power
            • **Heating:** AC maximum temp for maximum heating power

            This cools/heats the room as fast as possible before you arrive home.

            **Disable** if you prefer gradual temperature adjustment.
          default: true
          selector:
            boolean:

        precond_max_runtime:
          name: Pre-conditioning Maximum Runtime (minutes)
          description: |
            Safety limit: Maximum time pre-conditioning can run regardless of temperature.
            Prevents AC running forever if temperature sensor fails.
            Set to 0 to disable (not recommended).
          default: 60
          selector:
            number:
              min: 0
              max: 120
              step: 15
              unit_of_measurement: minutes

        enable_precond_max_runtime:
          name: Enable Maximum Runtime Safety Limit
          description: |
            Enable a safety timeout for pre-conditioning.
            When enabled, pre-conditioning will stop after the maximum runtime
            even if target temperature hasn't been reached.
            Recommended to keep this ON to prevent runaway AC operation.
          default: true
          selector:
            boolean:

        enable_precond_notifications:
          name: Enable Pre-conditioning Notifications
          description: |
            Send notifications when pre-conditioning events occur:
            • Pre-conditioning started (approaching home)
            • Arrival detected (grace period started)
            • Pre-conditioning complete (target reached or timer expired)
          default: false
          selector:
            boolean:

        precond_notify_device:
          name: Notification Service (optional)
          description: |
            Notification service to send pre-conditioning alerts to.
            Only used when notifications are enabled.
            Example: notify.mobile_app_chris_phone
          default: ""
          selector:
            text:

        smart_mode_behavior:
          name: Smart Mode Room Absence Behavior
          description: |
            What to do when room presence sensors detect absence (after timeout).

            - **ECO:** Reduce to eco mode (saves power, maintains some comfort)
            - **MAINTAIN:** Keep current temperature (comfort over efficiency)
            - **OFF:** Turn off completely (maximum power savings)

            Only applies when still home but room is empty.
          default: "eco"
          selector:
            select:
              options:
                - "eco"
                - "maintain"
                - "off"

    # Presence Detection Settings
    presence_detection_settings:
      name: "Presence Detection"
      icon: mdi:motion-sensor
      collapsed: true
      description: "Configure how room presence is detected using BLE, motion, and other sensors."
      input:
        room_presence_sensors:
          name: Room Presence Sensors
          description: |
            BLE, PIR or other sensors for room-specific presence detection.

            Supported sensor types:
            - BLE area sensors (reports room names like "Office", "Living Room")
            - PIR/motion sensors (binary on/off)
            - mmWave sensors (human presence detection)

            Example: sensor.phone_ble_area, binary_sensor.living_room_motion
          default: []
          selector:
            entity:
              multiple: true
              domain:
                - binary_sensor
                - sensor

        presence_validation_mode:
          name: Presence Validation Mode
          description: |
            How presence sensors combine to detect room occupancy.

            **Recommended:**
            - **BLE_MOTION** - Requires both BLE and motion (best accuracy)
            - **BLE_BED** - Requires both BLE and bed sensor (sleep detection)
            - **BLE_SMART** - BLE + (Motion OR Bed) - Intelligent detection

            **Single sensor (use with caution):**
            - MOTION_ONLY, BLE_ONLY, BED_ONLY

            **Multi-sensor logic:** ANY, ALL, MAJORITY, BLE_PLUS

            See Help section for detailed mode explanations.
          default: "any"
          selector:
            select:
              options:
                - label: "BLE_MOTION - BLE + Motion (BOTH required) - Recommended"
                  value: "ble_motion"
                - label: "BLE_BED - BLE + Bed sensor (BOTH required)"
                  value: "ble_bed"
                - label: "BLE_SMART - BLE + (Motion OR Bed) - Intelligent"
                  value: "ble_smart"
                - label: "MOTION_ONLY - Motion only (may have false triggers)"
                  value: "motion_only"
                - label: "BLE_ONLY - BLE only (adjacent room may trigger)"
                  value: "ble_only"
                - label: "BED_ONLY - Bed/occupancy sensor only"
                  value: "bed_only"
                - label: "ANY - Any sensor triggers (responsive, may have false positives)"
                  value: "any"
                - label: "ALL - All sensors must agree"
                  value: "all"
                - label: "MAJORITY - Most sensors must agree"
                  value: "majority"
                - label: "BLE_PLUS - BLE + at least one other"
                  value: "ble_plus"

        adjacent_room_names:
          name: Adjacent Room Names (Open-Plan Spaces)
          description: |
            For open-plan spaces, specify adjacent room names that should also trigger this AC.

            Enter comma-separated room names matching your BLE sensor format.
            Check Developer Tools > States to see how your BLE sensor reports names.

            Example: Kitchen, Dining Room, Family Room

            Leave empty if not using open-plan space detection.
          default: ""
          selector:
            text:

        presence_timeout_minutes:
          name: Presence Timeout
          description: |
            Minutes to wait after leaving room before taking action.

            Prevents shutdown during brief departures (bathroom breaks, quick errands).

            - **5-10 min:** Aggressive energy savings
            - **15-20 min:** Balanced (recommended)
            - **30+ min:** Maximum comfort

            Lower values save more energy but may cause comfort issues.
          default: 15
          selector:
            number:
              min: 5
              max: 60
              step: 5
              unit_of_measurement: minutes

        presence_confirmation_delay:
          name: Presence Confirmation Delay
          description: |
            How long presence must be continuously detected before turning AC ON.

            - **0 min:** Immediate response (default)
            - **2-5 min:** Filter brief visits and sensor flickers
            - **10-20 min:** High-traffic areas
            - **20-30 min:** Guest rooms (confirm actual occupancy)

            Only affects initial turn-on. Once running, AC stays on for full presence_timeout.
          default: 0
          selector:
            number:
              min: 0
              max: 30
              step: 1
              unit_of_measurement: minutes
              mode: slider

    # Temperature Stability Settings
    stability_settings:
      name: "Temperature Stability"
      icon: mdi:chart-line-variant
      collapsed: true
      description: "Auto-off when temperature stabilizes to save energy."
      input:
        stability_mode:
          name: Temperature Stability Mode
          description: |
            What to do when room temperature stabilizes within comfort zone.

            - **DISABLED:** Feature off (no auto-action when stable)
            - **TURN_OFF:** Turn AC completely off (maximum savings)
            - **ECO_MODE:** Switch to eco mode (moderate savings)
            - **FAN_ONLY:** Fan-only mode (recommended - maintains airflow)
          default: "disabled"
          selector:
            select:
              options:
                - label: "Disabled - No auto-action"
                  value: "disabled"
                - label: "Turn Off - Maximum savings"
                  value: "off"
                - label: "ECO Mode - Moderate savings"
                  value: "eco"
                - label: "Fan Only - Maintains airflow (recommended)"
                  value: "fan_only"

        stability_tolerance:
          name: Stability Temperature Tolerance
          description: |
            Temperature range considered "stable" for auto-off detection.

            - **0.3°C:** High sensitivity (recommended)
            - **0.5°C:** Moderate sensitivity
            - **1.0°C:** Low sensitivity

            Smaller values trigger auto-off sooner.
          default: 0.3
          selector:
            number:
              min: 0.1
              max: 5.0
              step: 0.1
              unit_of_measurement: "°C"

        stability_duration:
          name: Stability Duration
          description: |
            Minutes temperature must remain stable before auto-off triggers.

            - **10-15 min:** Aggressive savings
            - **20-25 min:** Balanced (recommended)
            - **25-30 min:** Conservative, prioritizes comfort
          default: 15
          selector:
            number:
              min: 10
              max: 30
              step: 5
              unit_of_measurement: "min"

    # Bed/Sleep Comfort Settings (Optional)
    bed_comfort_settings:
      name: "Bed/Sleep Comfort Settings"
      icon: mdi:bed
      collapsed: true
      input:
        bed_comfort_mode:
          name: "Bed Comfort Mode"
          description: |
            **Triggered when bed sensor detects occupancy** (requires bed sensor configured below):

            **Purpose:** Ultra-quiet, sleep-optimized climate control when in bed

            • **OFF:** Normal behavior (no special bed mode)
            • **QUIET:** Ultra-quiet fan only (Level 1/Quiet/Silence) when in bed ⭐ Recommended
            • **ECO:** Full eco mode (low power + quiet fan) when in bed

            **Different from Eco Mode:** This responds to **bed occupancy**, not comfort zone
            **Different from Stability:** This responds to **being in bed**, not temperature stability

            **Benefits:**
            • Ultra-quiet operation for better sleep
            • Energy savings while maintaining comfort
            • Automatic activation when entering bed

            **Safe:** Only activates after temperature targets reached, never interrupts active cooling/heating
          default: "off"
          selector:
            select:
              options:
                - label: "Off - Normal behavior (no special bed mode)"
                  value: "off"
                - label: "Quiet - Ultra-quiet fan when in bed (recommended)"
                  value: "quiet"
                - label: "Eco - Full eco mode when in bed"
                  value: "eco"

        bed_sensor_manual:
          name: "Bed Occupancy Sensor"
          description: |
            Select the bed occupancy sensor (binary_sensor).

            **Examples:**
            - Bed pressure sensor
            - ESPresense bed presence sensor
            - mmWave bed occupancy sensor
            - Weight-based bed sensor

            **Leave empty to disable bed comfort mode.**
          default: ""
          selector:
            entity:
              domain: binary_sensor

        bed_absence_grace_period:
          name: "Bed Absence Grace Period"
          description: |
            **Minutes to keep bed ECO mode running** after bed becomes unoccupied.

            Perfect for bathroom trips - prevents AC from exiting bed ECO mode during short absences.

            **Common Scenarios:**
            - **1-5 minutes:** Quick bathroom breaks
            - **5-10 minutes:** Standard bathroom routine
            - **10-15 minutes:** Longer absences
            - **15-30 minutes:** Very forgiving (getting water, checking on kids, etc.)
            - **0 minutes:** Exit immediately when bed unoccupied (old behavior)

            **Recommended:** 5-10 minutes for optimal comfort/efficiency balance.

            **How it works:** If you return to bed within the grace period, bed ECO mode seamlessly continues. If grace period expires, AC exits to normal cooling logic.

            **Trade-off:** Higher values maintain comfort during absences but may waste energy if you don't return to bed.
          default: 5
          selector:
            number:
              min: 0
              max: 30
              step: 1
              unit_of_measurement: minutes

        bed_eco_fan_only_mode:
          name: "Bed ECO Fan-Only Mode"
          description: |
            **Enable smart fan-only mode** when temperature stable at target.

            **How it works:**
            1. Bed ECO cools to target temperature (23°C)
            2. Detects when temperature **stable** (change < 0.05°C/min for 3+ minutes)
            3. Switches to **FAN_ONLY** to save power (~85% reduction)
            4. Returns to cooling if temp rises >0.5°C above target

            **Handles overshooting:** If room keeps cooling below target (e.g., 22.7°C),
            still switches to fan_only when stable (AC too effective, wasting power).

            **Power savings:** ~75-85% reduction over 8 hours sleep

            **Compatibility:** Automatically disabled if AC doesn't support fan_only mode
          default: "disabled"
          selector:
            select:
              options:
                - label: "Disabled - Always use cooling"
                  value: "disabled"
                - label: "Enabled - Switch to fan-only when stable"
                  value: "enabled"

        bed_eco_fan_only_trigger:
          name: "Bed ECO Fan-Only Trigger"
          description: |
            **When to switch to fan-only mode:**

            • **Stability:** Wait for temperature to stabilize before switching (current behavior)
            • **Temperature:** Switch immediately when overshoot target is reached
            • **Either:** Switch on whichever condition is met first (recommended) ⭐

            **Example with target 22°C and 0.5°C overshoot:**
            - Stability: Waits until temp stops changing at ~21.5°C
            - Temperature: Switches immediately when temp hits 21.5°C
            - Either: Switches at 21.5°C OR when stable, whichever first

            **With no overshoot:** All modes trigger at target temperature
          default: "stability"
          selector:
            select:
              options:
                - label: "Stability - Wait for temp to stabilize"
                  value: "stability"
                - label: "Temperature - Switch when overshoot target reached"
                  value: "temperature"
                - label: "Either - Stability OR temperature (recommended)"
                  value: "either"

        bed_eco_stability_minutes:
          name: "Bed ECO Stability Duration"
          description: |
            **Minutes temperature must be stable** before switching to fan-only.

            **What is "stable"?** Change rate < 0.05°C/min (configurable below)

            • **1-2 minutes:** Quick switch (may cycle more frequently)
            • **3-5 minutes:** Balanced (recommended) ⭐
            • **5-10 minutes:** Conservative (very stable before switching)

            **Recommended:** 3 minutes for optimal balance
          default: 3
          selector:
            number:
              min: 1
              max: 10
              step: 1
              unit_of_measurement: minutes

        bed_eco_stability_rate:
          name: "Bed ECO Stability Rate Threshold"
          description: |
            **Maximum temperature change rate** to be considered "stable".

            **Lower value = stricter stability requirement**

            • **0.02°C/min:** Very strict (almost no change)
            • **0.05°C/min:** Balanced (recommended) ⭐
            • **0.10°C/min:** Relaxed (allows more variation)

            **Example:** At 0.05°C/min, temp can change from 23.0 → 23.1°C over 2 minutes and still be "stable"

            **Recommended:** 0.05°C/min for most scenarios
          default: 0.05
          selector:
            number:
              min: 0.02
              max: 0.15
              step: 0.01
              unit_of_measurement: "°C/min"

        bed_eco_return_threshold:
          name: "Bed ECO Return Threshold"
          description: |
            **Temperature rise above target** to trigger return to cooling.

            **When in fan-only mode:**
            - Room naturally warms from fan-only operation
            - When temp exceeds (target + threshold), return to cooling

            • **0.2-0.3°C:** Tight control (more cooling cycles, less savings)
            • **0.5°C:** Balanced (recommended) ⭐
            • **0.7-1.0°C:** Relaxed (maximum savings, slight comfort trade-off)

            **Example:** Target 23°C, threshold 0.5°C
            - Fan-only while temp 23.0-23.5°C
            - Return to cooling at 23.5°C

            **Recommended:** 0.5°C for most users
          default: 0.5
          selector:
            number:
              min: 0.2
              max: 1.5
              step: 0.1
              unit_of_measurement: "°C"

        bed_eco_max_overshoot:
          name: "Bed ECO Maximum Overshoot Tolerance"
          description: |
            **Maximum undershoot below target** before forcing return to cooling.

            **Handles overshooting scenario:**
            - Bed ECO cools to 23°C but keeps going to 22.5°C
            - If temp stable at 22.5°C → Switch to fan_only (within tolerance)
            - If temp stable at 21.5°C → Stay in cooling (too cold!)

            • **0.5°C:** Strict (stay close to target)
            • **1.0°C:** Balanced (recommended) ⭐
            • **1.5-2.0°C:** Relaxed (allows significant undershoot)

            **Example:** Target 23°C, overshoot 1.0°C
            - Stable at 22.5°C → Switch to fan_only ✅
            - Stable at 21.8°C → Stay in cooling ❌

            **Recommended:** 1.0°C for most scenarios
          default: 1.0
          selector:
            number:
              min: 0.5
              max: 2.5
              step: 0.1
              unit_of_measurement: "°C"

        bed_eco_near_target_threshold:
          name: "Bed ECO Near-Target Threshold"
          description: |
            **"Good enough" zone** - how close to target before BED ECO stops trying harder.

            When room temp is within this threshold of target:
            • Fan stays at quiet eco speed (no escalation)
            • AC maintains rather than pushes harder

            **Example with target 22°C and threshold 0.3°C:**
            • Room at 22.2°C → ✅ Close enough, stay quiet at Fan 2
            • Room at 22.4°C → ⚠️ Can escalate to Fan 3 if stuck
            • Room at 22.8°C → 🔥 Normal escalation kicks in

            **Settings:**
            • **0.2°C:** Very precise - AC works hard to hit exact target
            • **0.3°C:** Balanced - good precision, stays quiet when close ⭐
            • **0.5°C:** Relaxed - quieter but may hover 0.5°C above target

            **In plain English:**
            Lower = more precise but potentially louder
            Higher = quieter but less precise
          default: 0.3
          selector:
            number:
              min: 0.1
              max: 0.8
              step: 0.1
              unit_of_measurement: "°C"

    # ===========================================
    # AUTO-OFF CONDITIONS (v7.3.0)
    # ===========================================
    auto_off_conditions_settings:
      name: "Auto-Off Conditions"
      icon: mdi:power-sleep
      collapsed: true
      description: "Turn off or reduce AC based on household occupancy sensors or time schedule. Configure who lives here, then set sensors for when 1 person is home vs everyone. Works in Auto and Smart modes."
      input:
        enable_auto_off_conditions:
          name: "Enable Auto-Off Conditions"
          description: |
            **Master switch** for the Auto-Off Conditions feature.

            When enabled, the AC will turn off or reduce when ANY of the configured conditions below are met.

            **Use cases:**
            - Living room AC that wastes energy overnight (use bed sensors + household members)
            - Schedule-based energy savings (time window)
            - Any room where you want automatic turn-off based on who's home and in bed
          default: false
          selector:
            boolean:

        auto_off_action:
          name: "Auto-Off Action"
          description: |
            What to do when auto-off conditions are met:

            - **OFF:** Turn AC completely off (maximum savings)
            - **ECO:** Switch to eco mode with wider temperature range
            - **FAN ONLY:** Fan-only mode (maintains airflow, no compressor)
          default: "off"
          selector:
            select:
              options:
                - label: "Off - Turn AC off (maximum savings)"
                  value: "off"
                - label: "Eco - Reduce to eco mode"
                  value: "eco"
                - label: "Fan Only - Fan only, no compressor"
                  value: "fan_only"

        auto_off_persons:
          name: "Auto-Off People (Optional)"
          description: |
            **Override** who counts for auto-off decisions.

            **Leave empty** to use People to Track from Presence settings.
            **Set explicitly** if auto-off should track different people
            (e.g., only adults in a family with kids).
          default: []
          selector:
            entity:
              multiple: true
              domain: person

        auto_off_sensors_1_home:
          name: "Sensors — Not Everyone Home"
          description: |
            **Which sensors to check when not all tracked people are home.**

            If ANY of these sensors is ON, auto-off triggers.

            **Example:** bed_left + bed_right — either one ON means
            the person is in bed.
          default: []
          selector:
            entity:
              multiple: true
              domain: binary_sensor

        auto_off_sensors_all_home:
          name: "Sensors — Everyone Home"
          description: |
            **Which sensors to check when all tracked people are home.**

            ALL of these sensors must be ON for auto-off to trigger.

            **Example:** bed_left + bed_right — both ON means everyone
            is in bed.
          default: []
          selector:
            entity:
              multiple: true
              domain: binary_sensor

        auto_off_schedule_enabled:
          name: "Enable Time Window"
          description: |
            **Turn off/reduce AC during a specific time window.**

            Supports overnight windows (e.g., 22:00 to 06:00).
          default: false
          selector:
            boolean:

        auto_off_schedule_start:
          name: "Time Window Start"
          description: |
            **Start time** for the auto-off window.

            Example: 22:00 for a "nighttime off" schedule.
          default: "22:00:00"
          selector:
            time:

        auto_off_schedule_end:
          name: "Time Window End"
          description: |
            **End time** for the auto-off window.

            Can be earlier than start time for overnight windows.
            Example: Start 22:00, End 06:00 = overnight window.
          default: "06:00:00"
          selector:
            time:


    # Scheduling Settings (Optional)
    scheduling_settings:
      name: "Time-Based Scheduling"
      icon: mdi:calendar-clock
      collapsed: true
      input:
        enable_scheduling:
          name: Enable Time-Based Scheduling
          description: |
            **Automatically adjust temperatures** based on time of day.

            **Benefits:**

            • **Optimized comfort** for different activities
            • **Energy savings** during sleeping hours
            • Cooler mornings, warmer evenings as needed
            • Separate weekend schedule option

            **Note:** Overrides base target temperature when enabled.
          default: false
          selector:
            boolean:
        
        morning_temp:
          name: Morning Temperature (6am-9am)
          description: |
            **Temperature target** for morning hours **(6am-9am)**.

            • **Typically cooler** for waking up comfort
            • Good for productivity during morning routines
            • Consider personal preferences and climate
          default: 22
          selector:
            number:
              min: 18
              max: 28
              step: 0.5
              unit_of_measurement: "°C"
        
        day_temp:
          name: Day Temperature (9am-6pm)
          description: |
            **Temperature target** for daytime hours **(9am-6pm)**.

            • **Optimize** for work/activity comfort
            • Balance productivity and energy efficiency
            • Consider sunlight and heat gain during day
          default: 23
          selector:
            number:
              min: 18
              max: 28
              step: 0.5
              unit_of_measurement: "°C"
        
        evening_temp:
          name: Evening Temperature (6pm-10pm)
          description: |
            **Temperature target** for evening hours **(6pm-10pm)**.

            • **Relaxation** and family time comfort
            • May prefer slightly warmer for leisure
            • Accounts for reduced outdoor temperatures
          default: 23
          selector:
            number:
              min: 18
              max: 28
              step: 0.5
              unit_of_measurement: "°C"
        
        night_temp:
          name: Night Temperature (10pm-6am)
          description: |
            **Temperature target** for sleeping hours **(10pm-6am)**.

            • **Sleep research** recommends 18-21°C for best rest
            • **Cooler temperatures** promote deeper sleep
            • **Energy savings** during extended periods
          default: 24
          selector:
            number:
              min: 18
              max: 28
              step: 0.5
              unit_of_measurement: "°C"
        
        enable_weekend_schedule:
          name: Different Weekend Schedule
          description: |
            Use **different temperature schedule** on weekends.

            • **Later wake times** with extended morning periods
            • Different activity patterns and comfort needs
            • More flexible scheduling for leisure days

            **Note:** Weekend morning period: 6am-10am (vs weekday 6am-9am)
          default: false
          selector:
            boolean:
        
        weekend_morning_temp:
          name: Weekend Morning Temperature
          description: |
            **Weekend morning temperature** **(6am-10am)**.

            • **Extended morning period** for leisurely weekends
            • May prefer warmer for relaxed mornings
            • Adjust based on weekend routines and preferences
          default: 23
          selector:
            number:
              min: 18
              max: 28
              step: 0.5
              unit_of_measurement: "°C"
        
        weekend_day_temp:
          name: Weekend Day Temperature
          description: |
            **Weekend daytime temperature** **(10am-10pm)**.

            • **Extended day period** for weekend activities
            • Covers both day and evening in one setting
            • Simplifies weekend scheduling

            **Note:** Single temperature for entire active weekend period.
          default: 23
          selector:
            number:
              min: 18
              max: 28
              step: 0.5
              unit_of_measurement: "°C"
        
        weekend_night_temp:
          name: Weekend Night Temperature
          description: |
            **Weekend night temperature** **(10pm-6am)**.

            • **Same sleep optimization** as weeknight temperature
            • May differ if weekend bedtime routines vary
            • Maintains consistent sleep comfort

            Consider if weekend sleep patterns require different settings.
          default: 24
          selector:
            number:
              min: 18
              max: 28
              step: 0.5
              unit_of_measurement: "°C"

    # Window Detection Settings (Optional)
    window_detection_settings:
      name: "Window Detection"
      icon: mdi:window-open
      collapsed: true
      input:
        enable_window_detection:
          name: Enable Window Detection
          description: |
            **Automatically turn off AC** when windows or doors are opened.

            **Benefits:**

            • **Prevents** cooling/heating the outdoors
            • **Significant energy savings**
            • Protects AC equipment from overwork
            • **Automatic resumption** when closed

            **Requirement:** Binary sensors on doors/windows.
          default: false
          selector:
            boolean:
        
        window_sensors:
          name: Window/Door Sensors
          description: |
            Select sensors that should **turn off AC** when opened.

            **Compatible sensors:**

            • **Door contact sensors**
            • **Window opening sensors**
            • **Magnetic reed switches**
            • **Smart window/door sensors**

            **Behavior:** All selected sensors will trigger AC shutdown when opened.
          default: []
          selector:
            entity:
              multiple: true
              domain: binary_sensor
        
        window_open_delay:
          name: Window Open Delay
          description: |
            **Minutes to wait** after window opens before turning off AC.

            • **Prevents false triggers** from brief openings
            • **0 minutes:** Immediate shutdown (most responsive)
            • **1-2 minutes:** Balanced (recommended)
            • **3+ minutes:** Delayed response

            **Result:** Brief openings won't unnecessarily stop your AC.
          default: 2
          selector:
            number:
              min: 0
              max: 10
              step: 1
              unit_of_measurement: "minutes"
        
        window_close_delay:
          name: Window Close Delay
          description: |
            **Minutes to wait** after window closes before resuming AC.

            • **Ensures window** is properly closed before restarting
            • Allows time for air exchange to stabilize
            • **Prevents rapid on/off cycling**

            **Recommendation:** Short delay to confirm sensor stability.
          default: 1
          selector:
            number:
              min: 0
              max: 10
              step: 1
              unit_of_measurement: "minutes"

    # Outside Temperature Compensation Settings (Optional)
    outside_temp_compensation_settings:
      name: "Outside Temperature Compensation"
      icon: mdi:sun-thermometer
      collapsed: true
      input:
        enable_outside_temp_compensation:
          name: Enable Outside Temperature Compensation
          description: |
            **Make AC work HARDER on extreme outdoor temperature days** to achieve your target.

            **How it works:**

            • **Hot outdoor weather (Cooling):** Set AC cooler than target + boost fan speed to counteract heat influx
            • **Cold outdoor weather (Heating):** Set heater warmer than target + boost fan speed to counteract cold influx
            • **Mild outdoor weather:** Use normal settings

            **Example:** 35°C outside, 22°C target → AC set to 20.5°C with Fan 4 start (undershoots to maintain 22°C)

            **Result:** Your target temperature is ACHIEVED faster and MAINTAINED even on extreme days.
          default: false
          selector:
            boolean:

        weather_entity:
          name: Weather Entity
          description: |
            **Weather integration** for outdoor temperature data.

            • **Provides base** outdoor temperature readings
            • Usually `weather.home` or `weather.forecast_home`
            • **Fallback** if no dedicated outdoor sensor available

            **Recommendation:** Most users should start with their default weather integration.
          default: weather.home
          selector:
            entity:
              domain: weather

        outdoor_temp_sensor:
          name: Outdoor Temperature Sensor (Optional)
          description: |
            **External temperature sensor** for more accurate readings.

            • **More precise** than weather service data
            • **Real-time local conditions** vs forecast data
            • **Optional:** Falls back to weather entity if not set

            **Recommended** for users with outdoor temperature sensors (e.g., Daikin outdoor units).
          default: []
          selector:
            entity:
              domain: sensor
              device_class: temperature

        outside_compensation_factor:
          name: Outside Compensation Factor
          description: |
            **How aggressively to compensate for outdoor temperature** (0-1).

            **Factor levels:**

            • **0.0:** No compensation (disabled)
            • **0.1-0.2:** Mild compensation (recommended for most climates)
            • **0.3-0.5:** Moderate compensation (hot/cold climates)
            • **0.6-1.0:** Aggressive compensation (extreme climates)

            **Example:** 0.2 factor with 35°C outside (10°C above neutral) → 2°C undershoot (AC set to 20°C for 22°C target)
          default: 0.2
          selector:
            number:
              min: 0
              max: 1
              step: 0.1

        max_outside_compensation:
          name: Maximum Outside Compensation
          description: |
            **Maximum degrees** to undershoot/overshoot AC setpoint.

            • **Safety limit** to prevent extreme AC settings
            • **1-2°C:** Conservative, small adjustments
            • **3-4°C:** Moderate, noticeable compensation
            • **5°C:** Aggressive, maximum compensation

            **Example:** 2°C max → AC won't go below 20°C for 22°C cooling target, or above 24°C for 22°C heating target.
          default: 2
          selector:
            number:
              min: 1
              max: 5
              step: 0.5
              unit_of_measurement: "°C"

        outside_compensation_base_temp:
          name: Outside Compensation Base Temperature
          description: |
            **Outdoor temperature** considered "neutral" (no compensation needed).

            • **Temperature where outdoor conditions don't fight your AC**
            • **25°C:** Good baseline for most climates
            • **Above baseline (cooling):** AC undershoots to counteract heat influx
            • **Below baseline (heating):** Heater overshoots to counteract cold influx

            **Recommendation:** Adjust based on your local climate and comfort preferences.
          default: 25
          selector:
            number:
              min: 20
              max: 30
              step: 1
              unit_of_measurement: "°C"

    # Heat Source Compensation Settings (Optional)
    heat_source_settings:
      name: "Heat Source Compensation"
      icon: mdi:radiator
      description: |
        Compensate for active heat-generating devices like gaming PCs, servers, or mining rigs.
      collapsed: true
      input:
        enable_heat_source_compensation:
          name: Enable Heat Source Compensation
          description: |
            **Monitor device load sensors** and adjust cooling strategy accordingly.

            When enabled, the automation will:
            • **Lower target temperature** when devices are under load
            • **Be more patient** with cooling progress (heat sources fight back)
            • **Optionally boost fan speed** when heat load detected

            **Use case:** Gaming rooms, home offices with PCs, server rooms, mining rigs.
          default: false
          selector:
            boolean:

        heat_source_sensors:
          name: Heat Source Sensors
          description: |
            **Sensors indicating device load** or heat generation.

            **Supported sensor types:**
            • **Percentage (0-100):** GPU load, CPU load, utilization sensors
            • **Watts (future):** Power consumption sensors

            **Examples:**
            • sensor.gaming_pc_gpu_load
            • sensor.gaming_pc_cpu_load
            • sensor.server_cpu_utilization

            **Multiple sensors are averaged together.**
          default: []
          selector:
            entity:
              multiple: true

        heat_source_threshold:
          name: Heat Source Activation Threshold
          description: |
            **Minimum average load percentage** before compensation activates.

            • **30%:** Sensitive - activates during light gaming/work
            • **50%:** Balanced - activates during moderate load (recommended)
            • **70%:** Conservative - only activates during heavy gaming

            **Example:** With 50% threshold, compensation only kicks in when average device load exceeds 50%.
          default: 50
          selector:
            number:
              min: 10
              max: 90
              step: 5
              unit_of_measurement: "%"

        heat_source_max_compensation:
          name: Maximum Temperature Compensation
          description: |
            **Maximum degrees** to lower the target temperature when heat sources active.

            **Example:** With 2°C max and 100% load:
            Target 23°C → AC aims for 21°C during heavy gaming

            • **1°C:** Light compensation
            • **2°C:** Moderate compensation (recommended)
            • **3°C:** Aggressive compensation
          default: 2
          selector:
            number:
              min: 0.5
              max: 5
              step: 0.5
              unit_of_measurement: "°C"

        heat_source_progress_reduction:
          name: Expected Progress Rate Reduction
          description: |
            **Reduce expected cooling progress rate** when heat sources active.

            **Example:** With 50% reduction and 0.03°C/min base rate:
            During gaming, system expects only 0.015°C/min progress
            (prevents unnecessary escalation when fighting active heat)

            • **25%:** Light reduction
            • **50%:** Moderate reduction (recommended)
            • **75%:** Heavy reduction (very patient)
          default: 50
          selector:
            number:
              min: 0
              max: 75
              step: 5
              unit_of_measurement: "%"

        heat_source_fan_boost:
          name: Fan Speed Boost When Active
          description: |
            **Boost initial fan speed** when heat sources detected.

            • **0:** No boost (rely on temperature compensation only)
            • **1:** Start one fan level higher (recommended)
            • **2:** Start two fan levels higher (aggressive)

            **Example:** With boost=1 and normal L1 escalation, system starts at L2 when gaming.
          default: 1
          selector:
            number:
              min: 0
              max: 2
              step: 1
              unit_of_measurement: "levels"

    # Fan & Swing Settings
    fan_settings:
      name: "Fan & Swing Settings"
      icon: mdi:fan
      collapsed: true
      input:
        # ===========================================
        # FAN CONTROL MODE SELECTION
        # ===========================================
        fan_control_mode:
          name: Fan Control Mode
          description: |
            **How should fan speed be controlled?**

            • **Static:** Fixed fan speed that never changes
            • **Temperature Band:** Speed based on distance from target temperature
            • **Dynamic:** Time-based escalation/de-escalation with hold times

            **Recommendations:**
            - **Static:** Best for noise-sensitive environments or simple operation
            - **Temperature Band:** Best balance of comfort and efficiency (recommended)
            - **Dynamic:** Best for aggressive temperature control
          default: "temperature_band"
          selector:
            select:
              options:
                - label: "Static - Fixed fan speed, never changes"
                  value: "static"
                - label: "Temperature Band - Speed based on distance from target"
                  value: "temperature_band"
                - label: "Dynamic - Time-based escalation with hold times"
                  value: "dynamic"

        # ===========================================
        # STATIC MODE SETTINGS
        # ===========================================
        static_fan_speed:
          name: "Static: Fan Speed"
          description: |
            **Fan speed to use when Static mode is selected.**

            The AC will always run at this fan speed regardless of temperature.
            Only applies when Fan Control Mode is set to "Static".
          default: "Level 3"
          selector:
            select:
              options:
                - "Auto"
                - "auto"
                - "Quiet"
                - "Silence"
                - "Level 1"
                - "Level 2"
                - "Level 3"
                - "Level 4"
