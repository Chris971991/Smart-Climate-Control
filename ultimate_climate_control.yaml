          {% elif distance_from_target > 3.0 %}
            {% set distance_floor = 3 %}  {# 3-4°C away = HIGH - instant Fan 4/5 #}
          {% elif distance_from_target > 2.0 %}
            {% set distance_floor = 2 %}  {# 2-3°C away = MEDIUM - instant Fan 3/4 #}
          {% elif distance_from_target > 1.0 %}
