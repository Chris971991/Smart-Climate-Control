        {% set outside_boost = outside_temp_escalation_boost | int(0) %}
        {% set heat_boost = heat_source_escalation_boost | int(0) %}
        {% set total_level = base_level + wrong_dir_add + outside_boost + heat_boost %}
        {{ [total_level, 4] | min }}

