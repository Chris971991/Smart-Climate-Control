          {% set emergency_threshold = 5.0 %}  {# v4.2.1: Increased from 4.0 to 5.0°C - true emergencies only #}
          {% set stall_threshold = 2.5 %}  {# v4.2.1: Increased from 2.0 to 2.5°C - less sensitive to stalling #}

