                • Sensors Configured: {{ heat_source_sensors | length }}
                • Average Load: {{ heat_source_load | round(1) }}%
                • Activation Threshold: {{ heat_source_threshold }}%
                • Heat Source Active: {{ heat_source_active }}

            🌡️ Compensation Applied:
