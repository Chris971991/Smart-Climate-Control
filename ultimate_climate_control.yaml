    # HELPER ENTITIES (Required Setup)
    # ===========================================
    helper_entities:
      name: "Helper Entities (Required Setup)"
      icon: mdi:database-cog
      collapsed: true
      description: "Create these helper entities in Home Assistant before using this blueprint. Each room needs its own set of helpers."
      input:
        # --- Core State Helpers ---
        helper_last_mode:
          name: Last Mode Helper
          description: |
            Tracks the last active climate mode.

            Create: Settings > Helpers > Text
            Naming: input_text.climate_last_mode_[roomname]
          selector:
            entity:
              domain: input_text

        helper_last_change:
          name: Last Change Helper
          description: |
            Tracks when climate changes occurred.

            Create: Settings > Helpers > Date and/or time
            Naming: input_datetime.climate_last_change_[roomname]
          selector:
            entity:
              domain: input_datetime

        helper_mode_before_override:
          name: Mode Before Override Helper
          description: |
            Stores which mode was active before Override.

