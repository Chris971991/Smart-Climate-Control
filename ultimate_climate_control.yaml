      # Calculate time since last fan speed change (for hold time enforcement)
      time_since_fan_change: >
        {% set helper = helper_last_fan_change %}
        {% if helper in [none, '', 'unavailable', 'unknown'] %}
          60
        {% else %}
          {% set last_change = states(helper) | default('') %}
          {% if last_change in ['unknown', 'unavailable', '', none] %}
            60
          {% else %}
            {% set parsed = last_change | as_datetime | default(none) %}
            {% if parsed %}
