            Moderately off target - balanced fan speed.
            Only applies when Fan Control Mode is set to "Temperature Band".
          default: "Level 3"
          selector:
            select:
              options:
                - "Auto"
                - "auto"
                - "Quiet"
                - "Silence"
                - "Level 1"
                - "Level 2"
                - "Level 3"
