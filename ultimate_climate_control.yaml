            {% if current_fan in ['5', 'Level 5'] %}
              4
            {% elif current_fan in ['4', 'Level 4'] %}
              3
            {% elif current_fan in ['3', 'Level 3'] %}
              2
            {% elif current_fan in ['2', 'Level 2'] %}
              1
            {% else %}
              0
            {% endif %}
          {% else %}
