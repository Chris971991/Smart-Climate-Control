        fan_band_hold_time:
          name: "Band: Minimum Hold Time"
          description: |
            **Minimum minutes before fan speed can change between temperature bands.**

            Prevents oscillation when temperature hovers near band boundaries.
            Timer resets after each fan speed change.

            • **3-5 min:** Responsive but may oscillate near boundaries
            • **5-10 min:** Balanced (recommended)
            • **10-15 min:** Very stable, minimal changes

            Only applies when Fan Control Mode is set to "Temperature Band".
          default: 5
          selector:
            number:
              min: 3
              max: 15
              step: 1
              unit_of_measurement: minutes

        # ===========================================
        # DYNAMIC MODE SETTINGS
        # ===========================================
        dynamic_starting_fan:
          name: "Dynamic: Starting Fan Level"
          description: |
            **Initial fan level when AC starts in Dynamic mode.**

            This is also the minimum level - de-escalation won't go below this.
            Only applies when Fan Control Mode is set to "Dynamic".
          default: "Level 2"
          selector:
            select:
              options:
                - "Auto"
                - "auto"
                - "Quiet"
                - "Silence"
                - "Level 1"
