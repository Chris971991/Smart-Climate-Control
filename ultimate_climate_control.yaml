        {% elif '4' in fan_str %}
          4
        {% elif '3' in fan_str or fan_str == 'medium' %}
          3
        {% elif '2' in fan_str %}
          2
        {% elif '1' in fan_str or fan_str in ['low', 'quiet', 'silence'] %}
          1
        {% elif fan_str == 'auto' %}
          3
        {% else %}
          3
        {% endif %}

