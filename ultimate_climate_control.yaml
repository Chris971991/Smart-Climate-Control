        fan_band_3_4:
          name: "Band: 3-4°C from target"
          description: |
            **Fan speed when temperature is 3-4°C from target.**

            Significantly off target - higher fan speed for faster progress.
            Only applies when Fan Control Mode is set to "Temperature Band".
          default: "Level 4"
          selector:
            select:
              options:
                - "Auto"
                - "auto"
                - "Quiet"
                - "Silence"
                - "Level 1"
                - "Level 2"
