        }}\n\n{% if manual_override_detection | bool %} \U0001F6A8 OVERRIDE TRIGGERED\n
        \   • State Machine: {{ states(helper_state_machine) if helper_state_machine
        else 'N/A' }}\n{% endif %}\n"
      level: warning
- if:
  - condition: template
    value_template: '{{ debug_enabled }}'
