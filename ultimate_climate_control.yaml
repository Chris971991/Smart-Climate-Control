      # Calculate base fan level based on selected mode (before environmental boosts)
      calculated_fan_level_int: >
        {% set mode = fan_control_mode %}
        {% set distance = distance_from_target | float(0) %}

        {# STATIC MODE: Always return the configured static fan level #}
        {% if mode == 'static' %}
          {% set fan = static_fan_speed | string | lower %}
          {% if '5' in fan or fan == 'high' %}
            5
          {% elif '4' in fan %}
            4
          {% elif '3' in fan or fan == 'medium' %}
            3
          {% elif '2' in fan %}
            2
          {% elif '1' in fan or fan in ['low', 'quiet', 'silence'] %}
            1
          {% else %}
            3
          {% endif %}

        {# TEMPERATURE BAND MODE: Select based on distance from target #}
        {% elif mode == 'temperature_band' %}
          {% set hold_time = fan_band_hold_time | float(5) %}
