          {% set effective_target = target_temp - target_overshoot %}
        {% elif last_mode == 'heating' %}
          {% set effective_target = target_temp + target_overshoot %}
        {% endif %}
        {{ (current_temp - effective_target) | abs }}

      # Calculate current effectiveness based on temperature progress
      # v5.1.0: REDESIGNED - Rate-based effectiveness using sliding window temp_change_rate
      # This provides real-time AC performance measurement instead of mode-lifetime average
      current_effectiveness: >
