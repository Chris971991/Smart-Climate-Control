      good_progress: >
        {% set min_progress = effective_min_progress_rate | float(0.02) %}
        {% set rate = temp_change_rate | float(0) %}
        {% set is_cooling = last_mode == 'cooling' %}
        {% set is_heating = last_mode == 'heating' %}
