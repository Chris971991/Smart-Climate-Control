          {% set deescalation = deescalation_level if dynamic_enabled else 0 %} {%
          set temp_gap_adjusted = temp_gap | abs | round(1) %} {% set distance_adjusted
          = temp_gap | abs | round(1) %} {% set esc_display = 'L' ~ escalation if
