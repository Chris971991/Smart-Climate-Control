      then:
      - service: input_datetime.set_datetime
        target:
          entity_id: '{{ helper_precond_start }}'
        data:
          datetime: '{{ now() }}'
        continue_on_error: true
    - if:
      - condition: template
        value_template: '{{ helper_precond_arrival not in [none, '''', ''unavailable'',
