        '
    sequence:
    - if:
      - condition: template
        value_template: '{{ debug_enabled }}'
      then:
      - service: system_log.write
        data:
          message: "\U0001F50D {{ room_name | upper }} CLIMATE DEBUG: Pre-conditioning
