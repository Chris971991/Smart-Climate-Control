                • Current Compensation: -{{ heat_source_compensation_amount }}°C
                {% if heat_source_active %}
                • Target Adjusted: {{ target_temp }}°C → {{ (target_temp - heat_source_compensation_amount) | round(1) }}°C
                {% else %}
                • No compensation active (load below threshold)
                {% endif %}

            ⚡ Progress Rate Adjustment:
                • Base Progress Rate: {{ min_progress_rate }}°C/min
                • Progress Rate Reduction: {{ heat_source_progress_reduction }}%
                • Effective Progress Rate: {{ effective_min_progress_rate }}°C/min
                {% if heat_source_active %}
                • System expects slower cooling when fighting heat sources
                {% endif %}

            🌀 Fan Speed Boost:
