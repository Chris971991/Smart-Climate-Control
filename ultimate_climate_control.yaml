            {# BED_ONLY mode - bed/occupancy sensor only #}
            {# Reliable for weight-based bed sensors #}
            {# Only activates AC when actually in bed #}
            {{ other_detected.value }}

          {% elif validation_mode == 'ble_plus' %}
            {# BLE_PLUS mode - require BLE + at least one other sensor #}
            {% if ble_sensor_count.count > 0 %}
              {{ ble_detected.value and (motion_detected.value or other_detected.value) }}
            {% else %}
              {# No BLE sensors - fallback to ANY mode #}
              {{ sensors_triggered.count > 0 }}
            {% endif %}
            
          {% else %}
            {# ANY mode (default) - any sensor triggered #}
            {{ sensors_triggered.count > 0 }}
          {% endif %}
        {% endif %}
      
      last_presence_time: >
        {% if presence_detected_helper and states(presence_detected_helper) not in ['unknown', 'unavailable', ''] %}
          {{ states(presence_detected_helper) | as_datetime }}
        {% else %}
          {{ now() }}
        {% endif %}
      
      minutes_since_presence: >
        {% if room_presence_detected %}
          0
        {% else %}
          {% set presence_time_val = states(presence_detected_helper) if presence_detected_helper else 'unknown' %}
          {% if presence_time_val not in ['unknown', 'unavailable', '', None] %}
            {% set presence_timestamp = as_timestamp(presence_time_val) %}
            {% if presence_timestamp %}
              {# v4.0.4: Calculate minutes since presence was last detected (for grace period) #}
              {{ ((as_timestamp(now()) - presence_timestamp) / 60) | round(0) | abs }}
            {% else %}
              999
            {% endif %}
          {% else %}
            999
          {% endif %}
        {% endif %}

      minutes_with_presence: >
        {% if room_presence_detected %}
          {# v4.1.0 BULLETPROOF FIX: Trust timer when validation helper actively tracking #}
          {% set has_validation = presence_validation_helper not in [none, '', 'unavailable', 'unknown'] %}
          {% set validation_is_on = is_state(presence_validation_helper, 'on') if has_validation else false %}

          {% set presence_time_val = states(presence_detected_helper) if presence_detected_helper else 'unknown' %}
          {% if presence_time_val not in ['unknown', 'unavailable', '', None] %}
            {% set presence_timestamp = as_timestamp(presence_time_val) %}
            {% if presence_timestamp %}
              {% set minutes = ((as_timestamp(now()) - presence_timestamp) / 60) | round(1) %}

              {# v6.5.1 FIX: DISABLED returning_user_credit - causes race condition #}
              {# The credit logic was racing with validation helper updates, causing instant #}
              {# AC activation when user returned to room (bypassing confirmation delay) #}
              {# ORIGINAL v5.3.4: Credit returning users so confirmation runs parallel with off-time #}
              {% set returning_user_credit = 0 %}

              {# When validation ON, timer is fresh (set at OFF→ON transition) - trust it completely #}
              {% if has_validation and validation_is_on %}
                {% if minutes < 0 %}
                  0  {# Future timestamp - clock skew #}
                {% else %}
                  {{ minutes }}  {# Trust timer completely - no 2-hour limit #}
                {% endif %}

              {# Legacy mode or validation OFF: apply 2-hour safety threshold #}
              {% else %}
                {% if minutes > 120 %}
                  0  {# Stale timestamp #}
                {% elif minutes < 0 %}
                  0  {# Future timestamp (invalid) #}
                {% else %}
                  {{ minutes }}  {# Valid timestamp #}
                {% endif %}
              {% endif %}
            {% else %}
              0
            {% endif %}
          {% else %}
            0
          {% endif %}
        {% else %}
          0
        {% endif %}
      
      current_distance: >
        {% if proximity_sensor %}
          {{ states(proximity_sensor) | float(99999) }}
        {% else %}
          99999
        {% endif %}
      
      proximity_zone: >
        {% if current_distance < home_zone_distance %}
          home
        {% else %}
          away
        {% endif %}
      
      smart_presence_active: >
        {% set effective_mode = control_mode if control_mode != 'Override' else (states(helper_mode_before_override) if helper_mode_before_override else 'Auto') %}
        {# v5.3.5 FIX: REMOVED can_bypass_delay - it was defeating the turn-off logic! #}
        {# The exit grace period (presence_timeout) already handles "leave and come back" scenarios #}
        {# If grace period expired and AC turned off, user MUST wait confirmation delay before re-activation #}
        {% if control_mode == 'Manual' %}
          false
        {% elif control_mode == 'Pre-conditioning' %}
          {# v6.6.0: Pre-conditioning mode - AC stays on until target temp reached or grace period expires #}
          {# This prevents the AC from turning off when someone arrives home during pre-conditioning #}
          true
        {% elif effective_mode == 'Smart' %}
          {# v4.3.0: Bed sensor counts as confirmed presence for Smart mode #}
          {# This prevents Smart mode from turning off AC while person is sleeping #}
          {% if bed_occupied %}
            true
          {# v4.3.0: Bed absence grace period - bathroom breaks during sleep #}
          {# Only applies when bed sensor was previously active (last_mode was bed_comfort) #}
          {% elif bed_sensor_manual and not is_state(bed_sensor_manual, 'on') and minutes_since_bed_off < bed_absence_grace and last_mode in ['bed_comfort_quiet', 'bed_comfort_eco', 'bed_eco_fan_only'] %}
            true
          {# Smart mode: require confirmation delay before activation #}
          {# v5.0.8 FIX: Add 10-second hysteresis buffer to prevent timing fluctuation flip-flop #}
          {# v5.3.5 FIX: REMOVED can_bypass_delay - grace period handles re-entry, confirmation delay is mandatory #}
          {% elif room_presence_detected and minutes_with_presence >= (presence_confirmation_delay - 0.17) %}
            true
          {% elif not room_presence_detected and minutes_since_presence < presence_timeout %}
            {# Grace period applies when: #}
            {# 1. Instant activation (no confirmation delay) - always applies #}
            {# 2. Had prior confirmed presence - left after AC was already running #}
            {# v3.8.2 FIX: Check if last presence timer shows we HAD accumulated enough time #}
            {# This prevents grace period from keeping AC on if someone just walked in briefly #}
            {# v3.11.8 FIX (Option C): Split logic based on AC state #}
            {# - AC OFF: Don't START it when BLE shows you in different room #}
            {# - AC ON: Keep it running (grace period works normally) #}
            {# v4.0.4 FIX: Multi-person BLE detection - check if ANYONE is in this room #}
            {% set ble_sensors = namespace(in_room=[], different_room=[], unknown=[]) %}
            {% if room_ble_name %}
              {% for sensor in room_sensors %}
                {% if sensor.startswith('sensor.') and '_ble_area' in sensor %}
                  {% set current_ble_state = states(sensor) | lower %}
                  {% if current_ble_state == room_ble_name | lower %}
                    {# BLE sensor shows THIS room #}
                    {% set ble_sensors.in_room = ble_sensors.in_room + [sensor] %}
                  {% elif current_ble_state not in ['unknown', 'unavailable', ''] %}
                    {# BLE sensor shows a specific DIFFERENT room #}
                    {% set ble_sensors.different_room = ble_sensors.different_room + [sensor] %}
                  {% else %}
                    {# BLE sensor state is unknown/unavailable #}
                    {% set ble_sensors.unknown = ble_sensors.unknown + [sensor] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endif %}
            {# ALL BLE sensors in different rooms = nobody here (ignore unknown states) #}
            {% set all_ble_in_different_room = (ble_sensors.in_room | length == 0) and (ble_sensors.different_room | length > 0) %}
            {# Check if AC is currently running (any climate entity in cooling/heating mode) #}
            {% set ac_currently_running = namespace(value=false) %}
            {% for entity in climate_list %}
              {% if states(entity) in ['cool', 'heat', 'heat_cool', 'dry'] %}
                {% set ac_currently_running.value = true %}
              {% endif %}
            {% endfor %}
            {% if all_ble_in_different_room and not ac_currently_running.value %}
              {# ALL BLE sensors show different rooms AND AC is OFF - don't START it via grace period #}
              false
            {% else %}
              {# Either BLE ok, OR AC already running (preserve grace period functionality) #}
              {# v6.6.3 FIX: Check if validation helper is currently ON (presence was JUST active) #}
              {# This fixes race condition where helper timestamp is stale but presence was just lost #}
              {# The validation helper is still ON at this point - it gets turned OFF in the action section AFTER variables are calculated #}
              {% set validation_currently_on = presence_validation_helper not in [none, '', 'unavailable', 'unknown'] and is_state(presence_validation_helper, 'on') %}
              {% if validation_currently_on %}
                {# Presence was JUST active (validation helper still ON) - grace period definitely applies #}
                true
              {% else %}
                {# Fallback to timestamp-based check for legacy/edge cases #}
                {% set last_timer_val = states(presence_detected_helper) if presence_detected_helper else 'unknown' %}
                {% if last_timer_val not in ['unknown', 'unavailable', '', None] %}
                  {% set time_when_left = as_timestamp(last_timer_val) %}
                  {% set time_at_timeout = as_timestamp(now()) - (presence_timeout * 60) %}
                  {# v4.0.3 FIX: Corrected comparison operator - presence within timeout if time_when_left > time_at_timeout #}
                  {# time_at_timeout = "N minutes ago", time_when_left = last presence timestamp #}
                  {# Grace period active if presence was detected AFTER the timeout boundary #}
                  {{ (presence_confirmation_delay == 0) or (time_when_left > time_at_timeout) }}
                {% else %}
                  false
                {% endif %}
              {% endif %}
            {% endif %}
          {% elif approaching_home and not anyone_home %}
            {# v3.11.7 FIX: Only use approaching_home if nobody is home yet (pre-conditioning) #}
            {# This prevents AC activating when you're already home in a different room #}
            true
          {% else %}
            false
          {% endif %}
        {% elif effective_mode == 'Auto' %}
          {# Auto mode - more permissive presence logic #}
          {% if room_presence_detected %}
            true
          {% elif minutes_since_presence < presence_timeout %}
            true
          {% elif proximity_zone == 'home' %}
            true
          {% elif anyone_home %}
            true
          {% else %}
            false
          {% endif %}
        {% else %}
          false
        {% endif %}
      
      extreme_temp_detected: >
        {% if not extreme_override %}
          false
        {% elif current_temp > extreme_high %}
          hot
        {% elif current_temp < extreme_low %}
          cold
        {% else %}
          false
        {% endif %}

      # ===================================
      # MANUAL OVERRIDE DETECTION (Integration-Aware v6.0)
      # ===================================
      # v6.0.0: Complete rewrite using Daikin integration's extra_state_attributes
      # The integration now exposes:
      #   - last_command_time: ISO timestamp of last automation command (set synchronously)
      #   - expected_hvac_mode: The HVAC mode automation expects
      #   - expected_temperature: The temp automation expects
      #   - expected_fan_mode: The fan mode automation expects
      #   - expected_swing_mode: The swing mode automation expects
      #
      # This eliminates ALL race conditions because:
      # 1. Attributes are set SYNCHRONOUSLY in integration's _set() before async_write_ha_state()
      # 2. When climate_state_change fires, attributes are ALREADY available
      # 3. No helper write race conditions - data lives ON the entity itself
      # ===================================
      manual_override_detection: >
        {# Step 0: Quick validation checks #}
        {% if not enable_manual_override_detection %}
          false
        {% elif control_mode in ['Override', 'Manual', 'Pre-conditioning'] %}
          {# v6.6.0: Exclude Pre-conditioning mode from override detection #}
          false
        {% elif states(helper_state_machine) == 'LOCKED' %}
          false
        {% elif trigger.id == 'override_cleared_by_user' %}
          false

        {# ============================================================== #}
        {# v6.4.0: CHECK FOR RECENT UI CLICK (PERSISTED ACROSS RESTARTS) #}
        {# ============================================================== #}
        {# This solves the race condition where mode:restart kills the UI- #}
        {# triggered run before Override activates. The UI click timestamp #}
        {# was recorded IMMEDIATELY in the action block, so even if another #}
        {# trigger killed that run, we can still detect the recent UI click. #}
        {# Using as_timestamp() to avoid timezone-naive vs timezone-aware issues #}
        {# ============================================================== #}
        {# v6.5.1: UI click detection using helper_expected_hvac             #}
        {# ============================================================== #}
        {# FIX: Compare actual state against helper_expected_hvac (only      #}
        {# set by automation), NOT integration's expected_hvac_mode (which   #}
        {# is polluted by user clicks). v6.5.0 always returned true which    #}
        {# caused false positives when old timestamps survived HA restart.   #}
        {# ============================================================== #}
        {% elif helper_last_ui_click not in [none, '', 'unavailable', 'unknown']
                and states(helper_last_ui_click) not in ['unknown', 'unavailable', '', none]
                and as_timestamp(states(helper_last_ui_click)) | float(0) > 0
                and (as_timestamp(now()) - as_timestamp(states(helper_last_ui_click))) >= 0
                and (as_timestamp(now()) - as_timestamp(states(helper_last_ui_click))) < 10 %}
          {# Recent UI click detected - check if user changed from what automation wanted #}
          {% set expected_hvac = states(helper_expected_hvac) | default('unknown') %}
          {% set actual_hvac = states(climate_list[0]) %}
          {% if expected_hvac in ['unknown', 'unavailable', '', none] %}
            {# No expected state recorded - can't determine if override, assume yes #}
            true
          {% elif actual_hvac != expected_hvac %}
            {# User changed state to something different than automation wanted - OVERRIDE #}
            true
          {% else %}
            {# User clicked same state automation wanted - NOT override (user agrees) #}
            false
          {% endif %}

        {% elif trigger.id == 'periodic_check' %}
          {# v6.1.3: PERIODIC CHECK OVERRIDE DETECTION #}
          {# Handles physical remote changes that don't trigger climate_state_change #}
          {# If automation expects AC ON but it's OFF → someone turned it off via remote #}
          {% set expected_hvac = state_attr(climate_list[0], 'expected_hvac_mode') %}
          {% set actual_hvac = states(climate_list[0]) %}
          {% set last_cmd_time = state_attr(climate_list[0], 'last_command_time') %}
          {% set time_since_cmd = ((now() - as_datetime(last_cmd_time)).total_seconds()) if last_cmd_time else 9999 %}

          {# Only trigger override if:
             1. Automation expected AC to be ON (cooling/heating/etc)
             2. AC is actually OFF
             3. Last command was sent >10 seconds ago (not mid-command)
             4. v7.0.2 FIX: Last command was sent within last hour (not stale)
                - Prevents false positives when expected_hvac is stale from before HA restart
                - or when automation hasn't sent a command recently
             This catches physical remote turn-off that happened between polls #}
          {% set expected_on = expected_hvac in ['cool', 'heat', 'auto', 'heat_cool', 'dry', 'fan_only'] %}
          {% set actual_off = actual_hvac == 'off' %}
          {% set not_mid_command = time_since_cmd > 10 %}
          {% set not_stale = time_since_cmd < 3600 %}

          {{ expected_on and actual_off and not_mid_command and not_stale }}
        {% elif trigger.id != 'climate_state_change' %}
          false
        {% elif not (trigger.to_state is defined and trigger.from_state is defined) %}
          false
        {% else %}
          {# ========================================= #}
          {# INTEGRATION-AWARE DETECTION (v6.1.0)     #}
          {# ========================================= #}
          {# v6.1.0: Complete rewrite to detect ALL changes (HVAC, temp, fan, swing) #}
          {# Using new extra_state_attributes from Daikin integration: #}
          {#   - last_command_time: When automation last sent a command #}
          {#   - expected_hvac_mode, expected_temperature, expected_fan_mode, expected_swing_mode #}
          {#   - entity_init_time: For startup grace period #}
          {#   - device_type: DaikinBRP084 vs DaikinBRP072C for timeout tuning #}

          {# Step 1: Get integration tracking attributes #}
          {# v6.7.0 FIX: Use trigger snapshot for expected values to avoid race condition #}
          {# The integration clears expected_hvac_mode when device confirms, which can happen #}
          {# before this template evaluates. Using trigger.to_state.attributes ensures we see #}
          {# the values at the exact moment of the state change. #}
          {% set last_cmd_time = trigger.to_state.attributes.last_command_time | default(none) %}
          {% set last_cmd_source = trigger.to_state.attributes.last_command_source | default(none) %}
          {% set expected_hvac = trigger.to_state.attributes.expected_hvac_mode | default(none) %}
          {% set expected_temp = trigger.to_state.attributes.expected_temperature | default(none) %}
          {% set expected_fan = trigger.to_state.attributes.expected_fan_mode | default(none) %}
          {% set expected_swing = trigger.to_state.attributes.expected_swing_mode | default(none) %}
          {% set entity_init_time = trigger.to_state.attributes.entity_init_time | default(none) %}
          {% set device_type = trigger.to_state.attributes.device_type | default(none) %}

          {# Step 2: Get actual current state #}
          {% set actual_hvac = trigger.to_state.state %}
          {% set from_hvac = trigger.from_state.state %}
          {% set actual_temp = state_attr(climate_list[0], 'temperature') | float(0) %}
          {% set actual_fan = state_attr(climate_list[0], 'fan_mode') | default('unknown') %}
          {% set actual_swing = state_attr(climate_list[0], 'swing_mode') | default('unknown') %}

          {# v6.1.2: Get context from the STATE CHANGE EVENT - this is the REAL source! #}
          {# HA puts context on trigger.to_state.context - this tells us WHO caused the change #}
          {# - user_id set + NO parent_id = User clicked in HA UI #}
          {# - parent_id set = Automation triggered it #}
          {# - Neither = Physical device/remote/coordinator poll #}
          {% set ctx_user_id = trigger.to_state.context.user_id | default(none) %}
          {% set ctx_parent_id = trigger.to_state.context.parent_id | default(none) %}
          {% set state_change_from_user = (ctx_user_id is not none and ctx_parent_id is none) %}
          {% set state_change_from_automation = (ctx_parent_id is not none) %}

          {# Step 3: Startup grace period check #}
          {# After integration reload/restart, all in-memory tracking state is wiped. #}
          {# Skip override detection for 60 seconds after entity initialization to #}
          {# prevent false positives from coordinator polls revealing "unexpected" state. #}
          {% set time_since_init = ((now() - as_datetime(entity_init_time)).total_seconds()) if entity_init_time else 9999 %}
          {% set in_startup_grace = (time_since_init < 60) %}

          {# Step 4: Check if integration supports new attributes #}
          {% set integration_supports_tracking = (last_cmd_time is not none or expected_hvac is not none) %}

          {% if in_startup_grace and expected_hvac is none %}
            {# Still in startup grace period AND no command sent yet - skip detection #}
            false
          {% elif integration_supports_tracking %}
            {# ===== INTEGRATION-AWARE DETECTION ===== #}

            {# Calculate time since last automation command #}
            {% set time_since_cmd = ((now() - as_datetime(last_cmd_time)).total_seconds()) if last_cmd_time else 9999 %}

            {# Device-aware timeout: BRP084 needs longer due to semaphore + power verification #}
            {# v6.1.0: Increased timeouts to account for sequential service calls with 500ms delays #}
            {# v6.5.5: Increased BRP072C timeout from 10s to 30s - these devices fetch state before #}
            {#         sending commands (extra network latency), causing false override detection #}
            {% set cmd_timeout = 15 if device_type == 'DaikinBRP084' else 30 %}

            {# Recent automation command = within device-specific timeout #}
            {% set recent_automation = (time_since_cmd < cmd_timeout) %}

            {# ===== HVAC MODE MISMATCH DETECTION (v6.3.0) ===== #}
            {# Simplified to power ON/OFF detection only #}
            {# temp/fan/swing mismatch detection removed - will be re-added via integration later #}

            {# HVAC mode mismatch (ON/OFF detection) #}
            {% set hvac_mismatch = (expected_hvac is not none and actual_hvac != expected_hvac) %}

            {# Detection logic (v6.1.2): #}
            {# Uses STATE CHANGE CONTEXT - the definitive source of who caused the change! #}
            {# This is attached to trigger.to_state.context by Home Assistant itself #}
            {% set on_to_off = (from_hvac in ['cool','heat','auto','heat_cool','dry','fan_only'] and actual_hvac == 'off') %}
            {% set off_to_on = (from_hvac == 'off' and actual_hvac in ['cool','heat','auto','heat_cool','dry','fan_only']) %}
            {% set mode_to_mode = (from_hvac in ['cool','heat','auto','heat_cool','dry','fan_only'] and actual_hvac in ['cool','heat','auto','heat_cool','dry','fan_only']) %}

            {# v6.7.0 FIX: If automation sent a command recently AND expected matches actual, #}
            {# this is definitely an automation-triggered change. Context.parent_id is often #}
            {# lost when async_write_ha_state() is called within service handlers. #}
            {% set expected_matches_actual = (expected_hvac is not none and expected_hvac == actual_hvac) %}
            {% set likely_automation_change = (recent_automation and expected_matches_actual) %}

            {# v6.1.2: Check STATE CHANGE CONTEXT first - this is 100% reliable #}
            {# v6.7.0: Also check if this looks like a recent automation command #}
            {% if likely_automation_change %}
              {# v6.7.0: Automation sent command recently and device now shows expected state #}
              {# This is NOT a manual override - it's the automation's command being confirmed #}
              {# Context.parent_id is lost when integration calls async_write_ha_state() #}
              false
            {% elif state_change_from_user %}
              {# STATE CHANGE was caused by user clicking in HA UI = MANUAL OVERRIDE #}
              {# context has user_id but no parent_id = direct user action #}
              true
            {% elif state_change_from_automation %}
              {# STATE CHANGE was caused by an automation (has parent_id) = NOT manual override #}
              {# Unless there's a mismatch (user changed via remote during command window) #}
              {{ hvac_mismatch }}
            {% elif on_to_off and expected_hvac == 'off' %}
              {# v6.5.2 FIX: AC turned OFF and we EXPECTED it to turn off = NOT override #}
              {# This happens when automation sends turn_off - context.parent_id is not #}
              {# propagated to the state change event, but expected_hvac IS set by the #}
              {# integration when we send the command. Trust expected_hvac over context. #}
              false
            {% elif on_to_off %}
              {# AC turned OFF with no user_id and no parent_id = physical remote or external #}
              {# And expected_hvac is NOT 'off' = user turned it off unexpectedly #}
              true
            {% elif expected_hvac is not none %}
              {# Coordinator poll revealed state - check for HVAC mode mismatch #}
              {{ hvac_mismatch }}
            {% else %}
              {# No tracking info at all - only trigger on actual HVAC mode changes #}
              {{ from_hvac != actual_hvac }}
            {% endif %}

          {% else %}
            {# ===== LEGACY FALLBACK DISABLED (v6.3.0) ===== #}
            {# Integration now handles detection via extra_state_attributes #}
            {# This code path only executes if integration_supports_tracking is false #}
            {# which should never happen with the current Daikin integration #}
            false
          {% endif %}
        {% endif %}

      # v3.11.0: Override is now a control mode, no separate flag needed

      # ===================================
      # AUTO-OFF CONDITIONS COMPUTED VARIABLES (v7.3.0)
      # ===================================

      # Condition 1: Person-count-aware bed sensors (v7.3.2: family-friendly)
      # Use auto_off_persons override if set, otherwise fall back to People to Track
      auto_off_effective_persons: >
        {% if auto_off_persons | length > 0 %}
          {{ auto_off_persons }}
        {% else %}
          {{ persons }}
        {% endif %}

      auto_off_people_home_count: >
        {% set eff = auto_off_persons if auto_off_persons | length > 0 else persons %}
        {% set count = namespace(n=0) %}
        {% for person in eff %}
          {% if states(person) == 'home' %}
            {% set count.n = count.n + 1 %}
          {% endif %}
        {% endfor %}
        {{ count.n }}

      auto_off_total_tracked: >
        {% if auto_off_persons | length > 0 %}
          {{ auto_off_persons | length }}
        {% else %}
          {{ persons | length }}
        {% endif %}

      auto_off_person_triggered: >
        {% set total = auto_off_total_tracked | int(0) %}
        {% set people_home = auto_off_people_home_count | int(0) %}
        {% if total == 0 or people_home == 0 %}
          false
        {% elif people_home < total %}
          {# Not everyone home: ANY sensor ON = they're in bed #}
          {% set sensors = auto_off_sensors_1_home %}
          {% if sensors | length == 0 %}
            false
          {% else %}
            {% set ns = namespace(any_on=false) %}
            {% for s in sensors %}
              {% if is_state(s, 'on') %}
                {% set ns.any_on = true %}
              {% endif %}
            {% endfor %}
            {{ ns.any_on }}
          {% endif %}
        {% else %}
          {# Everyone home: ALL sensors ON = everyone in bed #}
          {% set sensors = auto_off_sensors_all_home %}
          {% if sensors | length == 0 %}
            false
          {% else %}
            {% set ns = namespace(all_on=true) %}
            {% for s in sensors %}
              {% if not is_state(s, 'on') %}
                {% set ns.all_on = false %}
              {% endif %}
            {% endfor %}
            {{ ns.all_on }}
          {% endif %}
        {% endif %}

      # Condition 2: Current time is within the scheduled window
      auto_off_in_schedule: >
        {% if not auto_off_schedule_enabled %}
          false
        {% else %}
          {% set now_time = now().strftime('%H:%M:%S') %}
          {% set start = auto_off_schedule_start %}
          {% set end_time = auto_off_schedule_end %}
          {% if start <= end_time %}
            {# Normal window: e.g., 09:00-17:00 #}
            {{ now_time >= start and now_time < end_time }}
          {% else %}
            {# Overnight window: e.g., 22:00-06:00 #}
            {{ now_time >= start or now_time < end_time }}
          {% endif %}
        {% endif %}

      # Combined: Should auto-off conditions activate? (OR logic)
      auto_off_conditions_active: >
        {{ enable_auto_off_conditions and (auto_off_person_triggered | bool or auto_off_in_schedule | bool) }}

      # Which condition triggered (for logging)
      auto_off_trigger_reason: >
        {% set reasons = [] %}
        {% if auto_off_person_triggered | bool %}
          {% set reasons = reasons + ['person_sensors (' ~ auto_off_people_home_count ~ '/' ~ auto_off_total_tracked ~ ' home)'] %}
        {% endif %}
        {% if auto_off_in_schedule | bool %}
          {% set reasons = reasons + ['time_window'] %}
        {% endif %}
        {{ reasons | join(', ') if reasons | length > 0 else 'none' }}

      should_activate: >
        {# v3.11.0: Override mode = automation paused, just like Manual mode #}
        {% if control_mode == 'Override' %}
          false
        {# v7.0.3 FIX: Manual override (physical remote) takes priority over runtime protection #}
        {# If user pressed physical remote to turn off AC, respect that immediately #}
        {% elif manual_override_detection %}
          false
        {# v3.9.20 FIX: Runtime protection overrides ALL activation logic #}
        {# v3.11.8 FIX: Runtime protection should only apply when AC is actually still running #}
        {# If user manually turned off AC, respect that even if runtime_min not reached #}
        {% elif last_mode in ['cooling', 'heating'] and (time_in_current_mode | float(0)) < (runtime_min | float(0)) and actual_ac_state == 'on' %}
          {# ABSOLUTE RUNTIME PROTECTION: AC must stay on for minimum runtime regardless of presence, temperature, or mode #}
          true
        {% elif (last_mode == 'off' or actual_ac_state == 'off') and enforce_offtime and (effective_off_time | float(0)) <= (offtime_min | float(0)) and control_mode != 'Pre-conditioning' %}
          {# ABSOLUTE OFF-TIME PROTECTION: AC must stay off for minimum off-time regardless of presence or temperature #}
          {# v7.0.1 FIX: Pre-conditioning mode bypasses off-time protection - user explicitly requested pre-conditioning #}
          {# v7.2.0 FIX: Use effective_off_time instead of time_in_current_mode - fallback to AC entity last_changed #}
          {# when mode:restart race condition prevents helper_mode_start_time from being updated after turn-off #}
          false
        {% elif control_mode == 'Manual' %}
          {# In manual mode, only activate for extreme temperatures with presence #}
          {% if extreme_temp_detected not in [false, 'false'] and (room_presence_detected or approaching_home) %}
            true
          {% else %}
            false
          {% endif %}
        {% elif control_mode == 'Smart' %}
          {# v4.7.2 FIX: Smart mode should ALWAYS respect smart_presence_active #}
          {# Removed redundant "AC running" check that prevented turn-off when presence lost #}
          {{ smart_presence_active }}
        {% elif control_mode == 'Pre-conditioning' %}
          {# v6.6.0: Pre-conditioning mode - always active until expiry conditions met #}
          {{ not precond_should_end }}
        {% else %}
          {{ anyone_home or approaching_home }}
        {% endif %}

      should_activate_reason: >
        {# DEBUG: Track which branch set should_activate #}
        {% if control_mode == 'Override' %}
          OVERRIDE_MODE
        {% elif manual_override_detection %}
          MANUAL_OVERRIDE_DETECTED (physical remote or UI click)
        {% elif last_mode in ['cooling', 'heating'] and (time_in_current_mode | float(0)) < (runtime_min | float(0)) and actual_ac_state == 'on' %}
          RUNTIME_PROTECTION (time={{ time_in_current_mode }}min < {{ runtime_min }}min)
        {% elif (last_mode == 'off' or actual_ac_state == 'off') and enforce_offtime and (effective_off_time | float(0)) <= (offtime_min | float(0)) and control_mode != 'Pre-conditioning' %}
          OFFTIME_PROTECTION (effective_off_time={{ effective_off_time }}min, helper_desynced={{ last_mode not in ['off', 'smart_off', 'away_off', 'auto_off_off'] and actual_ac_state == 'off' }})
        {% elif control_mode == 'Manual' %}
          MANUAL_MODE (extreme={{ extreme_temp_detected }}, presence={{ room_presence_detected }})
        {% elif control_mode == 'Smart' %}
          SMART_MODE (smart_presence_active={{ smart_presence_active }})
        {% elif control_mode == 'Pre-conditioning' %}
          PRECOND_MODE (runtime={{ precond_runtime_minutes }}min, arrived={{ precond_arrival_occurred }}, should_end={{ precond_should_end }})
        {% else %}
          AUTO_MODE (anyone_home={{ anyone_home }}, approaching={{ approaching_home }})
        {% endif %}


  # Continue to next actions - variables calculated successfully

  # ===========================================
  # v6.6.0: PRE-CONDITIONING MODE MANAGEMENT
  # ===========================================

  # v7.1.3: REMOVED STEP A0 - Setting timestamp for manual triggers caused precond_was_automation_triggered=true
  # which enabled auto-exit logic that shouldn't apply to manual triggers.
  # Manual Pre-conditioning: no timestamp = precond_was_automation_triggered=false = no auto-exit
  # Auto Pre-conditioning: timestamp set by activation section = precond_was_automation_triggered=true = auto-exit enabled

  # STEP A: Record arrival time when someone arrives during pre-conditioning
  # This starts the grace period timer
  - if:
      - condition: template
        value_template: >
          {{ is_precond_mode and anyone_home and not precond_arrival_occurred and
             helper_precond_arrival not in [none, '', 'unavailable', 'unknown'] }}
    then:
      - service: input_datetime.set_datetime
        target:
          entity_id: "{{ helper_precond_arrival }}"
        data:
          datetime: "{{ now() }}"
        continue_on_error: true

      - if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - service: system_log.write
            data:
              message: >
                🏠 {{ room_name | upper }} PRECOND: Arrival detected!
                • Recording arrival time for grace period calculation
                • Grace period: {{ precond_grace_period }} minutes
                • Expiry mode: {{ precond_expiry_mode }}
              level: warning

      # Optional notification for arrival during pre-conditioning
      - if:
          - condition: template
            value_template: "{{ enable_precond_notifications and precond_notify_device not in ['', none, 'unknown', 'unavailable'] }}"
        then:
          - service: "{{ precond_notify_device }}"
            data:
              title: "{{ room_name }} Pre-conditioning"
              message: >
                You've arrived home! Pre-conditioning will continue for {{ precond_grace_period }} more minutes
                or until target temperature is reached.
                Current: {{ current_temp }}°C → Target: {{ target_temp }}°C
            continue_on_error: true

  # STEP B: Check if pre-conditioning should end and restore previous mode
  # v6.6.1 FIX: Recalculate exit conditions with FRESH helper values, not stale variables
  # The variables section runs at automation START, but STEP A may have just updated helpers
  # v7.1.2 FIX: Add minimum runtime (30s) before temp-based exit to allow climate commands to complete
  - if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - service: system_log.write
        data:
          message: >
            [STEP_B_DEBUG] {{ room_name | upper }}:
            • is_precond_mode: {{ is_precond_mode }}
            • precond_was_automation_triggered: {{ precond_was_automation_triggered }}
            • precond_start_timestamp: {{ precond_start_timestamp }}
            • precond_temp_reached: {{ precond_temp_reached }}
            • control_mode: {{ control_mode }}
          level: warning
  - if:
      - condition: template
        value_template: >
          {% set fresh_arrival_ts = as_timestamp(states(helper_precond_arrival)) | float(0) if helper_precond_arrival and states(helper_precond_arrival) not in ['unknown', 'unavailable', ''] else 0 %}
          {% set fresh_arrival_occurred = fresh_arrival_ts > 0 %}
          {% set fresh_minutes_since_arrival = ((as_timestamp(now()) - fresh_arrival_ts) / 60) | round(1) if fresh_arrival_ts > 0 else 0 %}
          {% set fresh_grace_expired = fresh_arrival_occurred and fresh_minutes_since_arrival >= (precond_grace_period | float(15)) %}
          {% set min_runtime_seconds = 30 %}
          {% set fresh_start_ts = as_timestamp(states(helper_precond_start)) | float(0) if helper_precond_start and states(helper_precond_start) not in ['unknown', 'unavailable', ''] else 0 %}
          {% set epoch_1971 = 31536000 %}
          {% set runtime_seconds = (as_timestamp(now()) - fresh_start_ts) if fresh_start_ts > epoch_1971 else 0 %}
          {% set min_runtime_met = runtime_seconds >= min_runtime_seconds %}
          {% set fresh_was_automation_triggered = fresh_start_ts > epoch_1971 and (as_timestamp(now()) - fresh_start_ts) < (2 * 3600) %}
          {% set fresh_should_end = fresh_grace_expired or (precond_temp_reached and min_runtime_met) or precond_safety_timeout_exceeded %}
          {{ is_precond_mode and fresh_was_automation_triggered and fresh_should_end and
             control_mode_helper not in [none, '', 'unavailable', 'unknown'] }}
    then:
      # Determine why pre-conditioning is ending
      # v6.6.1 FIX: Recalculate with fresh values
      - variables:
          fresh_arrival_ts: "{{ as_timestamp(states(helper_precond_arrival)) | float(0) if helper_precond_arrival and states(helper_precond_arrival) not in ['unknown', 'unavailable', ''] else 0 }}"
          fresh_minutes_since_arrival: "{{ ((as_timestamp(now()) - (as_timestamp(states(helper_precond_arrival)) | float(0))) / 60) | round(1) if helper_precond_arrival and states(helper_precond_arrival) not in ['unknown', 'unavailable', ''] and as_timestamp(states(helper_precond_arrival)) | float(0) > 0 else 0 }}"
          fresh_grace_expired: "{{ (as_timestamp(states(helper_precond_arrival)) | float(0) > 0) and (((as_timestamp(now()) - (as_timestamp(states(helper_precond_arrival)) | float(0))) / 60) >= (precond_grace_period | float(15))) }}"
          precond_end_reason: >
            {% if precond_safety_timeout_exceeded %}
              safety_timeout
            {% elif precond_temp_reached %}
              target_reached
            {% elif fresh_grace_expired %}
              grace_expired
            {% else %}
              unknown
            {% endif %}

      - if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - service: system_log.write
            data:
              message: >
                ✅ {{ room_name | upper }} PRECOND ENDING:
                • Reason: {{ precond_end_reason }}
                • Runtime: {{ precond_runtime_minutes }} minutes
                • Previous mode: {{ precond_previous_mode_value }}
                • Temperature: {{ current_temp }}°C (target: {{ target_temp }}°C)
              level: warning

      # Restore previous control mode
      - service: input_select.select_option
        target:
          entity_id: "{{ control_mode_helper }}"
        data:
          option: "{{ precond_previous_mode_value }}"
        continue_on_error: true

      # Clear pre-conditioning helpers
      - if:
          - condition: template
            value_template: "{{ helper_precond_start not in [none, '', 'unavailable', 'unknown'] }}"
        then:
          - service: input_datetime.set_datetime
            target:
              entity_id: "{{ helper_precond_start }}"
            data:
              datetime: "1970-01-01 00:00:00"
            continue_on_error: true

      - if:
          - condition: template
            value_template: "{{ helper_precond_arrival not in [none, '', 'unavailable', 'unknown'] }}"
        then:
          - service: input_datetime.set_datetime
            target:
              entity_id: "{{ helper_precond_arrival }}"
            data:
              datetime: "1970-01-01 00:00:00"
            continue_on_error: true

      - if:
          - condition: template
            value_template: "{{ helper_precond_previous_mode not in [none, '', 'unavailable', 'unknown'] }}"
        then:
          - service: input_text.set_value
            target:
              entity_id: "{{ helper_precond_previous_mode }}"
            data:
              value: ""
            continue_on_error: true

      # Optional notification for pre-conditioning completion
      - if:
          - condition: template
            value_template: "{{ enable_precond_notifications and precond_notify_device not in ['', none, 'unknown', 'unavailable'] }}"
        then:
          - service: "{{ precond_notify_device }}"
            data:
              title: "{{ room_name }} Pre-conditioning Complete"
              message: >
                {% if precond_end_reason == 'target_reached' %}
                Target temperature reached! Room is now {{ current_temp }}°C.
                {% elif precond_end_reason == 'grace_expired' %}
                Grace period expired. Room is {{ current_temp }}°C (target: {{ target_temp }}°C).
                {% elif precond_end_reason == 'safety_timeout' %}
                Safety timeout reached after {{ precond_runtime_minutes }} minutes.
                {% else %}
                Pre-conditioning ended.
                {% endif %}
                Returning to {{ precond_previous_mode_value }} mode.
            continue_on_error: true

      - service: system_log.write
        data:
          message: >
            ✅ {{ room_name | upper }} PRE-CONDITIONING COMPLETE:
            • Reason: {{ precond_end_reason }}
            • Runtime: {{ precond_runtime_minutes }} minutes
            • Final temp: {{ current_temp }}°C
            • Restored mode: {{ precond_previous_mode_value }}
          level: warning

  # ===========================================
  # END PRE-CONDITIONING MANAGEMENT
  # ===========================================

  # v3.9.35 DEBUG: Log after variables calculated
  - if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - service: system_log.write
        data:
          message: >
            [1/18] 🔍 {{ room_name | upper }} AUTOMATION FLOW DEBUG

            📊 Trigger & State:
                • Trigger ID: {{ trigger.id }}
                • Last Mode: {{ states(helper_mode) }}
                • Actual AC State: {{ actual_ac_state }}
                • Manual Override Detected: {{ manual_override_detection }}
          level: warning

  # v3.12.5 DEBUG: Detailed manual override detection trace
  # v6.1.0: Enhanced debug logging with integration attributes
  - if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - service: system_log.write
        data:
          message: >
            [2/18] 🔍 {{ room_name | upper }} MANUAL OVERRIDE DEBUG (v6.1.3)

            📊 Trigger & Control:
                • Trigger ID: {{ trigger.id }}
                • Control Mode: {{ control_mode }}
                • Actual AC State: {{ actual_ac_state }}
                • From State: {{ trigger.from_state.state if trigger.from_state is defined else 'N/A' }}
                • To State: {{ trigger.to_state.state if trigger.to_state is defined else 'N/A' }}

            {% if trigger.id == 'periodic_check' %}
            📡 PERIODIC CHECK DETECTION (v6.1.3 - Physical Remote):
                {% set expected_hvac = state_attr(climate_list[0], 'expected_hvac_mode') %}
                {% set actual_hvac = states(climate_list[0]) %}
                {% set last_cmd_time = state_attr(climate_list[0], 'last_command_time') %}
                {% set time_since_cmd = ((now() - as_datetime(last_cmd_time)).total_seconds()) if last_cmd_time else 9999 %}
                {% set expected_on = expected_hvac in ['cool', 'heat', 'auto', 'heat_cool', 'dry', 'fan_only'] %}
                {% set actual_off = actual_hvac == 'off' %}
                {% set not_mid_command = time_since_cmd > 10 %}
                • Expected HVAC: {{ expected_hvac }}
                • Actual HVAC: {{ actual_hvac }}
                • Expected ON: {{ expected_on }}
                • Actual OFF: {{ actual_off }}
                • Time Since Cmd: {{ time_since_cmd | round(1) }}s (>10s? {{ not_mid_command }})
                • OVERRIDE DETECTED: {{ expected_on and actual_off and not_mid_command }}
            {% else %}
            🔑 STATE CHANGE CONTEXT (v6.1.2 - THE KEY!):
                • Context User ID: {{ trigger.to_state.context.user_id | default('None') if trigger.to_state is defined else 'N/A' }}
                • Context Parent ID: {{ trigger.to_state.context.parent_id | default('None') if trigger.to_state is defined else 'N/A' }}
                • FROM USER (user_id + no parent): {{ (trigger.to_state.context.user_id is defined and trigger.to_state.context.user_id is not none and (trigger.to_state.context.parent_id is not defined or trigger.to_state.context.parent_id is none)) if trigger.to_state is defined else 'N/A' }}
                • FROM AUTOMATION (has parent_id): {{ (trigger.to_state.context.parent_id is defined and trigger.to_state.context.parent_id is not none) if trigger.to_state is defined else 'N/A' }}
            {% endif %}

            🔌 Integration Tracking Attributes:
                • Device Type: {{ state_attr(climate_list[0], 'device_type') }}
                • Last Command Time: {{ state_attr(climate_list[0], 'last_command_time') }}
                • Last Command ID: {{ state_attr(climate_list[0], 'last_command_id') }}
                • Entity Init Time: {{ state_attr(climate_list[0], 'entity_init_time') }}

            📋 Expected vs Actual State:
                • Expected HVAC: {{ state_attr(climate_list[0], 'expected_hvac_mode') | default('N/A') }}
                • Actual HVAC: {{ states(climate_list[0]) }}
                • Expected Temp: {{ state_attr(climate_list[0], 'expected_temperature') | default('N/A') }}°C
                • Actual Temp: {{ state_attr(climate_list[0], 'temperature') }}°C

            🎯 Detection Results:
                • Manual Override Detected: {{ manual_override_detection }}
                • Override Detection Enabled: {{ enable_manual_override_detection }}

            {% if manual_override_detection | bool %}
            🚨 OVERRIDE TRIGGERED
                • State Machine: {{ states(helper_state_machine) if helper_state_machine else 'N/A' }}
            {% endif %}
          level: warning

  # v4.3.6 FIX: Removed problematic debug logging that accessed variables inside override detection template
  # Those variables (is_manual_off, needs_timing_fallback, etc.) are not in scope here

  # v3.12.5 DEBUG: Log should_activate value
  - if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - service: system_log.write
        data:
          message: >
            [3/18] 🔍 {{ room_name | upper }} SHOULD_ACTIVATE CHECK

            📊 Control Mode Analysis:
                • Control Mode (Variable): {{ control_mode }}
                • Control Mode Helper (Actual): {{ states(control_mode_helper) }}
                • Should Activate: {{ should_activate }}
                • Activation Reason: {{ should_activate_reason }}

            🔍 Key Variables:
                • smart_presence_active: {{ smart_presence_active }}
                • room_presence_detected: {{ room_presence_detected }}
                • last_mode: {{ last_mode }}
                • actual_ac_state: {{ actual_ac_state }}
                • time_in_current_mode: {{ time_in_current_mode | round(1) }}min
                • anyone_home: {{ anyone_home }}
                • approaching_home: {{ approaching_home }}
          level: warning

  - condition: template
    value_template: "{{ true }}"  # Always continue

  # v4.3.2 FIX: DELETED premature helper_expected_hvac update that caused race condition
  # Problem: Updating helper BEFORE choose blocks execute causes manual detection to see stale state
  # Solution: The automation_intends_to_turn_off variable now handles this case without updating helpers prematurely

  # DISABLED: No longer auto-switching to Manual mode when manual changes detected
  # The automation will continue to work normally even if user manually adjusts AC

  # v3.16.0: NEW PRESENCE VALIDATION STATE TRANSITION TRACKING
  # =============================================================
  # This fixes the bug where presence timer accumulates time when only PARTIAL validation is met
  # (e.g., bed sensor + mmWave active but no BLE in ble_smart mode)
  #
  # OLD BEHAVIOR (BROKEN):
  # - Timer accumulated time whenever room_presence_detected was TRUE
  # - BLE_SMART: Bed + mmWave (no BLE) would set timer, then BLE arrival would use old timer
  # - Result: Confirmation delay bypassed, AC activates too early
  #
  # NEW BEHAVIOR (FIXED):
  # - Track validation state transitions (FALSE → TRUE)
  # - Reset timer ONLY when validation state changes from OFF to ON
  # - Timer only accumulates when FULL validation continuously met
  #
  # EXAMPLE WITH BLE_SMART (your scenario):
  # 1. Julia in bed + mmWave (no BLE) → validation_helper = OFF, timer expired
  # 2. Chris BLE enters → validation changes OFF → ON → Timer RESETS to NOW
  # 3. 10 min later → Timer shows 10 min → AC can activate
  # 4. Chris BLE leaves → validation changes ON → OFF → Timer expires
  # =============================================================

  # Update presence validation state helper when room_presence_detected changes
  - if:
      - condition: template
        value_template: "{{ presence_validation_helper not in [none, '', 'unavailable', 'unknown'] }}"
    then:
      - if:
          - condition: template
            value_template: "{{ room_presence_detected and is_state(presence_validation_helper, 'off') }}"
        then:
          # FALSE → TRUE transition detected: Set validation helper to ON and reset timer
          - service: input_boolean.turn_on
            target:
              entity_id: "{{ presence_validation_helper }}"
            continue_on_error: true

          - service: input_datetime.set_datetime
            target:
              entity_id: "{{ presence_detected_helper }}"
            data:
              datetime: "{{ now() }}"
            continue_on_error: true

          # v5.3.4: Debug log for presence detected
          - if:
              - condition: template
                value_template: "{{ debug_enabled }}"
            then:
              - service: system_log.write
                data:
                  message: "✅ {{ room_name | upper }} PRESENCE TIMER: Reset to NOW (presence detected, validation ON)"
                  level: debug

      - if:
          - condition: template
            value_template: "{{ not room_presence_detected and is_state(presence_validation_helper, 'on') }}"
        then:
          # TRUE → FALSE transition detected: Set validation helper to OFF and expire timer
          - service: input_boolean.turn_off
            target:
              entity_id: "{{ presence_validation_helper }}"
            continue_on_error: true

          - service: input_datetime.set_datetime
            target:
              entity_id: "{{ presence_detected_helper }}"
            data:
              # v4.0.4 FIX: Set to NOW when presence lost (allows grace period to work)
              # Grace period counts minutes_since_presence from this timestamp
              # Sentinel value set later if user stays gone beyond threshold
              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
            continue_on_error: true

          # v5.3.4: Debug log for grace period start
          - if:
              - condition: template
                value_template: "{{ debug_enabled }}"
            then:
              - service: system_log.write
                data:
                  message: "⏱️ {{ room_name | upper }} GRACE PERIOD: Started (presence lost, {{ presence_timeout }} min timeout)"
                  level: debug

  # LEGACY FALLBACK: For automations created before v3.16.0 without presence_validation_helper
  # This preserves the old (buggy) behavior for backward compatibility
  # Users should add the new helper to get the fixed behavior
  - if:
      - condition: template
        value_template: "{{ presence_validation_helper in [none, '', 'unavailable', 'unknown'] }}"
      - condition: template
        value_template: "{{ room_presence_detected and presence_detected_helper not in [none, '', 'unavailable', 'unknown'] }}"
      - condition: template
        value_template: >
          {% if presence_detected_helper and states(presence_detected_helper) not in ['unknown', 'unavailable', ''] %}
            {% set last_presence_timestamp = as_timestamp(states(presence_detected_helper)) %}
            {% set current_timestamp = as_timestamp(now()) %}
            {% set minutes_since_timer_set = (current_timestamp - last_presence_timestamp) / 60 %}
            {{ minutes_since_timer_set >= (presence_timeout + 1) }}
          {% else %}
            false
          {% endif %}
    then:
      - service: input_datetime.set_datetime
        target:
          entity_id: "{{ presence_detected_helper }}"
        data:
          datetime: "{{ now() }}"
        continue_on_error: true

  # Legacy fallback for timer expiration when presence lost
  - if:
      - condition: template
        value_template: "{{ presence_validation_helper in [none, '', 'unavailable', 'unknown'] }}"
      - condition: template
        value_template: "{{ not room_presence_detected and presence_detected_helper not in [none, '', 'unavailable', 'unknown'] }}"
    then:
      - service: input_datetime.set_datetime
        target:
          entity_id: "{{ presence_detected_helper }}"
        data:
          datetime: "{{ (now() - timedelta(minutes=presence_timeout + 1)).strftime('%Y-%m-%d %H:%M:%S') }}"
        continue_on_error: true

  # v6.3.2: INSTANT PHYSICAL REMOTE OVERRIDE DETECTION (SYMMETRIC)
  # ===============================================================
  # When the Daikin integration fires daikin_physical_remote_override event,
  # it means pydaikin detected a mismatch between expected and actual power state:
  # - action="turned_off": AC was OFF when automation expected ON (user turned off)
  # - action="turned_on": AC was ON when automation expected OFF (user turned on)
  # This is the MOST RELIABLE detection because it happens at command time,
  # not waiting for state polling or coordinator updates.
  - if:
      - condition: template
        value_template: "{{ trigger.id == 'physical_remote_override' }}"
      # v6.2.1: Only trigger if event entity_id matches one of THIS automation's climate entities
      - condition: template
        value_template: "{{ trigger.event.data.entity_id in climate_list }}"
      - condition: template
        value_template: "{{ enable_manual_override_detection }}"
      - condition: template
        value_template: "{{ control_mode not in ['Manual', 'Override'] }}"
      - condition: template
        value_template: "{{ override_timeout > 0 }}"
      - condition: template
        value_template: "{{ control_mode_helper not in [none, '', 'unavailable', 'unknown'] }}"
    then:
      # Log the physical remote override detection with detailed info (v6.4.0)
      - service: system_log.write
        data:
          message: >
            {% set action = trigger.event.data.action | default('turned_off') %}
            {% set event_entity = trigger.event.data.entity_id | default('unknown') %}
            {% set device_name = trigger.event.data.device_name | default('unknown') %}
            {% set device_type = state_attr(event_entity, 'device_type') | default('unknown') %}
            {% set last_cmd_time = state_attr(event_entity, 'last_command_time') | default('N/A') %}
            {% set entity_init_time = state_attr(event_entity, 'entity_init_time') | default('N/A') %}
            {% set actual_hvac = states(event_entity) | default('unknown') %}
            {% set actual_temp = state_attr(event_entity, 'temperature') | default('unknown') %}
            {% set actual_fan = state_attr(event_entity, 'fan_mode') | default('unknown') %}
            {% set actual_swing = state_attr(event_entity, 'swing_mode') | default('unknown') %}
            {% set current_temp = state_attr(event_entity, 'current_temperature') | default('unknown') %}

            🚨 {{ room_name | upper }} PHYSICAL REMOTE OVERRIDE DETECTED (v6.4.0)

            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            📡 DAIKIN INTEGRATION EVENT:
            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            Device Type: {{ device_type }}
            Detection Source: Daikin Integration Event (physical_remote_override)
            Last HA Command: {{ last_cmd_time }}

            {% if action == 'turned_on' %}
            Action: AC physically turned ON via remote
            The device was OFF (or expected OFF) but someone used the physical
            remote to turn it ON, bypassing Home Assistant automation.
            {% else %}
            Action: AC physically turned OFF via remote
            The device was ON (or expected ON) but someone used the physical
            remote to turn it OFF, bypassing Home Assistant automation.
            {% endif %}

            Current AC State:
                • HVAC Mode: {{ actual_hvac }}
                • Temperature: {{ actual_temp }}°C
                • Fan: {{ actual_fan }}
                • Swing: {{ actual_swing }}
                • Room Temp: {{ current_temp }}°C

            Control Mode Transition:
                • From: {{ control_mode }}
                • To: Override Mode
                • Override Duration: {{ override_timeout }}h

            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            🔍 DEBUG DATA (for troubleshooting):
            ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
            Event Details:
                • Entity: {{ event_entity }}
                • Device Name: {{ device_name }}
                • Action: {{ action }}
                • Event Time: {{ now().strftime('%Y-%m-%d %H:%M:%S') }}

            Integration Attributes:
                • device_type: {{ device_type }}
                • last_command_time: {{ last_cmd_time }}
                • entity_init_time: {{ entity_init_time }}
                • expected_hvac_mode: {{ state_attr(event_entity, 'expected_hvac_mode') | default('N/A') }}
                • expected_temperature: {{ state_attr(event_entity, 'expected_temperature') | default('N/A') }}
                • expected_fan_mode: {{ state_attr(event_entity, 'expected_fan_mode') | default('N/A') }}

            Blueprint Context:
                • room_name: {{ room_name }}
                • control_mode: {{ control_mode }}
                • override_timeout: {{ override_timeout }}h
                • trigger.id: {{ trigger.id }}

            🎮 Automation Response:
            • Automation paused to respect your physical remote changes
            • Will automatically resume after {{ override_timeout }}h timeout
            • Or manually clear override via dashboard button
          level: warning

      # v6.4.0: Write override event to system_log with [OVERRIDE_LOG] prefix for easy grepping
      # To view override logs: ha core logs | grep "OVERRIDE_LOG"
      - service: system_log.write
        data:
          message: >
            {% set action = trigger.event.data.action | default('turned_off') %}
            {% set event_entity = trigger.event.data.entity_id | default('unknown') %}
            [OVERRIDE_LOG] ===============================================================================
            [OVERRIDE_LOG] PHYSICAL REMOTE OVERRIDE - {{ room_name | upper }} - {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
            [OVERRIDE_LOG] ===============================================================================
            [OVERRIDE_LOG] TRIGGER: id={{ trigger.id }} | action={{ action }} | event_type=daikin_physical_remote_override
            [OVERRIDE_LOG] EVENT: entity={{ event_entity }} | device={{ trigger.event.data.device_name | default('N/A') }} | action={{ action }}
            [OVERRIDE_LOG] INTEGRATION: device={{ state_attr(event_entity, 'device_type') | default('N/A') }} | expected_hvac={{ state_attr(event_entity, 'expected_hvac_mode') | default('None') }} | expected_temp={{ state_attr(event_entity, 'expected_temperature') | default('None') }} | expected_fan={{ state_attr(event_entity, 'expected_fan_mode') | default('None') }}
            [OVERRIDE_LOG] INTEGRATION: last_cmd_time={{ state_attr(event_entity, 'last_command_time') | default('None') }} | entity_init={{ state_attr(event_entity, 'entity_init_time') | default('None') }}
            [OVERRIDE_LOG] ACTUAL: hvac={{ states(event_entity) }} | temp={{ state_attr(event_entity, 'temperature') }}C | fan={{ state_attr(event_entity, 'fan_mode') }} | swing={{ state_attr(event_entity, 'swing_mode') }} | current={{ state_attr(event_entity, 'current_temperature') }}C
            [OVERRIDE_LOG] BLUEPRINT: room={{ room_name }} | control_mode={{ control_mode }} | override_timeout={{ override_timeout }}h
            [OVERRIDE_LOG] ===============================================================================
          level: error
        continue_on_error: true

      # Change mode to Override
      - service: input_select.select_option
        target:
          entity_id: "{{ control_mode_helper }}"
        data:
          option: "Override"
        continue_on_error: true

      # Turn on visual indicator for dashboard
      - if:
          - condition: template
            value_template: "{{ helper_override_flag not in [none, '', 'unavailable', 'unknown'] }}"
        then:
          - service: input_boolean.turn_on
            target:
              entity_id: "{{ helper_override_flag }}"
            continue_on_error: true

      # Store timeout duration for dashboard countdown
      - if:
          - condition: template
            value_template: "{{ helper_override_timeout_storage not in [none, '', 'unavailable', 'unknown'] }}"
        then:
          - service: input_number.set_value
            target:
              entity_id: "{{ helper_override_timeout_storage }}"
            data:
              value: "{{ override_timeout }}"
            continue_on_error: true

      # Stop automation immediately - don't continue with any AC commands
      - stop: "Physical remote override detected - automation paused"

  # v3.11.0: ACTIVATE Override Mode - Switch control_mode to "Override" when manual change detected
  # v3.12.5 DEBUG: Log Override activation conditions
  - if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - service: system_log.write
        data:
          message: >
            [4/18] 🔍 {{ room_name | upper }} OVERRIDE ACTIVATION CHECK

            📊 Override Conditions:
                • Manual Override Detected: {{ manual_override_detection }}
                • Control Mode: {{ control_mode }}
                • Not Manual/Override Mode: {{ control_mode not in ['Manual', 'Override'] }}
                • Override Timeout: {{ override_timeout }}

            🛡️ Helper Validation:
                • Control Mode Helper: {{ control_mode_helper }}
                • Helper Valid: {{ control_mode_helper not in [none, '', 'unavailable', 'unknown'] }}

            ✅ Will Activate Override: {{ manual_override_detection | bool and control_mode not in ['Manual', 'Override'] and override_timeout > 0 and control_mode_helper not in [none, '', 'unavailable', 'unknown'] and trigger.id == 'climate_state_change' and trigger.id != 'mode_change' }}
          level: warning

  # v5.0.0: Snapshot-based override detection (only method)
  # v5.0.4 CRITICAL FIX: Don't activate override when user just clicked clear button OR when feature is disabled
  # v4.7.1 FIX: Don't re-detect override when mode_change trigger is FROM Override (clearing override)
  # v4.7.2 CRITICAL FIX: Only detect override when USER manually changed AC (check context.user_id)
  - if:
      - condition: template
        value_template: "{{ enable_manual_override_detection }}"
      - condition: template
        value_template: >
          {{
            manual_override_detection | bool
            and control_mode not in ['Manual', 'Override']
            and override_timeout > 0
          }}
      - condition: template
        value_template: "{{ control_mode_helper not in [none, '', 'unavailable', 'unknown'] }}"
      # v5.3.9 FIX: Block ALL mode_change triggers, not just from Override
      # Changing control mode (Auto/Smart/Manual) is intentional user action, not a manual AC override
      - condition: template
        value_template: "{{ trigger.id != 'mode_change' }}"
      # v5.3.10 FIX: Must be climate_state_change trigger (not temp sensor, presence, etc.)
      - condition: template
        value_template: "{{ trigger.id == 'climate_state_change' }}"
      # v5.3.15 FIX: REMOVED redundant parent_id check - it bypassed the grace period!
      # The manual_override_detection variable already includes:
      #   1. parent_id is none check (for physical remote detection)
      #   2. 10-second grace period (to ignore automation-triggered state changes)
      # Having a separate parent_id check here caused false overrides because Daikin
      # integration doesn't preserve parent_id on state updates, making automation
      # changes look like manual changes. The grace period in manual_override_detection
      # handles this, but this separate check bypassed it.
    then:
      # Change mode to Override
      - service: input_select.select_option
        target:
          entity_id: "{{ control_mode_helper }}"
        data:
          option: "Override"
        continue_on_error: true

      # Turn on visual indicator for dashboard
      - if:
          - condition: template
            value_template: "{{ helper_override_flag not in [none, '', 'unavailable', 'unknown'] }}"
        then:
          - service: input_boolean.turn_on
            target:
              entity_id: "{{ helper_override_flag }}"
            continue_on_error: true

      # Store timeout duration for dashboard countdown
      - if:
          - condition: template
            value_template: "{{ helper_override_timeout_storage not in [none, '', 'unavailable', 'unknown'] }}"
        then:
          - service: input_number.set_value
            target:
              entity_id: "{{ helper_override_timeout_storage }}"
            data:
              value: "{{ override_timeout }}"
            continue_on_error: true

      # v6.4.0: Clear UI click timestamp to prevent re-detection
      # After Override activates, clear the timestamp so the same click isn't
      # detected again on subsequent runs
      - if:
          - condition: template
            value_template: "{{ helper_last_ui_click not in [none, '', 'unavailable', 'unknown'] }}"
        then:
          - service: input_datetime.set_datetime
            target:
              entity_id: "{{ helper_last_ui_click }}"
            data:
              datetime: "1970-01-01 00:00:00"
            continue_on_error: true

      # The mode_change trigger will handle recording timestamp and previous mode

      # Debug log
      - if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - service: system_log.write
            data:
              message: >
                🚨 {{ room_name | upper }} MANUAL OVERRIDE ACTIVATED
                • Reason: Manual change detected (user turned AC {{ 'on' if actual_ac_state == 'on' else 'off' }} or changed settings)
                • Previous mode: {{ control_mode }}
                • Will timeout in {{ override_timeout }}h
                • Automation paused
              level: warning

      # v3.11.9 FIX: Stop automation immediately to prevent control logic from running with stale control_mode variable
      # The control_mode variable is calculated once at automation start. Even though we just changed
      # control_mode_helper to "Override", the variable still holds the old value (e.g., "Smart").
      # If we continue, the control logic will see control_mode="Smart" and turn AC back on!

      # v6.1.0: Enhanced manual override event logging with integration attributes
      - if:
          - condition: template
            value_template: "{{ event_logging_enabled }}"
        then:
          - service: system_log.write
            data:
              message: >
                {# v6.1.0: Use integration attributes when available, fall back to helpers #}
                {% set int_expected_hvac = state_attr(climate_list[0], 'expected_hvac_mode') %}
                {% set int_expected_temp = state_attr(climate_list[0], 'expected_temperature') %}
                {% set int_expected_fan = state_attr(climate_list[0], 'expected_fan_mode') %}
                {% set int_expected_swing = state_attr(climate_list[0], 'expected_swing_mode') %}
                {% set last_cmd_time = state_attr(climate_list[0], 'last_command_time') %}
                {% set device_type = state_attr(climate_list[0], 'device_type') | default('unknown') %}

                {# Use integration attrs if available, else helpers #}
                {% set expected_hvac = int_expected_hvac if int_expected_hvac else states(helper_expected_hvac) | default('unknown') %}
                {% set expected_temp = int_expected_temp if int_expected_temp else states(helper_expected_temp) | float(0) %}
                {% set expected_fan = int_expected_fan if int_expected_fan else states(helper_expected_fan) | default('unknown') %}
                {% set expected_swing = int_expected_swing if int_expected_swing else states(helper_expected_swing) | default('unknown') %}

                {# Actual states #}
                {% set actual_hvac = states(climate_list[0]) | default('unknown') if climate_list | length > 0 else 'unknown' %}
                {% set actual_temp = state_attr(climate_list[0], 'temperature') | float(0) if climate_list | length > 0 else 0 %}
                {% set actual_fan = state_attr(climate_list[0], 'fan_mode') | default('unknown') if climate_list | length > 0 else 'unknown' %}
                {% set actual_swing = state_attr(climate_list[0], 'swing_mode') | default('unknown') if climate_list | length > 0 else 'unknown' %}

                {# Detect which parameter was changed #}
                {% set is_manual_off = (actual_hvac == 'off' and expected_hvac not in ['off', 'unknown', none]) %}
                {% set is_manual_on = (actual_hvac in ['cool','heat','auto','heat_cool','dry','fan_only'] and expected_hvac == 'off') %}
                {% set is_temp_manual = (expected_temp > 0 and actual_temp > 0 and (expected_temp - actual_temp) | abs > 0.5) %}
                {% set is_fan_manual = (expected_fan not in ['unknown', none, ''] and actual_fan | lower != expected_fan | lower) %}
                {% set is_swing_manual = (expected_swing not in ['unknown', none, ''] and actual_swing | lower != expected_swing | lower) %}
                {% set is_hvac_manual = (expected_hvac not in ['unknown', none, 'off'] and actual_hvac not in ['unknown', 'off'] and expected_hvac != actual_hvac) %}

                🟡 {{ room_name | upper }} MANUAL OVERRIDE DETECTED

                ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
                📊 OVERRIDE INFO (v6.1.0):
                ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
                Device Type: {{ device_type }}
                Detection Source: {{ 'Integration Attributes' if int_expected_hvac else 'Legacy Helpers' }}
                Last Command: {{ last_cmd_time | default('N/A') }}

                Changed Parameter: {% if is_manual_off %}HVAC Mode (ON → OFF){% elif is_manual_on %}HVAC Mode (OFF → ON){% elif is_temp_manual %}Temperature Setpoint{% elif is_fan_manual %}Fan Speed{% elif is_swing_manual %}Swing Mode{% elif is_hvac_manual %}HVAC Mode{% else %}Unknown{% endif %}

                Expected vs Actual:
                        • HVAC: {{ expected_hvac }} → {{ actual_hvac }}{% if is_hvac_manual or is_manual_off or is_manual_on %} ⚠️{% endif %}

                        • Temp: {{ expected_temp }}°C → {{ actual_temp }}°C{% if is_temp_manual %} ⚠️{% endif %}

                        • Fan: {{ expected_fan }} → {{ actual_fan }}{% if is_fan_manual %} ⚠️{% endif %}

                        • Swing: {{ expected_swing }} → {{ actual_swing }}{% if is_swing_manual %} ⚠️{% endif %}

                Time Since Last Change: {{ time_since_change | round(1) }}s
                Control Mode: {{ control_mode }} → Override Mode
                Override Duration: {{ override_timeout }}h (configurable timeout)

                🎮 Automation Response:
                • Automation paused to respect your manual changes
                • Will automatically resume after {{ override_timeout }}h timeout
                • Or manually clear override via dashboard button

                ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
                🔍 DEBUG DATA (for troubleshooting):
                ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
                v5.0.0 Manual Override Detection (Snapshot-Based):
                    • Override Detected: {{ manual_override_detection }}
                    • Detection Method: Snapshot/Checksum Comparison

                v5.0.0 State Machine Data:
                    • Current state: {{ states(helper_state_machine) | default('not initialized') }}
                    • Actual checksum: {{ actual_state_checksum }}
                    • Stored checksum: {{ states(helper_state_checksum) | default('not initialized') }}
                    • Checksum match: {{ actual_state_checksum == (states(helper_state_checksum) | int(0)) }}
                    • Last command snapshot: {{ states(helper_last_command) | default('not initialized') }}
                    • Expected from snapshot: {{ expected_state_from_snapshot if expected_state_from_snapshot is not none else 'none' }}

                Current State:
                    • helper_last_mode: {{ states(helper_mode) | default('unknown') }}
                    • actual_ac_state: {{ actual_ac_state }}

                Override Configuration:
                    • control_mode_before: {{ control_mode }}
                    • override_timeout: {{ override_timeout }}h
                    • current_hour: {{ now().hour }}

                Trigger Info:
                    • trigger.id: {{ trigger.id }}
                    • trigger.entity_id: {{ trigger.entity_id if trigger.entity_id is defined else 'N/A' }}
                    • trigger.from_state: {{ trigger.from_state if trigger.from_state is defined else 'N/A' }}
                    • trigger.to_state: {{ trigger.to_state if trigger.to_state is defined else 'N/A' }}
              level: warning

      # v6.5.0: Write override event to system_log with [OVERRIDE_LOG] prefix for easy grepping
      # To view override logs: ha core logs | grep "OVERRIDE_LOG"
      - service: system_log.write
        data:
          message: >
            [OVERRIDE_LOG] ===============================================================================
            [OVERRIDE_LOG] MANUAL OVERRIDE - {{ room_name | upper }} - {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
            [OVERRIDE_LOG] ===============================================================================
            [OVERRIDE_LOG] TRIGGER: id={{ trigger.id }} | from={{ trigger.from_state.state if trigger.from_state is defined else 'N/A' }} | to={{ trigger.to_state.state if trigger.to_state is defined else 'N/A' }}
            [OVERRIDE_LOG] CONTEXT: user_id={{ trigger.to_state.context.user_id if trigger.to_state is defined else 'N/A' }} | parent_id={{ trigger.to_state.context.parent_id if trigger.to_state is defined else 'N/A' }}
            [OVERRIDE_LOG] INTEGRATION: device={{ state_attr(climate_list[0], 'device_type') | default('N/A') }} | expected_hvac={{ state_attr(climate_list[0], 'expected_hvac_mode') | default('None') }} | expected_temp={{ state_attr(climate_list[0], 'expected_temperature') | default('None') }} | expected_fan={{ state_attr(climate_list[0], 'expected_fan_mode') | default('None') }}
            [OVERRIDE_LOG] INTEGRATION: last_cmd_time={{ state_attr(climate_list[0], 'last_command_time') | default('None') }} | entity_init={{ state_attr(climate_list[0], 'entity_init_time') | default('None') }}
            [OVERRIDE_LOG] ACTUAL: hvac={{ states(climate_list[0]) }} | temp={{ state_attr(climate_list[0], 'temperature') }}C | fan={{ state_attr(climate_list[0], 'fan_mode') }} | swing={{ state_attr(climate_list[0], 'swing_mode') }} | current={{ state_attr(climate_list[0], 'current_temperature') }}C
            [OVERRIDE_LOG] LOGIC: manual_override={{ manual_override_detection }} | control_mode={{ control_mode }} | actual_ac={{ actual_ac_state }} | time_since_change={{ time_since_change | round(1) }}s
            [OVERRIDE_LOG] CHECKSUM: actual={{ actual_state_checksum }} | stored={{ states(helper_state_checksum) | default('N/A') }} | state_machine={{ states(helper_state_machine) | default('N/A') }}
            [OVERRIDE_LOG] ===============================================================================
          level: error
        continue_on_error: true

      - stop: "Manual override detected - stopping automation to prevent interference with user's manual changes"

  # v6.0.1 CRITICAL FIX: Early exit for automation-triggered state changes
  # When climate_state_change fires but it's NOT a manual override, the state change was caused by
  # our own climate service calls. We must stop here to prevent a feedback loop:
  # 1. Automation sends climate.set_temperature → state updates
  # 2. State change triggers climate_state_change
  # 3. manual_override_detection returns false (correctly - not manual)
  # 4. BUT if we continue to main logic, it sends more commands → infinite loop!
  # The fix: Stop automation for ANY climate_state_change that isn't a manual override.
  # Only periodic_check, presence_change, etc. should run the main climate control logic.
  - if:
      - condition: template
        value_template: "{{ trigger.id == 'climate_state_change' }}"
    then:
      - if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - service: system_log.write
            data:
              message: >
                🔄 {{ room_name | upper }} DEBUG: climate_state_change ignored (not a manual override)
                • Trigger: {{ trigger.id }}
                • From: {{ trigger.from_state.state if trigger.from_state is defined else 'N/A' }}
                • To: {{ trigger.to_state.state if trigger.to_state is defined else 'N/A' }}
                • Reason: State change was automation-triggered, not manual
              level: debug
      - stop: "climate_state_change processed - not a manual override, stopping to prevent feedback loop"

  # v3.11.0: CLEAR Override when button clicked (boolean turned off) - runs every automation cycle
  - if:
      - condition: template
        value_template: "{{ control_mode == 'Override' and helper_override_flag not in [none, '', 'unavailable', 'unknown'] and is_state(helper_override_flag, 'off') }}"
      - condition: template
        value_template: "{{ control_mode_helper not in [none, '', 'unavailable', 'unknown'] }}"
    then:
      - variables:
          return_to_mode: "{{ states(helper_mode_before_override) if helper_mode_before_override and states(helper_mode_before_override) in ['Auto', 'Smart'] else 'Auto' }}"

      - service: input_select.select_option
        target:
          entity_id: "{{ control_mode_helper }}"
        data:
          option: "{{ return_to_mode }}"
        continue_on_error: true

      # Sync expected values to prevent re-detection
      - if:
          - condition: template
            value_template: "{{ helper_expected_temp not in [none, '', 'unavailable', 'unknown'] and climate_list | length > 0 }}"
        then:
          - service: input_number.set_value
            target:
              entity_id: "{{ helper_expected_temp }}"
            data:
              value: "{{ state_attr(climate_list[0], 'temperature') | float(22) }}"
            continue_on_error: true

      - if:
          - condition: template
            value_template: "{{ helper_expected_hvac not in [none, '', 'unavailable', 'unknown'] and climate_list | length > 0 }}"
        then:
          - service: input_text.set_value
            target:
              entity_id: "{{ helper_expected_hvac }}"
            data:
              value: "{{ states(climate_list[0]) }}"
            continue_on_error: true

      - if:
          - condition: template
            value_template: "{{ helper_expected_fan not in [none, '', 'unavailable', 'unknown'] and climate_list | length > 0 }}"
        then:
          - service: input_text.set_value
            target:
              entity_id: "{{ helper_expected_fan }}"
            data:
              value: "{{ state_attr(climate_list[0], 'fan_mode') | default('unknown') }}"
            continue_on_error: true

  # v3.11.0: AUTO-CLEAR Override Mode - Return to previous mode when timeout expires
  - if:
      - condition: template
        value_template: "{{ control_mode == 'Override' and override_timeout > 0 }}"
      - condition: template
        value_template: >
          {% if helper_override_timestamp and states(helper_override_timestamp) not in ['unknown', 'unavailable', ''] %}
            {% set override_time = as_timestamp(states(helper_override_timestamp)) %}
            {% if override_time %}
              {% set time_since_override = (as_timestamp(now()) - override_time) / 3600 %}
              {{ time_since_override >= override_timeout }}
            {% else %}
              false
            {% endif %}
          {% else %}
            false
          {% endif %}
      - condition: template
        value_template: "{{ control_mode_helper not in [none, '', 'unavailable', 'unknown'] }}"
    then:
      # Return to previous mode
      - variables:
          return_to_mode: "{{ states(helper_mode_before_override) if helper_mode_before_override and states(helper_mode_before_override) in ['Auto', 'Smart'] else 'Auto' }}"

