          - repeat:
              for_each: "{{ climate_list }}"
              sequence:
                - variables:
                    current_entity: "{{ repeat.item }}"
                    available_modes: "{{ state_attr(repeat.item, 'hvac_modes') | list }}"
                    
                    # Smart cooling mode selection
                    # v3.10.0: Only use auto/heat_cool if heating is also enabled
                    selected_hvac_mode: >
                      {% set modes = state_attr(repeat.item, 'hvac_modes') | list %}
                      {# For cooling, try cooling-capable modes #}
                      {% if 'cool' in modes %}
                        cool
                        {% elif 'Cool' in modes %}
                        Cool
                        {% elif enable_heating and 'auto' in modes %}
                        auto
                        {% elif enable_heating and 'Auto' in modes %}
                        Auto
                        {% elif enable_heating and 'heat_cool' in modes %}
                        heat_cool
                        {% elif enable_heating and 'Heat/Cool' in modes %}
                        Heat/Cool
                        {% else %}
                        off
                      {% endif %}

                # Capture expected values for enhanced manual override detection (v3.3.0)
                - service: input_text.set_value
                  target:
                    entity_id: "{{ helper_expected_hvac }}"
                  data:
                    value: "{{ selected_hvac_mode }}"
                  continue_on_error: true

          # Capture expected temperature for manual override detection
          - service: input_number.set_value
            target:
              entity_id: "{{ helper_expected_temp }}"
            data:
              value: "{{ cooling_target_temp }}"
            continue_on_error: true

          # v5.1.2 FIX: Use MANDATORY rapid batched service call pattern for BRP069/BRP084
          - repeat:
              for_each: "{{ climate_list }}"
              sequence:
                - variables:
                    current_entity: "{{ repeat.item }}"

                    # v5.3.5 FIX: Add selected_hvac_mode to this scope (was hardcoded "cool")
                    selected_hvac_mode: >
                      {% set modes = state_attr(repeat.item, 'hvac_modes') | list %}
                      {% if 'cool' in modes %}
                        cool
                      {% elif 'Cool' in modes %}
                        Cool
                      {% elif enable_heating and 'auto' in modes %}
                        auto
                      {% elif enable_heating and 'Auto' in modes %}
                        Auto
                      {% elif enable_heating and 'heat_cool' in modes %}
                        heat_cool
                      {% elif enable_heating and 'Heat/Cool' in modes %}
                        Heat/Cool
                      {% else %}
                        cool
                      {% endif %}

                # FIRST: Set temperature + HVAC mode together (turns AC ON atomically)
                - service: climate.set_temperature
                  target:
                    entity_id: "{{ current_entity }}"
                  data:
                    temperature: "{{ cooling_target_temp }}"
                    hvac_mode: "{{ selected_hvac_mode }}"
                  continue_on_error: false  # FAIL LOUDLY

                # v7.0.0: Use unified fan control system
                # Capture expected fan value for manual override detection
                - service: input_text.set_value
                  target:
                    entity_id: "{{ helper_expected_fan }}"
                  data:
                    value: "{{ new_fan_mode }}"
                  continue_on_error: true

                # v5.4.0: Delay for BRP084 semaphore compatibility
                - delay:
                    milliseconds: 500

                # SECOND: Set fan mode sequentially
                - service: climate.set_fan_mode
                  target:
                    entity_id: "{{ current_entity }}"
                  data:
                    fan_mode: "{{ new_fan_mode }}"
                  continue_on_error: false  # FAIL LOUDLY

                # v5.4.0: Delay for BRP084 semaphore compatibility
                - delay:
                    milliseconds: 500

                # THIRD: Set swing mode sequentially (optional feature)
                - service: climate.set_swing_mode
                  target:
                    entity_id: "{{ current_entity }}"
                  data:
                    swing_mode: "{{ validated_swing_mode }}"
                  continue_on_error: true  # OK to fail (not all devices support)

                # Debug logging (after service calls)
                - if:
                    - condition: template
                      value_template: "{{ debug_enabled }}"
                  then:
                    - service: system_log.write
                      data:
                        message: >
                          🔍 SMART ECO - MEDIUM COOLING: {{ repeat.item }}
                          • HVAC Mode: {{ selected_hvac_mode }}
                          • Fan Mode: {{ selected_fan_mode }}
                          • Temperature: {{ cooling_target_temp }}°C
                          • Reason: Medium cooling mode for balanced temperature control
                        level: debug

          - service: input_text.set_value
            target:
              entity_id: !input helper_last_mode
            data:
              value: "cooling"

          # v5.3.19 FIX: Wrapped in if/then to prevent blocking subsequent code
          - if:
              - condition: template
                value_template: "{{ dynamic_enabled and helper_mode_time not in [none, '', 'unavailable', 'unknown', []] and helper_mode_time is string and helper_mode_time != '' and (last_mode != 'cooling' or actual_ac_state == 'off') }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: "{{ helper_mode_time }}"
                data:
                  datetime: "{{ now() }}"
                continue_on_error: true

      # =====================================
      # BED COMFORT MODE - Ultra-quiet operation when in bed (v3.12.0)
      # v3.12.9 FIX: Moved BEFORE Comfort Zone to take precedence when in bed
      # =====================================
      # Triggered when bed sensor detects occupancy and temperature comfortable
      # SAFE: Only activates after overshoot target reached, never interrupts active cooling/heating
      - conditions:
          # Feature must be enabled (not set to 'off')
          - condition: template
            value_template: "{{ bed_comfort_mode != 'off' }}"

          # Bed sensor must be configured and active
          - condition: template
            value_template: "{{ bed_sensor_manual and is_state(bed_sensor_manual, 'on') }}"

          # Temperature MUST be within acceptable range (no emergency heating/cooling needed)
          # v5.3.1 FIX: When bed_eco_fan_only_mode is enabled, use wider threshold (target + bed_eco_return_threshold)
          # This prevents flip-flopping between cooling and fan_only at the comfort zone boundary
          - condition: template
            value_template: >
              {% set bed_eco_max = target_temp + bed_eco_return_threshold if bed_eco_fan_only_mode == 'enabled' else comfort_max_temp %}
              {{ current_temp >= comfort_min_temp and current_temp <= bed_eco_max }}

          # AC must currently be ON (don't turn on AC just for bed comfort)
          - condition: template
            value_template: "{{ actual_ac_state != 'off' }}"

          # Respect minimum runtime (anti-short-cycling)
          - condition: template
            value_template: "{{ time_since_change >= (runtime_min | float(0)) }}"

          # NOT in manual/override mode
          - condition: template
            value_template: "{{ control_mode not in ['Manual', 'Override'] }}"

          # Smart mode presence requirement (if Smart mode active)
          - condition: or
            conditions:
              - condition: template
                value_template: "{{ control_mode != 'Smart' }}"
              - condition: template
                value_template: "{{ smart_presence_active }}"

          # CRITICAL SAFETY: Check overshoot target reached if in continue mode
          # This prevents bed comfort from interrupting active cooling/heating to target
          # v4.0.4 FIX: Also exclude fan_only modes to prevent overriding power-saving fan-only
          # v4.6.8 FIX: ALLOW bed comfort to override stability_fan_only when user enters bed
          - condition: template
            value_template: >
              {% set in_continue_mode = (last_mode == 'cooling' or last_mode == 'heating') %}
              {% set in_bed_fan_only = last_mode == 'bed_eco_fan_only' %}
              {% set in_comfort_fan_only = last_mode == 'comfort_fan_only' %}
              {% set in_overshoot_fan_only = last_mode == 'stability_fan_only' %}

              {% if in_bed_fan_only %}
                false  {# Don't interrupt bed ECO fan-only mode #}
              {% elif in_comfort_fan_only %}
                false  {# Don't interrupt comfort zone fan-only #}
              {% elif in_overshoot_fan_only %}
                true   {# v4.6.8: ALLOW bed comfort to override overshoot fan-only when user enters bed #}
              {% elif not in_continue_mode %}
                true
              {% elif last_mode == 'cooling' %}
                {{ current_temp <= (target_temp - target_overshoot) }}
              {% elif last_mode == 'heating' %}
                {{ current_temp >= (target_temp + target_overshoot) }}
              {% else %}
                true
              {% endif %}

        sequence:
          # v5.3.7 FIX: Wrapped debug in if/then to prevent blocking functional code
          # CRITICAL BUG: Bare condition was blocking ALL bed comfort code when debug_enabled=false
          - if:
              - condition: template
                value_template: "{{ debug_enabled }}"
            then:
              - service: system_log.write
                data:
                  message: >
                    🛏️ {{ room_name | upper }} BED COMFORT MODE ACTIVATED

                    Sleep Optimization:
                        • Bed Comfort Mode: {{ bed_comfort_mode | upper }}
                        • Bed Sensor: {{ bed_sensor_manual }} = ON
                        • Current Temp: {{ current_temp }}°C
                        • Comfort Zone: {{ comfort_min_temp }}-{{ comfort_max_temp }}°C
                        • Last Mode: {{ last_mode }}
                        • Overshoot Target: {{ target_temp - target_overshoot if last_mode == 'cooling' else target_temp + target_overshoot }}°C

                    Action: {{ 'Ultra-quiet fan only' if bed_comfort_mode == 'quiet' else 'Full ECO mode' }}
                  level: warning

          # v3.12.1 FIX: Update timestamp BEFORE changing AC settings
          # This prevents false manual override detection when bed comfort activates
          - if:
              - condition: template
                value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: "{{ helper_change }}"
                data:
                  datetime: "{{ now() }}"
                continue_on_error: true

          # Choose action based on mode
          - choose:
              # QUIET mode - Ultra-quiet fan only (no temp/HVAC change)
              - conditions:
                  - condition: template
                    value_template: "{{ bed_comfort_mode == 'quiet' }}"
                sequence:
                  # v7.0.0: Use unified fan control system instead of hardcoded Level 1
                  - repeat:
                      for_each: "{{ climate_list }}"
                      sequence:
                        # v7.0.0: Set fan using unified fan control
                        - service: climate.set_fan_mode
                          target:
                            entity_id: "{{ repeat.item }}"
                          data:
                            fan_mode: "{{ new_fan_mode }}"
                          continue_on_error: true

                        # Debug logging
                        - if:
                            - condition: template
                              value_template: "{{ debug_enabled }}"
                          then:
                            - service: system_log.write
                              data:
                                message: "🛏️ {{ room_name | upper }}: Bed Quiet mode - Set {{ repeat.item }} fan to {{ new_fan_mode }} (actual: {{ state_attr(repeat.item, 'fan_mode') }})"
                                level: debug

                        # Update expected fan helper to prevent false manual override detection
                        - if:
                            - condition: template
                              value_template: "{{ helper_expected_fan not in [none, '', 'unavailable', 'unknown'] }}"
                          then:
                            - service: input_text.set_value
                              target:
                                entity_id: "{{ helper_expected_fan }}"
                              data:
                                value: "{{ new_fan_mode }}"
                              continue_on_error: true

                  # v7.0.0: Update fan change time helper
                  - if:
                      - condition: template
                        value_template: "{{ fan_mode_changed and helper_last_fan_change not in [none, '', 'unavailable', 'unknown'] }}"
                    then:
                      - service: input_datetime.set_datetime
                        target:
                          entity_id: "{{ helper_last_fan_change }}"
                        data:
                          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

              # ECO mode - Actively maintain temperature using external sensor
              # v3.12.0: Continuously monitor and adjust to keep temp at target
              - conditions:
                  - condition: template
                    value_template: "{{ bed_comfort_mode == 'eco' }}"
                sequence:
                  # v4.7.1 FIX: Update helper_change timestamp to prevent false manual override detection
                  # v5.3.19 FIX: Wrapped in if/then to prevent blocking subsequent service calls
                  - if:
                      - condition: template
                        value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
                    then:
                      - service: input_datetime.set_datetime
                        target:
                          entity_id: !input helper_last_change
                        data:
                          datetime: "{{ now() }}"
                        continue_on_error: true

                  # Capture expected values for enhanced manual override detection (v3.3.0)
                  - service: input_number.set_value
                    target:
                      entity_id: "{{ helper_expected_temp }}"
                    data:
                      value: "{{ adjusted_target }}"
                    continue_on_error: true

                  # v5.0.3: MANDATORY BRP084 Pattern - Set temp+hvac+fan in rapid succession
                  - repeat:
                      for_each: "{{ climate_list }}"
                      sequence:
                        - variables:
                            current_entity: "{{ repeat.item }}"
                            available_modes: "{{ state_attr(repeat.item, 'hvac_modes') | list }}"
                            # Smart stability mode selection
                            # Only use auto/heat_cool if both heating and cooling enabled
                            selected_hvac_mode: >
                              {% set modes = state_attr(repeat.item, 'hvac_modes') | list %}
                              {# For stability, prefer auto/heat_cool only if both enabled #}
                              {% if enable_cooling and enable_heating and 'auto' in modes %}
                                auto
                              {% elif enable_cooling and enable_heating and 'Auto' in modes %}
                                Auto
                              {% elif enable_cooling and enable_heating and 'heat_cool' in modes %}
                                heat_cool
                              {% elif enable_cooling and enable_heating and 'Heat/Cool' in modes %}
                                Heat/Cool
                              {% elif enable_cooling and 'cool' in modes %}
                                cool
                              {% elif enable_cooling and 'Cool' in modes %}
                                Cool
                              {% elif enable_heating and 'heat' in modes %}
                                heat
                              {% elif enable_heating and 'Heat' in modes %}
                                Heat
                              {% else %}
                                off
                              {% endif %}

                        # Capture expected HVAC for manual override detection
                        - service: input_text.set_value
                          target:
                            entity_id: "{{ helper_expected_hvac }}"
                          data:
                            value: "{{ selected_hvac_mode }}"
                          continue_on_error: true

                        # v5.0.3: FIRST - Temperature + HVAC mode together (turns AC ON atomically)
                        - service: climate.set_temperature
                          target:
                            entity_id: "{{ current_entity }}"
                          data:
                            temperature: "{{ adjusted_target }}"
                            hvac_mode: "{{ selected_hvac_mode }}"
                          continue_on_error: false

                        # v7.0.0: Use unified fan control system
                        # Capture expected fan for manual override detection
                        - service: input_text.set_value
                          target:
                            entity_id: "{{ helper_expected_fan }}"
                          data:
                            value: "{{ new_fan_mode }}"
                          continue_on_error: true

                        # v5.4.0: Delay for BRP084 semaphore compatibility
                        - delay:
                            milliseconds: 500

                        # v5.0.3: SECOND - Fan mode sequentially
                        - service: climate.set_fan_mode
                          target:
                            entity_id: "{{ current_entity }}"
                          data:
                            fan_mode: "{{ new_fan_mode }}"
                          continue_on_error: false

                        # v5.4.0: Delay for BRP084 semaphore compatibility
                        - delay:
                            milliseconds: 500

                        # v5.0.3: THIRD - Swing mode sequentially (optional, can fail safely)
                        # v5.3.6 FIX: Use global validated_swing_mode for correct case mapping
                        - if:
                            - condition: template
                              value_template: "{{ validated_swing_mode not in ['none', '', 'unavailable', 'unknown'] }}"
                          then:
                            - service: climate.set_swing_mode
                              target:
                                entity_id: "{{ current_entity }}"
                              data:
                                swing_mode: "{{ validated_swing_mode }}"
                              continue_on_error: true

                  # v5.3.7 FIX: Wrapped debug in if/then to prevent blocking helper update
                  # CRITICAL BUG: Bare condition was blocking helper_mode update when debug_enabled=false
                  - if:
                      - condition: template
                        value_template: "{{ debug_enabled }}"
                    then:
                      - service: system_log.write
                        data:
                          message: >
                            🛏️ {{ room_name | upper }} BED COMFORT ECO: Maintaining Target Temperature

                            Temperature:
                                • Set AC to: {{ adjusted_target | round(1) }}°C
                                • Current: {{ current_temp | round(1) }}°C → Target: {{ target_temp | round(1) }}°C

                            Escalation (v3.13.16):
                                • Level: {{ final_escalation_level }} (0=Eco, 1-4=Escalated)
                                • Fan: {{ state_attr(climate_list[0], 'fan_mode') if climate_list else 'unknown' }}
                                • Uses same effectiveness tracking as continue mode

                            Reason: Bed occupied - continuous temperature maintenance in ECO mode with dynamic fan escalation
                          level: warning

          # Update helper to track bed comfort mode
          - if:
              - condition: template
                value_template: "{{ helper_mode not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_mode }}"
                data:
                  value: "bed_comfort_{{ bed_comfort_mode }}"

      # =====================================
      # BED ECO FAN-ONLY MODE (v4.3.0)
      # Power-saving mode when temperature stable at target
      # =====================================
      - conditions:
          - condition: template
            value_template: "{{ bed_eco_should_fan_only }}"

          # Bed still occupied (or in grace period)
          - condition: template
            value_template: >
              {% set sensor_active = bed_sensor_manual and is_state(bed_sensor_manual, 'on') %}
              {% set in_grace = (bed_absence_grace > 0 and minutes_since_bed_off < bed_absence_grace) %}
              {{ sensor_active or in_grace }}

          # AC supports fan_only
          - condition: template
            value_template: >
              {% set modes = state_attr(climate_list[0], 'hvac_modes') | list %}
              {{ 'fan_only' in modes or 'fan-only' in modes or 'Fan Only' in modes or 'dry' in modes }}

          # Runtime protection
          - condition: template
            value_template: "{{ time_since_change >= (runtime_min | float(0)) }}"

        sequence:
          # Debug logging
          - if:
              - condition: template
                value_template: "{{ debug_enabled }}"
            then:
              - service: system_log.write
                data:
                  message: >
                    🛏️💨 {{ room_name | upper }} BED ECO → FAN-ONLY MODE

                    Stability Detection:
                        • Temp: {{ current_temp }}°C (target: {{ target_temp }}°C)
                        • Change rate: {{ temp_change_rate | round(3) }}°C/min (max: {{ bed_eco_stability_rate }})
                        • Stable for: {{ time_in_current_mode | round(1) }} min (required: {{ bed_eco_stability_minutes }})

                    Thresholds:
                        • Return if temp > {{ (target_temp + bed_eco_return_threshold) | round(1) }}°C
                        • Max undershoot: {{ bed_eco_max_overshoot }}°C

                    Power Savings: ~85% reduction (compressor OFF)
                  level: warning
                  logger: "blueprints.climate_control.{{ room_name | lower | replace(' ', '_') }}"

          # STEP 1: Update helper_change BEFORE AC changes
          # v5.3.19 FIX: Wrapped in if/then to prevent blocking subsequent steps
          - if:
              - condition: template
                value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: "{{ helper_change }}"
                data:
                  datetime: "{{ now() }}"
                continue_on_error: true

          # STEP 2: Update expected_hvac BEFORE changing mode
          - if:
              - condition: template
                value_template: "{{ helper_expected_hvac not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_expected_hvac }}"
                data:
                  value: "fan_only"
                continue_on_error: true

          # STEP 2B: Update expected_temp (fan-only doesn't change setpoint but prevents false override)
          - if:
              - condition: template
                value_template: "{{ helper_expected_temp not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_number.set_value
                target:
                  entity_id: "{{ helper_expected_temp }}"
                data:
                  value: "{{ target_temp }}"
                continue_on_error: true

          # STEP 3: Update helper_mode BEFORE AC changes
          # v5.3.19 FIX: Wrapped in if/then to prevent blocking subsequent steps
          - if:
              - condition: template
                value_template: "{{ helper_mode not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_mode }}"
                data:
                  value: "bed_eco_fan_only"

          # STEP 4: Variables for fan-only mode
          - variables:
              selected_fan_only_hvac: >
                {% set modes = state_attr(climate_list[0], 'hvac_modes') | list %}
                {% if 'fan_only' in modes %}
                  fan_only
                {% elif 'fan-only' in modes %}
                  fan-only
                {% elif 'Fan Only' in modes %}
                  Fan Only
                {% elif 'dry' in modes %}
                  dry
                {% else %}
                  off
                {% endif %}

          # v7.0.0: Update expected_fan helper using unified fan control
          - if:
              - condition: template
                value_template: "{{ helper_expected_fan not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_expected_fan }}"
                data:
                  value: "{{ new_fan_mode }}"
                continue_on_error: true

          # v7.0.0: Sequential calls for proper BRP084/BRP069 firmware pattern
          - repeat:
              for_each: "{{ climate_list }}"
              sequence:
                # FIRST: Set temperature + HVAC mode (ensures AC is ON and mode is set)
                - service: climate.set_temperature
                  target:
                    entity_id: "{{ repeat.item }}"
                  data:
                    temperature: "{{ target_temp }}"
                    hvac_mode: "{{ selected_fan_only_hvac }}"
                  continue_on_error: false

                # v5.4.0: Delay for BRP084 semaphore compatibility
                - delay:
                    milliseconds: 500

                # v7.0.0: Fan mode using unified fan control
                - service: climate.set_fan_mode
                  target:
                    entity_id: "{{ repeat.item }}"
                  data:
                    fan_mode: "{{ new_fan_mode }}"
                  continue_on_error: false

          # v7.0.0: Update fan change time helper
          - if:
              - condition: template
                value_template: "{{ fan_mode_changed and helper_last_fan_change not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: "{{ helper_last_fan_change }}"
                data:
                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

      # =====================================
      # BED ECO FAN-ONLY → RETURN TO COOLING (v4.3.0)
      # When temperature rises above threshold
      # =====================================
      - conditions:
          - condition: template
            value_template: "{{ bed_eco_should_return }}"

          # Bed still occupied (or in grace period)
          - condition: template
            value_template: >
              {% set sensor_active = bed_sensor_manual and is_state(bed_sensor_manual, 'on') %}
              {% set in_grace = (bed_absence_grace > 0 and minutes_since_bed_off < bed_absence_grace) %}
              {{ sensor_active or in_grace }}

          # Runtime protection
          - condition: template
            value_template: "{{ time_since_change >= (runtime_min | float(0)) }}"

        sequence:
          # Debug logging
          - if:
              - condition: template
                value_template: "{{ debug_enabled }}"
            then:
              - service: system_log.write
                data:
                  message: >
                    🛏️❄️ {{ room_name | upper }} BED ECO FAN-ONLY → RETURN TO COOLING

                    Temperature Rise:
                        • Current: {{ current_temp }}°C
                        • Target: {{ target_temp }}°C
                        • Threshold: {{ (target_temp + bed_eco_return_threshold) | round(1) }}°C
                        • Rose: {{ (current_temp - target_temp) | round(1) }}°C above target

                    Action: Returning to bed_comfort_eco for active cooling
                  level: warning
                  logger: "blueprints.climate_control.{{ room_name | lower | replace(' ', '_') }}"

          # Update helper_change
          # v5.3.19 FIX: Wrapped in if/then to prevent blocking mode update
          - if:
              - condition: template
                value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_datetime.set_datetime
                target:
                  entity_id: "{{ helper_change }}"
                data:
                  datetime: "{{ now() }}"
                continue_on_error: true

          # Set mode back to bed_comfort_eco - the bed ECO block will handle the rest
          # v5.3.19 FIX: Wrapped in if/then to prevent blocking subsequent code
          - if:
              - condition: template
                value_template: "{{ helper_mode not in [none, '', 'unavailable', 'unknown'] }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: "{{ helper_mode }}"
                data:
                  value: "bed_comfort_eco"

      # Comfort zone - Eco mode or OFF mode (Power Saving)
      # When temperature is within acceptable range (e.g., 21-25°C with ±2°C tolerance)
      # OFF mode saves 40-60% more energy vs eco mode but allows temperature drift
      # v3.19.2 FIX: Don't activate comfort zone actions until overshoot target is reached (if enabled)
      - conditions:
          - condition: template
            value_template: "{{ should_activate }}"
          - condition: template
            value_template: >
              {% set in_comfort_zone = current_temp >= comfort_min_temp and current_temp <= comfort_max_temp %}
              {% set overshoot_reached = true %}
              {% if target_overshoot > 0 and last_mode == 'cooling' %}
                {% set overshoot_reached = current_temp <= (target_temp - target_overshoot) %}
              {% elif target_overshoot > 0 and last_mode == 'heating' %}
                {% set overshoot_reached = current_temp >= (target_temp + target_overshoot) %}
              {% endif %}
              {{ in_comfort_zone and overshoot_reached }}
          - condition: template
            value_template: "{{ time_since_change > (runtime_min | float(0)) }}"

          # v4.6.9: Don't activate comfort zone actions if user is in bed - bed comfort takes priority
          - condition: template
            value_template: >
              {{
                not (bed_comfort_mode != 'off' and
                     bed_sensor_manual and
                     is_state(bed_sensor_manual, 'on'))
              }}
        sequence:
          # v5.3.7 FIX: Wrapped debug in if/then to prevent blocking functional code
          # CRITICAL BUG: Bare condition was blocking ALL comfort zone action code when debug_enabled=false
          - if:
              - condition: template
                value_template: "{{ debug_enabled }}"
            then:
              - service: system_log.write
                data:
                  message: >
                    🔍 {{ room_name | upper }} CLIMATE DEBUG: Comfort Zone Action Triggered

                    🎛️ Control Status:
                        • Control Mode: {{ control_mode }}
                        • Should Activate: {{ should_activate }}
                        • Extreme Temp Detected: {{ extreme_temp_detected }}
                        • Current Temp: {{ current_temp }}°C
                        • Extreme High: {{ extreme_high }}°C
                        • Extreme Low: {{ extreme_low }}°C
                        • Room Presence: {{ room_presence_detected }}
                        • Approaching Home: {{ approaching_home }}
                  level: warning
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ comfort_zone_action == 'eco' }}"
                sequence:
                  # Eco mode - maintain with reduced fan and wider setpoint (uses ~150-250W)

                  # v4.7.1 DEBUG: Prove ECO block is executing
                  - if:
                      - condition: template
                        value_template: "{{ debug_enabled }}"
                    then:
                      - service: system_log.write
                        data:
                          message: >
                            🚨 {{ room_name | upper }} ECO MODE BLOCK ACTIVATED

                            📊 Debug Info:
                                • comfort_zone_action: {{ comfort_zone_action }}
                                • Should be 'eco' to match: {{ comfort_zone_action == 'eco' }}
                                • last_mode: {{ last_mode }}
                                • This block should NOT execute if comfort_zone_action != 'eco'!
                          level: warning

                  # v4.7.1 FIX: Calculate expected values BEFORE updating helpers
                  - variables:
                      entity_for_calculation: "{{ climate_list[0] }}"
                      available_modes_calc: "{{ state_attr(climate_list[0], 'hvac_modes') | list }}"
                      available_fans_calc: "{{ state_attr(climate_list[0], 'fan_modes') | list }}"
                      expected_hvac_mode_calc: >
                        {% set modes = state_attr(climate_list[0], 'hvac_modes') | list %}
                        {% if enable_cooling and enable_heating and 'auto' in modes %}
                          auto
                        {% elif enable_cooling and enable_heating and 'Auto' in modes %}
                          Auto
                        {% elif enable_cooling and enable_heating and 'heat_cool' in modes %}
                          heat_cool
                        {% elif enable_cooling and enable_heating and 'Heat/Cool' in modes %}
                          Heat/Cool
                        {% elif enable_cooling and 'cool' in modes %}
                          cool
                        {% elif enable_cooling and 'Cool' in modes %}
                          Cool
                        {% elif enable_heating and 'heat' in modes %}
                          heat
                        {% elif enable_heating and 'Heat' in modes %}
                          Heat
                        {% else %}
                          off
                        {% endif %}
                      # v7.0.0: Use unified fan control system
                      expected_fan_mode_calc: "{{ new_fan_mode }}"

                  # v4.7.1 FIX: Update ALL helpers BEFORE any climate service calls
                  - if:
                      - condition: template
                        value_template: "{{ helper_expected_hvac not in [none, '', 'unavailable', 'unknown'] }}"
                    then:
                      - service: input_text.set_value
                        target:
                          entity_id: "{{ helper_expected_hvac }}"
                        data:
                          value: "{{ expected_hvac_mode_calc }}"
                        continue_on_error: true

                  - if:
                      - condition: template
                        value_template: "{{ helper_expected_temp not in [none, '', 'unavailable', 'unknown'] }}"
                    then:
                      - service: input_number.set_value
                        target:
                          entity_id: "{{ helper_expected_temp }}"
                        data:
                          value: "{{ adjusted_target }}"
                        continue_on_error: true

                  - if:
                      - condition: template
                        value_template: "{{ helper_expected_fan not in [none, '', 'unavailable', 'unknown'] }}"
                    then:
                      - service: input_text.set_value
                        target:
                          entity_id: "{{ helper_expected_fan }}"
                        data:
                          value: "{{ expected_fan_mode_calc }}"
                        continue_on_error: true

                  # v4.7.1 CRITICAL: 200ms delay for helper writes to commit before climate service calls
                  - delay:
                      milliseconds: 200

                  # Set HVAC mode to auto for maximum efficiency in comfort zone
                  - repeat:
                      for_each: "{{ climate_list }}"
                      sequence:
                        - variables:
                            current_entity: "{{ repeat.item }}"
                            available_modes: "{{ state_attr(repeat.item, 'hvac_modes') | list }}"
                            # Smart stability mode selection
                            # v3.10.0: Only use auto/heat_cool if both heating and cooling enabled
                            expected_hvac_mode: >
                              {% set modes = state_attr(repeat.item, 'hvac_modes') | list %}
                              {# For stability, prefer auto/heat_cool only if both enabled #}
                              {% if enable_cooling and enable_heating and 'auto' in modes %}
                                auto
                              {% elif enable_cooling and enable_heating and 'Auto' in modes %}
                                Auto
                              {% elif enable_cooling and enable_heating and 'heat_cool' in modes %}
                                heat_cool
                              {% elif enable_cooling and enable_heating and 'Heat/Cool' in modes %}
                                Heat/Cool
                              {% elif enable_cooling and 'cool' in modes %}
                                cool
                              {% elif enable_cooling and 'Cool' in modes %}
                                Cool
                              {% elif enable_heating and 'heat' in modes %}
                                heat
                              {% elif enable_heating and 'Heat' in modes %}
                                Heat
                              {% else %}
                                off
                              {% endif %}

                  - service: system_log.write
                    data:
                      message: >
                        🌡️ {{ room_name | upper }} TEMP SET: Comfort Zone Maintenance (ECO Mode)
                        Set AC to: {{ target_temp | round(0) }}°C (rounded for AC compatibility)
                        Actual value: {{ target_temp | round(1) }}°C
                        Reason: Maintaining target temperature within comfort zone
                        Current: {{ current_temp | round(1) }}°C → Target: {{ target_temp | round(1) }}°C
                      level: warning

                  # v5.0.3: MANDATORY BRP084 Pattern - Set temp+hvac in ONE call, then fan, then swing
                  - repeat:
                      for_each: "{{ climate_list }}"
                      sequence:
                        - variables:
                            current_entity: "{{ repeat.item }}"
                            available_modes: "{{ state_attr(repeat.item, 'hvac_modes') | list }}"
                            available_fans: "{{ state_attr(repeat.item, 'fan_modes') | list }}"
                            # Smart stability mode selection
                            # v3.10.0: Only use auto/heat_cool if both heating and cooling enabled
                            selected_hvac_mode: >
                              {% set modes = state_attr(repeat.item, 'hvac_modes') | list %}
                              {# For stability, prefer auto/heat_cool only if both enabled #}
                              {% if enable_cooling and enable_heating and 'auto' in modes %}
                                auto
                              {% elif enable_cooling and enable_heating and 'Auto' in modes %}
                                Auto
                              {% elif enable_cooling and enable_heating and 'heat_cool' in modes %}
                                heat_cool
                              {% elif enable_cooling and enable_heating and 'Heat/Cool' in modes %}
                                Heat/Cool
                              {% elif enable_cooling and 'cool' in modes %}
                                cool
                              {% elif enable_cooling and 'Cool' in modes %}
                                Cool
                              {% elif enable_heating and 'heat' in modes %}
                                heat
                              {% elif enable_heating and 'Heat' in modes %}
                                Heat
                              {% else %}
                                off
                              {% endif %}
                            # v7.0.0: Use unified fan control system
                            # v7.0.1 FIX: Respect pre-conditioning fan mode
                            selected_fan_mode: >
                              {% if is_precond_mode and precond_validated_fan_mode != 'Dynamic' %}
                                {{ precond_validated_fan_mode }}
                              {% else %}
                                {{ new_fan_mode }}
                              {% endif %}

                        # v5.0.3: MANDATORY BRP084 pattern - rapid batched calls (NO DELAYS)
                        # FIRST: Temperature + HVAC mode together (turns AC ON atomically)
                        - service: climate.set_temperature
                          target:
                            entity_id: "{{ current_entity }}"
                          data:
                            temperature: "{{ adjusted_target }}"
                            hvac_mode: "{{ selected_hvac_mode }}"
                          continue_on_error: false

                        # v5.4.0: Delay for BRP084 semaphore compatibility
                        - delay:
                            milliseconds: 500

                        # SECOND: Fan mode sequentially
                        # v7.0.1 FIX: Use selected_fan_mode (which respects pre-conditioning)
                        - service: climate.set_fan_mode
                          target:
                            entity_id: "{{ current_entity }}"
                          data:
                            fan_mode: "{{ selected_fan_mode }}"
                          continue_on_error: false

                        # v5.4.0: Delay for BRP084 semaphore compatibility
                        - delay:
                            milliseconds: 500

                        # THIRD: Swing mode sequentially (optional, can fail safely)
                        # v5.3.6 FIX: Use global validated_swing_mode for correct case mapping
                        - if:
                            - condition: template
                              value_template: "{{ validated_swing_mode not in ['none', '', 'unavailable', 'unknown'] }}"
                          then:
                            - service: climate.set_swing_mode
                              target:
                                entity_id: "{{ current_entity }}"
                              data:
                                swing_mode: "{{ validated_swing_mode }}"
                              continue_on_error: true
                  
                  - service: input_text.set_value
                    target:
                      entity_id: !input helper_last_mode
                    data:
                      value: "eco"

                  # v5.3.19 FIX: Wrapped in if/then to prevent blocking notification
                  - if:
                      - condition: template
                        value_template: "{{ dynamic_enabled and helper_mode_time not in [none, '', 'unavailable', 'unknown', []] and helper_mode_time is string and helper_mode_time != '' and (last_mode != 'eco' or actual_ac_state == 'off') }}"
                    then:
                      - service: input_datetime.set_datetime
                        target:
                          entity_id: "{{ helper_mode_time }}"
                        data:
                          datetime: "{{ now() }}"
                        continue_on_error: true

                  # v5.3.19 FIX: Wrapped in if/then to prevent blocking subsequent code
                  - if:
                      - condition: template
                        value_template: "{{ enable_notifications }}"
                    then:
                      - service: !input notification_service
                        data:
                          title: "{{ room_name }} Climate Control"
                          message: "Eco mode - Comfort zone ({{ current_temp }}°C)"
                        continue_on_error: true

              # v4.7.2 DEBUG: Log comfort_zone_action value
              - conditions:
                  - condition: template
                    value_template: "{{ debug_enabled }}"
                sequence:
                  - service: system_log.write
                    data:
                      message: >
                        🔍 {{ room_name | upper }} COMFORT ZONE BLOCK EVALUATION

                        📊 Settings:
                            • comfort_zone_action: "{{ comfort_zone_action }}"
                            • last_mode: "{{ last_mode }}"
                            • actual_ac_state: "{{ actual_ac_state }}"
                            • current_temp: {{ current_temp }}°C
                            • comfort_zone: {{ comfort_min_temp }}-{{ comfort_max_temp }}°C

                        🎯 Which block will match?
                            • comfort_zone_action == 'off': {{ comfort_zone_action == 'off' }}
                            • comfort_zone_action == 'eco': {{ comfort_zone_action == 'eco' }}
                            • comfort_zone_action == 'fan_only' AND last_mode in active modes: {{ comfort_zone_action == 'fan_only' and last_mode in ['cooling', 'heating', 'bed_comfort_eco', 'bed_comfort_quiet', 'bed_eco_fan_only', 'comfort_fan_only', 'stability_fan_only'] }}
                            • comfort_zone_action == 'fan_only' AND last_mode NOT in active modes: {{ comfort_zone_action == 'fan_only' and last_mode not in ['cooling', 'heating', 'bed_comfort_eco', 'bed_comfort_quiet', 'bed_eco_fan_only', 'comfort_fan_only', 'stability_fan_only'] }}
                      level: warning

              # v3.19.0: Debug logging when fan-only is blocked due to no prior cooling/heating
              - conditions:
                  - condition: template
                    value_template: "{{ comfort_zone_action == 'fan_only' }}"
                  - condition: template
                    value_template: >
                      {{ last_mode not in ['cooling', 'heating', 'bed_comfort_eco', 'bed_comfort_quiet', 'bed_eco_fan_only', 'comfort_fan_only', 'stability_fan_only'] }}
                sequence:
                  # v4.7.2: Check if AC is already in fan mode - if so, sync helper instead of turning off
                  # v5.2.3 FIX: Don't sync to comfort_fan_only if helper shows smart_off/off - this indicates
                  # the automation deliberately turned off the AC due to no presence. The AC may briefly
                  # show fan_only during Daikin shutdown sequence, but we should NOT re-activate.
                  - choose:
                      # AC is already in a fan-like mode - sync the helper
                      # v5.2.3: EXCEPT if helper shows smart_off/off (deliberate shutdown in progress)
                      - conditions:
                          - condition: template
                            value_template: >
                              {{ (states(climate_list[0]) in ['fan_only', 'dry'] or actual_ac_state == 'on')
                                 and last_mode not in ['smart_off', 'off', 'smart_eco', 'smart_maintain', 'away_off', 'away_eco', 'auto_off_off', 'auto_off_eco', 'auto_off_fan_only'] }}
                        sequence:
                          - if:
                              - condition: template
                                value_template: "{{ debug_enabled }}"
                            then:
                              - service: system_log.write
                                data:
                                  message: >
                                    🔄 {{ room_name | upper }} STATE SYNC: AC already in fan-like mode

                                    📊 Current State:
                                        • AC HVAC Mode: {{ states(climate_list[0]) }}
                                        • AC Power State: {{ actual_ac_state }}
                                        • last_mode helper: {{ last_mode }}
                                        • comfort_zone_action: {{ comfort_zone_action }}

                                    🔧 Action:
                                        • Syncing helper_last_mode to 'comfort_fan_only'
                                        • AC will remain ON in current mode
                                  level: warning

                          - service: input_text.set_value
                            target:
                              entity_id: !input helper_last_mode
                            data:
                              value: "comfort_fan_only"

                          - service: input_datetime.set_datetime
                            target:
                              entity_id: !input helper_last_change
                            data:
                              datetime: "{{ now() }}"
                            continue_on_error: true

                    # AC is OFF or in a different mode - turn it off
                    # v5.2.3: Also handles shutdown sequence detection (helper shows smart_off/off but AC briefly in fan_only)
                    default:
                      - if:
                          - condition: template
                            value_template: "{{ debug_enabled }}"
                        then:
                          - service: system_log.write
                            data:
                              message: >
                                🚫 {{ room_name | upper }} COMFORT FAN-ONLY BLOCKED

                                📊 Reason: {{ 'Shutdown sequence in progress - helper shows deliberate off state' if last_mode in ['smart_off', 'off', 'smart_eco', 'smart_maintain', 'away_off', 'away_eco'] else 'No prior cooling/heating mode detected' }}
                                    • Current temp: {{ current_temp }}°C (in comfort zone: {{ comfort_min_temp }}-{{ comfort_max_temp }}°C)
                                    • last_mode: {{ last_mode }}
                                    • AC HVAC mode: {{ states(climate_list[0]) }}
                                    • AC state: {{ actual_ac_state }}

                                💡 {% if last_mode in ['smart_off', 'off', 'smart_eco', 'smart_maintain', 'away_off', 'away_eco'] %}
                                   Daikin AC may briefly show fan_only during shutdown sequence. Ignoring to prevent cycling.
                                   {% else %}
                                   Fan-only mode only activates AFTER cooling/heating brings temperature to comfort zone.
                                   {% endif %}
                              level: warning

                      # Fallback to OFF mode when fan-only blocked
                      - service: input_datetime.set_datetime
                        target:
                          entity_id: !input helper_last_change
                        data:
                          datetime: "{{ now() }}"
                        continue_on_error: true

                      - service: input_text.set_value
                        target:
                          entity_id: !input helper_last_mode
                        data:
                          value: "off"

                      # v5.2.4 FIX: Update mode_start_time for off-time protection
                      - service: input_datetime.set_datetime
                        target:
                          entity_id: !input helper_mode_start_time
                        data:
                          datetime: "{{ now() }}"
                        continue_on_error: true

                      # v6.5.2 CRITICAL FIX: Update snapshot BEFORE sending command
                      # The climate_state_change trigger fires immediately when state changes.
                      # If we update the snapshot AFTER the command, there's a race condition:
                      # 1. climate.turn_off → AC turns off → climate_state_change fires
                      # 2. Override detection runs with OLD snapshot (checksum mismatch!)
                      # 3. False override triggered
                      # Fix: Update snapshot first so climate_state_change sees correct expected state
                      - if:
                          - condition: template
                            value_template: "{{ helper_last_command not in [none, 'unavailable', 'unknown'] }}"
                        then:
                          - variables:
                              update_snapshot: "hvac=off,temp=0,fan=unknown,swing=unknown"
                              update_checksum: "0"
                          - service: input_text.set_value
                            target:
                              entity_id: "{{ helper_last_command }}"
                            data:
                              value: "{{ update_snapshot }}"
                            continue_on_error: true
                          - service: input_number.set_value
                            target:
                              entity_id: "{{ helper_state_checksum }}"
                            data:
                              value: "{{ update_checksum }}"
                            continue_on_error: true
                          # v5.3.14 FIX: Update command timestamp for grace period calculation
                          - if:
                              - condition: template
                                value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
                            then:
                              - service: input_datetime.set_datetime
                                target:
                                  entity_id: "{{ helper_change }}"
                                data:
                                  datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                                continue_on_error: true
                          - if:
                              - condition: template
                                value_template: "{{ debug_enabled }}"
                            then:
                              - service: system_log.write
                                data:
                                  message: >
                                    📸 {{ room_name | upper }} SNAPSHOT UPDATED (Pre-command - Turn OFF Fallback)
                                        • New Snapshot: {{ update_snapshot }}
                                  level: warning

                      # v4.7.0: Turn off AC - fail loudly if error
                      - service: climate.turn_off
                        target:
                          entity_id: !input climate_entities
                        continue_on_error: false

              - conditions:
                  - condition: template
                    value_template: "{{ comfort_zone_action == 'fan_only' }}"
                  - condition: template
                    value_template: >
                      {{ last_mode in ['cooling', 'heating', 'bed_comfort_eco', 'bed_comfort_quiet', 'bed_eco_fan_only', 'comfort_fan_only', 'stability_fan_only'] }}
                sequence:
                  # v3.18.0: Fan-only mode when comfort zone reached

                  # Update helper_change BEFORE switching to fan_only to prevent false Override detection
                  # v5.3.19 FIX: Wrapped in if/then to prevent blocking subsequent service calls
                  - if:
                      - condition: template
                        value_template: "{{ helper_change not in [none, '', 'unavailable', 'unknown'] }}"
                    then:
                      - service: input_datetime.set_datetime
                        target:
                          entity_id: !input helper_last_change
                        data:
                          datetime: "{{ now() }}"
                        continue_on_error: true

                  # Update expected_hvac BEFORE changing mode to prevent race condition
                  - if:
                      - condition: template
                        value_template: "{{ helper_expected_hvac not in [none, '', 'unavailable', 'unknown'] }}"
                    then:
                      - service: input_text.set_value
                        target:
                          entity_id: "{{ helper_expected_hvac }}"
                        data:
                          value: "fan_only"
                        continue_on_error: true

                  # Update helper_last_mode BEFORE switching to prevent false override
                  - service: input_text.set_value
                    target:
                      entity_id: !input helper_last_mode
                    data:
                      value: "comfort_fan_only"

                  # v4.7.1 CRITICAL: 200ms delay for helper writes to commit before climate service calls
                  - delay:
                      milliseconds: 200

                  # Check if AC supports fan_only mode
                  - variables:
                      entity_for_check: "{{ climate_list[0] }}"
                      available_modes: "{{ state_attr(entity_for_check, 'hvac_modes') | list }}"
                      selected_fan_only_hvac: >
                        {% set modes = state_attr(entity_for_check, 'hvac_modes') | list %}
                        {% if 'fan_only' in modes %}
                          fan_only
                        {% elif 'fan-only' in modes %}
                          fan-only
                        {% elif 'Fan Only' in modes %}
                          Fan Only
                        {% elif 'dry' in modes %}
                          dry
                        {% else %}
                          off
                        {% endif %}
                      supports_fan_only: "{{ selected_fan_only_hvac in ['fan_only', 'fan-only', 'Fan Only', 'dry'] }}"

                  - if:
                      - condition: template
                        value_template: "{{ debug_enabled }}"
                    then:
                      - service: system_log.write
                        data:
                          message: >
                            🌬️ {{ room_name | upper }} COMFORT ZONE → FAN-ONLY MODE

                            📊 Temperature Status:
                                • Current: {{ current_temp | round(1) }}°C
                                • Comfort zone: {{ comfort_min_temp }}-{{ comfort_max_temp }}°C
                                • In comfort zone: True

                            ⚡ Fan-Only Activation:
                                • Switching from: {{ last_mode | upper }}
                                • Target HVAC mode: {{ selected_fan_only_hvac }}
                                • User selected fan speed: {{ fan_only_fan_speed_setting }}
                                • Mapped to AC fan mode: {{ selected_fan_only_fan_mode }}
                                • AC supports fan_only: {{ supports_fan_only }}

                            💰 Expected Savings:
                                • Power reduction: ~85% (compressor OFF, fan only)
                                • Will return to cooling/heating if temp exits comfort zone

                            🛡️ Manual Override Protection:
                                • helper_change updated: {{ now() }}
                                • helper_expected_hvac: fan_only
                                • Safe from false manual override detection
                          level: warning

                  # Switch to fan_only mode (if supported)
                  - if:
                      - condition: template
                        value_template: "{{ supports_fan_only }}"
                    then:
                      # v4.7.2 DEBUG: Log EXACT values being passed to climate service
                      - if:
                          - condition: template
                            value_template: "{{ debug_enabled }}"
                        then:
                          - service: system_log.write
                            data:
                              message: >
                                🚨 {{ room_name | upper }} ABOUT TO CALL climate.set_temperature

                                📊 EXACT Values Being Passed:
                                    • entity_id: {{ climate_list[0] }}
                                    • temperature: {{ target_temp }}
                                    • hvac_mode: "{{ selected_fan_only_hvac }}"
                                    • Is string: {{ selected_fan_only_hvac is string }}
                                    • Length: {{ selected_fan_only_hvac | length }}
                                    • Raw value: {{ selected_fan_only_hvac | tojson }}

                                🔍 Variable Calculation:
                                    • available_modes from AC: {{ state_attr(climate_list[0], 'hvac_modes') | list }}
                                    • 'fan_only' in modes: {{ 'fan_only' in state_attr(climate_list[0], 'hvac_modes') | list }}
                                    • selected_fan_only_hvac result: {{ selected_fan_only_hvac }}
                              level: warning

                      # v5.0.3: MANDATORY BRP084 Pattern - rapid batched calls (NO DELAYS)
                      - repeat:
                          for_each: "{{ climate_list }}"
                          sequence:
                            # FIRST: Temperature + HVAC mode together (turns AC ON with fan_only mode)
                            # For fan_only, we still set a temperature to ensure AC responds correctly
                            - service: climate.set_temperature
                              target:
                                entity_id: "{{ repeat.item }}"
                              data:
                                temperature: "{{ target_temp }}"
                                hvac_mode: "{{ selected_fan_only_hvac }}"
                              continue_on_error: false

                            # v5.4.0: Delay for BRP084 semaphore compatibility
                            - delay:
                                milliseconds: 500

                            # SECOND: Fan mode sequentially
                            - service: climate.set_fan_mode
                              target:
                                entity_id: "{{ repeat.item }}"
                              data:
                                fan_mode: "{{ selected_fan_only_fan_mode }}"
                              continue_on_error: false

                      # Update expected fan helper
                      - if:
                          - condition: template
                            value_template: "{{ helper_expected_fan not in [none, '', 'unavailable', 'unknown'] }}"
                        then:
                          - service: input_text.set_value
                            target:
                              entity_id: "{{ helper_expected_fan }}"
                            data:
                              value: "{{ selected_fan_only_fan_mode }}"
                            continue_on_error: true

                      # Wait briefly for AC to respond
                      - delay:
                          seconds: 2

                      # Post-activation debug with actual AC state
                      - if:
                          - condition: template
                            value_template: "{{ debug_enabled }}"
                        then:
                          - service: system_log.write
                            data:
                              message: >
                                ✅ {{ room_name | upper }} FAN-ONLY MODE ACTIVATED - STATE VERIFICATION

                                📊 AC State After Commands:
                                    • HVAC Mode: {{ states(climate_list[0]) }}
                                    • Fan Mode: {{ state_attr(climate_list[0], 'fan_mode') }}
                                    • Temperature: {{ state_attr(climate_list[0], 'current_temperature') }}°C

                                🎯 What Was Sent:
                                    • User Selection: {{ fan_only_fan_speed_setting }}
                                    • Mapped Fan Mode: {{ selected_fan_only_fan_mode }}
                                    • HVAC Mode: {{ selected_fan_only_hvac }}

                                ✅ Verification:
                                    • Expected HVAC: {{ selected_fan_only_hvac }}
                                    • Actual HVAC: {{ states(climate_list[0]) }}
                                    • Match: {{ states(climate_list[0]) == selected_fan_only_hvac }}
                                    • Expected Fan: {{ selected_fan_only_fan_mode }}
                                    • Actual Fan: {{ state_attr(climate_list[0], 'fan_mode') }}
                                    • Match: {{ state_attr(climate_list[0], 'fan_mode') == selected_fan_only_fan_mode }}
                              level: warning

                    else:
                      # v4.6.5: Fallback - AC doesn't support fan_only, turn off instead
                      # v6.5.2 CRITICAL FIX: Update snapshot BEFORE sending command
                      - if:
                          - condition: template
                            value_template: "{{ helper_last_command not in [none, 'unavailable', 'unknown'] }}"
                        then:
                          - service: input_text.set_value
                            target:
