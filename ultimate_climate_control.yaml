  fan_only_fan_speed_setting: !input fan_only_fan_speed
  selected_fan_only_fan_mode: "{% set user_choice = fan_only_fan_speed_setting | default('silence')
    %} {% set entity = climate_list[0] if climate_list | length > 0 else none %} {%
