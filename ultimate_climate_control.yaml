          level: warning
    - stop: Manual override active - respecting user changes
  - conditions:
    - condition: template
      value_template: '{{ is_precond_mode }}'
    - condition: template
      value_template: '{{ states(climate_list[0]) in [''cool'', ''heat''] }}'
    - condition: template
      value_template: '{% set current_fan = state_attr(climate_list[0], ''fan_mode'')
        %} {% set fan_wrong = current_fan != precond_validated_fan_mode %} {% set
        current_temp = state_attr(climate_list[0], ''temperature'') | float %} {%
        set ac_state = states(climate_list[0]) %} {% set boost_temp = ac_minimum_temp
        | float(18) if ac_state == ''cool'' else ac_maximum_temp | float(30) %} {%
        set temp_wrong = precond_boost_enabled and (current_temp | round(1) != boost_temp
        | round(1)) %} {{ fan_wrong or temp_wrong }}

        '
    sequence:
    - variables:
        precond_ac_state: '{{ states(climate_list[0]) }}'
        precond_boost_temp: '{{ ac_minimum_temp | float(18) if precond_ac_state ==
