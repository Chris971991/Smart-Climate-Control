              \ {% elif 'quiet' in fans %}\n  quiet\n  {% elif 'Quiet' in fans %}\n
              \ Quiet\n  {% elif 'eco' in fans %}\n  eco\n  {% elif 'Eco' in fans
              %}\n  Eco\n  {% elif 'auto' in fans %}\n  auto\n  {% elif 'Auto' in
