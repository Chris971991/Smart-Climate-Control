      dynamic_max_level_int: >
        {% set fan = dynamic_max_fan | string | lower %}
        {% if '5' in fan or fan == 'high' %}
          5
        {% elif '4' in fan %}
          4
        {% elif '3' in fan or fan == 'medium' %}
          3
        {% elif '2' in fan %}
          2
        {% elif '1' in fan or fan in ['low', 'quiet', 'silence'] %}
          1
        {% elif fan == 'auto' %}
          5
        {% else %}
          5
        {% endif %}

