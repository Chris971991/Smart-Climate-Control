                • Effective Progress Rate: {{ effective_min_progress_rate }}°C/min{% if heat_source_active %} (reduced for heat sources){% endif %}
                • Current Rate: {{ temp_change_rate | round(3) }}°C/min
                • Escalation Add (This Check): +{{ wrong_direction_escalation_add }} levels
                • Base Escalation: Level {{ escalation_level }}
                • Heat Source Boost: +{{ heat_source_escalation_boost }} levels
                • Final Escalation: Level {{ final_escalation_level }} (base + boosts, capped at 4)

            💡 How Incremental Escalation Works:
                {% if not wrong_direction_enabled %}
                • Feature DISABLED - using base escalation only
                {% elif wrong_direction_per_check == 0 %}
                • Feature enabled but set to +0 - no escalation added
                {% elif not wrong_direction_detected %}
                • Temperature progressing well - no additional escalation needed
                {% else %}
                • Stall or wrong direction detected! Adding +{{ wrong_direction_per_check }} level(s) this check
                • At next effectiveness check (in ~{{ effectiveness_check_mins }} min), if still stalling/wrong: +{{ wrong_direction_per_check }} more
                • Escalation builds up: Check 1: +{{ wrong_direction_per_check }}, Check 2: +{{ wrong_direction_per_check * 2 }}, Check 3: +{{ wrong_direction_per_check * 3 }}, etc.
                • Stops escalating when temp progresses faster or reaches Level 4 (Fan 5 maximum)
                {% endif %}
          level: warning

  # DEBUG: Heat Source Compensation
  - if:
      - condition: template
        value_template: "{{ debug_enabled and enable_heat_source_compensation }}"
    then:
      - service: system_log.write
        data:
