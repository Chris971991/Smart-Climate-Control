          {% elif current_effectiveness <= 35 and (time_in_current_mode | float(0)) >= (effectiveness_check_mins + 10) %}
            {% set effectiveness_level = 1 %}  {# v4.2.1: CRITICAL FIX - Reduced from 60% to 35%, increased time from +5 to +10 min - realistic effectiveness threshold #}
          {% elif distance_from_target > 1.0 and (time_in_current_mode | float(0)) >= 2 %}
